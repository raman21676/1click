<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="You're offline - 1click Games">
    <meta name="theme-color" content="#0f172a">
    <title>Offline - 1click Games</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #f1f5f9;
            text-align: center;
        }
        
        .offline-icon {
            font-size: 6rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            max-width: 500px;
            line-height: 1.6;
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .cached-games {
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
        }
        
        .cached-games h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #f1f5f9;
        }
        
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        
        .game-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-decoration: none;
            color: #f1f5f9;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .game-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .game-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .game-name {
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            
            p {
                font-size: 1rem;
            }
            
            .offline-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-icon">📡❌</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry - you can still play games that were previously loaded!</p>
    
    <div class="actions">
        <button class="btn btn-primary" onclick="window.location.reload()">
            🔄 Try Again
        </button>
        <a href="/" class="btn btn-secondary">
            🏠 Go Home
        </a>
    </div>
    
    <div class="cached-games">
        <h2>🎮 Available Offline Games</h2>
        <div class="game-list">
            <a href="/src/games/tictactoe/" class="game-item">
                <div class="game-icon">❌</div>
                <div class="game-name">Tic-Tac-Toe</div>
            </a>
            <a href="/src/games/snake/" class="game-item">
                <div class="game-icon">🐍</div>
                <div class="game-name">Snake</div>
            </a>
            <a href="/src/games/sudoku/" class="game-item">
                <div class="game-icon">🔢</div>
                <div class="game-name">Sudoku</div>
            </a>
            <a href="/src/games/baagchal/" class="game-item">
                <div class="game-icon">🐅</div>
                <div class="game-name">Baagchal</div>
            </a>
            <a href="/src/games/ludo/" class="game-item">
                <div class="game-icon">🎲</div>
                <div class="game-name">Ludo</div>
            </a>
            <a href="/src/games/chess/" class="game-item">
                <div class="game-icon">♟️</div>
                <div class="game-name">Chess</div>
            </a>
            <a href="/src/games/snake-ladder/" class="game-item">
                <div class="game-icon">🪜</div>
                <div class="game-name">Snake & Ladder</div>
            </a>
            <a href="/src/games/carrom/" class="game-item">
                <div class="game-icon">🎯</div>
                <div class="game-name">Carrom</div>
            </a>
        </div>
    </div>
    
    <script>
        // Check if we're back online
        window.addEventListener('online', () => {
            window.location.reload();
        });
        
        // Update online status
        function updateOnlineStatus() {
            if (navigator.onLine) {
                document.querySelector('h1').textContent = "You're Back Online!";
                document.querySelector('.offline-icon').textContent = "📡✅";
                document.querySelector('p').textContent = "Great! Your internet connection is restored. Redirecting to homepage...";
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }
        }
        
        window.addEventListener('online', updateOnlineStatus);
    </script>
</body>
</html>
