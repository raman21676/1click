<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Play Snake and Ladder online for free! Classic board game with up to 4 players.">
  <meta name="theme-color" content="#0f172a">
  <link rel="canonical" href="https://1click.live/src/games/snake-ladder/">
  <title>Snake &amp; Ladder - 1click Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --accent: #4CAF50;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a1a2e 100%);
      color: #fff;
      overflow-x: hidden;
    }

    /* ── LOADING ── */
    #loadingScreen {
      position:fixed; inset:0;
      background:var(--bg);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:9999;
      transition:opacity .5s, visibility .5s;
    }
    #loadingScreen.hidden { opacity:0; visibility:hidden; }
    .load-icon { font-size:4rem; animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    .load-text { margin-top:1rem; color:#94a3b8; font-size:1.1rem; }

    /* ── SOUND BTN ── */
    #soundBtn {
      position:fixed; bottom:20px; right:20px;
      width:46px; height:46px; border-radius:50%;
      background:linear-gradient(135deg,#14b8a6,#06b6d4);
      border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:1.3rem;
      box-shadow:0 4px 14px rgba(20,184,166,.4);
      transition:transform .2s;
      z-index:1000;
    }
    #soundBtn:hover { transform:scale(1.1); }
    #soundBtn.muted { background:linear-gradient(135deg,#475569,#334155); }

    /* ── SETUP ── */
    #setupScreen {
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px;
    }
    .setup-title {
      font-size:clamp(2rem,8vw,3.2rem);
      font-weight:800;
      background:linear-gradient(135deg,#4CAF50,#FFEB3B,#2196F3);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      text-align:center; margin-bottom:.4rem;
    }
    .setup-sub { color:#94a3b8; margin-bottom:2rem; text-align:center; }
    .setup-card {
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:16px; padding:24px;
      width:100%; max-width:400px;
    }
    .setup-label { font-size:13px; color:#94a3b8; margin-bottom:10px; display:block; }
    .count-row { display:flex; gap:8px; margin-bottom:20px; }
    .count-btn {
      flex:1; padding:12px;
      border:2px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.05);
      color:#fff; border-radius:8px;
      cursor:pointer; font-size:1.1rem; font-family:inherit;
      transition:all .25s;
    }
    .count-btn:hover { border-color:var(--accent); }
    .count-btn.active { border-color:var(--accent); background:rgba(76,175,80,.18); }
    .player-inputs { margin-bottom:20px; }
    .input-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .color-dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; }
    .name-input {
      flex:1; padding:10px 14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.3); color:#fff;
      border-radius:8px; font-size:14px; font-family:inherit;
    }
    .name-input::placeholder { color:#64748b; }
    .start-btn {
      width:100%; padding:14px;
      border:none;
      background:linear-gradient(135deg,#4CAF50,#66BB6A);
      color:#fff; font-size:16px; font-weight:700;
      border-radius:12px; cursor:pointer; font-family:inherit;
      transition:transform .2s, box-shadow .2s;
      box-shadow:0 4px 16px rgba(76,175,80,.35);
    }
    .start-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(76,175,80,.5); }
    .start-btn:active { transform:scale(.98); }
    .back-home { margin-top:20px; color:#64748b; text-decoration:none; font-size:14px; }
    .back-home:hover { color:#94a3b8; }

    /* ── GAME SCREEN ── */
    #gameScreen { display:none; height:100dvh; flex-direction:column; overflow:hidden; }

    .game-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px; flex-shrink:0;
      background:rgba(0,0,0,.35);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .gh-back { color:#94a3b8; text-decoration:none; font-size:14px; padding:4px; }
    .gh-title { font-weight:700; font-size:1.1rem; }
    .gh-spacer { width:50px; }

    .game-body {
      flex:1; display:flex; flex-direction:column;
      align-items:center; padding:8px 12px; gap:8px;
      min-height:0;
    }

    /* ── TURN BANNER (thin) ── */
    .turn-banner {
      width:100%; max-width:520px; flex-shrink:0;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      border-radius:10px; padding:8px 14px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .turn-name { font-size:.95rem; font-weight:700; }
    .turn-msg  { font-size:11px; color:#94a3b8; }

    /* ── CONTROLS ROW (Ludo-style) ── */
    .controls-row {
      width:100%; max-width:520px; flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      gap:8px; padding:0 2px;
    }

    /* ── DICE (Ludo-identical) ── */
    .dice-area { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; }
    .dice-scene {
      width:56px; height:56px;
      perspective:600px; perspective-origin:50% 40%;
      position:relative; z-index:1;
    }
    .dice-cube {
      width:56px; height:56px;
      position:absolute;
      transform-style:preserve-3d;
      transform:rotateX(-25deg) rotateY(25deg);
      will-change:transform;
    }
    .face {
      position:absolute; width:56px; height:56px;
      background:linear-gradient(145deg,#fffef8,#f5f5f0);
      border-radius:12px;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.9),
        inset 0 -2px 3px rgba(0,0,0,.06),
        0 0 0 1px rgba(0,0,0,.08);
      backface-visibility:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    /* Ludo face positioning — face-1..face-6 */
    .face-1 { transform:rotateY(  0deg) translateZ(28px); }
    .face-2 { transform:rotateY(180deg) translateZ(28px); }
    .face-3 { transform:rotateY( 90deg) translateZ(28px); }
    .face-4 { transform:rotateY(-90deg) translateZ(28px); }
    .face-5 { transform:rotateX( 90deg) translateZ(28px); }
    .face-6 { transform:rotateX(-90deg) translateZ(28px); }
    .dots {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      grid-template-rows:1fr 1fr 1fr;
      width:100%; height:100%;
      padding:10px; gap:4px;
    }
    .dot {
      width:9px; height:9px;
      background:radial-gradient(circle at 35% 30%,#555,#111);
      border-radius:50%;
      box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 -1px 1px rgba(0,0,0,.2);
      justify-self:center; align-self:center;
    }
    /* Ludo dot positions */
    .face-1 .dot:nth-child(1){ grid-area:2/2; }
    .face-2 .dot:nth-child(1){ grid-area:1/1; } .face-2 .dot:nth-child(2){ grid-area:3/3; }
    .face-3 .dot:nth-child(1){ grid-area:1/1; } .face-3 .dot:nth-child(2){ grid-area:2/2; } .face-3 .dot:nth-child(3){ grid-area:3/3; }
    .face-4 .dot:nth-child(1){ grid-area:1/1; } .face-4 .dot:nth-child(2){ grid-area:1/3; } .face-4 .dot:nth-child(3){ grid-area:3/1; } .face-4 .dot:nth-child(4){ grid-area:3/3; }
    .face-5 .dot:nth-child(1){ grid-area:1/1; } .face-5 .dot:nth-child(2){ grid-area:1/3; } .face-5 .dot:nth-child(3){ grid-area:2/2; } .face-5 .dot:nth-child(4){ grid-area:3/1; } .face-5 .dot:nth-child(5){ grid-area:3/3; }
    .face-6 .dot:nth-child(1){ grid-area:1/1; } .face-6 .dot:nth-child(2){ grid-area:1/3; } .face-6 .dot:nth-child(3){ grid-area:2/1; } .face-6 .dot:nth-child(4){ grid-area:2/3; } .face-6 .dot:nth-child(5){ grid-area:3/1; } .face-6 .dot:nth-child(6){ grid-area:3/3; }

    /* Ludo-identical per-face roll animations */
    @keyframes roll1 {
      0%   { transform:rotateX(-25deg) rotateY(25deg); }
      20%  { transform:rotateX(-200deg) rotateY(150deg) rotateZ(30deg); }
      50%  { transform:rotateX(-520deg) rotateY(380deg) rotateZ(15deg); }
      75%  { transform:rotateX(-710deg) rotateY(720deg) rotateZ(3deg); }
      100% { transform:rotateX(-720deg) rotateY(720deg) rotateZ(0deg); }
    }
    @keyframes roll2 {
      0%   { transform:rotateX(-25deg) rotateY(25deg); }
      20%  { transform:rotateX(-180deg) rotateY(200deg) rotateZ(-25deg); }
      50%  { transform:rotateX(-480deg) rotateY(500deg) rotateZ(-10deg); }
      75%  { transform:rotateX(-715deg) rotateY(898deg) rotateZ(-2deg); }
      100% { transform:rotateX(-720deg) rotateY(900deg) rotateZ(0deg); }
    }
    @keyframes roll3 {
      0%   { transform:rotateX(-25deg) rotateY(25deg); }
      20%  { transform:rotateX(-160deg) rotateY(130deg) rotateZ(20deg); }
      50%  { transform:rotateX(-490deg) rotateY(430deg) rotateZ(8deg); }
      75%  { transform:rotateX(-718deg) rotateY(628deg) rotateZ(1deg); }
      100% { transform:rotateX(-720deg) rotateY(630deg) rotateZ(0deg); }
    }
    @keyframes roll4 {
      0%   { transform:rotateX(-25deg) rotateY(25deg); }
      20%  { transform:rotateX(-200deg) rotateY(250deg) rotateZ(-20deg); }
      50%  { transform:rotateX(-500deg) rotateY(540deg) rotateZ(-8deg); }
      75%  { transform:rotateX(-718deg) rotateY(808deg) rotateZ(-1deg); }
      100% { transform:rotateX(-720deg) rotateY(810deg) rotateZ(0deg); }
    }
    @keyframes roll5 {
      0%   { transform:rotateX(-25deg) rotateY(25deg); }
      20%  { transform:rotateX(-250deg) rotateY(120deg) rotateZ(25deg); }
      50%  { transform:rotateX(-610deg) rotateY(360deg) rotateZ(10deg); }
      75%  { transform:rotateX(-806deg) rotateY(720deg) rotateZ(2deg); }
      100% { transform:rotateX(-810deg) rotateY(720deg) rotateZ(0deg); }
    }
    @keyframes roll6 {
      0%   { transform:rotateX(-25deg) rotateY(25deg); }
      20%  { transform:rotateX(-170deg) rotateY(180deg) rotateZ(-30deg); }
      50%  { transform:rotateX(-530deg) rotateY(480deg) rotateZ(-12deg); }
      75%  { transform:rotateX(-628deg) rotateY(720deg) rotateZ(-2deg); }
      100% { transform:rotateX(-630deg) rotateY(720deg) rotateZ(0deg); }
    }
    .dice-cube.rolling-1 { animation:roll1 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    .dice-cube.rolling-2 { animation:roll2 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    .dice-cube.rolling-3 { animation:roll3 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    .dice-cube.rolling-4 { animation:roll4 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    .dice-cube.rolling-5 { animation:roll5 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    .dice-cube.rolling-6 { animation:roll6 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    /* Wrapper bounce — simulates physical throw */
    .dice-scene.rolling { animation:diceThrow 0.85s cubic-bezier(.22,.61,.36,1) forwards; }
    @keyframes diceThrow {
      0%   { transform:translateY(0)     scale(1.00); }
      25%  { transform:translateY(-18px) scale(1.06); }
      55%  { transform:translateY(-28px) scale(1.09); }
      75%  { transform:translateY(-8px)  scale(1.03); }
      88%  { transform:translateY(-2px)  scale(1.01); }
      100% { transform:translateY(0)     scale(1.00); }
    }

    .roll-btn {
      background:linear-gradient(135deg,#FF6F00,#FFD600);
      border:none; border-radius:8px; color:#000;
      font-size:clamp(12px,2.2vmin,14px); font-weight:800;
      padding:9px 18px; cursor:pointer; transition:all .2s; font-family:inherit;
      box-shadow:0 4px 12px rgba(255,111,0,.4);
      margin-top:8px;
    }
    .roll-btn:hover:not(:disabled) { transform:translateY(-2px); }
    .roll-btn:disabled { opacity:.35; cursor:not-allowed; }

    /* ── BOARD (IMAGE) ── */
    .board-wrap {
      position:relative;
      width:100%; max-width:520px;
      aspect-ratio:1;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 8px 40px rgba(0,0,0,.6), 0 0 0 3px rgba(255,255,255,.08);
    }
    .board-wrap img.board-img {
      width:100%; height:100%;
      object-fit:contain;
      display:block;
      border-radius:8px;
    }
    /* SVG overlay for tokens only */
    #tokensSvg {
      position:absolute; inset:0;
      pointer-events:none;
      z-index:20;
    }

    /* ── PLAYER PANELS ── */
    .player-panels {
      display:flex; gap:4px; flex:1; flex-wrap:wrap;
    }
    .p-panel {
      flex:1; display:flex; align-items:center; gap:6px;
      padding:6px 10px;
      background:rgba(255,255,255,.05);
      border:2px solid transparent;
      border-radius:8px; font-size:12px;
      transition:all .3s; text-align:center;
    }
    .p-panel.active {
      border-color:var(--pc);
      background:rgba(255,255,255,.12);
      box-shadow:0 0 10px var(--pc);
    }
    .p-dot { width:10px; height:10px; border-radius:50%; background:var(--pc); flex-shrink:0; }

    /* ── WIN MODAL ── */
    .modal-bg {
      position:fixed; inset:0;
      background:rgba(0,0,0,.82);
      display:none; align-items:center; justify-content:center;
      z-index:500;
    }
    .modal-bg.open { display:flex; }
    .modal-box {
      background:linear-gradient(135deg,#1e293b,#0f172a);
      border:2px solid #4CAF50;
      border-radius:20px; padding:40px 36px;
      text-align:center; max-width:300px; width:90%;
      animation:modalPop .45s ease;
    }
    @keyframes modalPop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-emoji { font-size:4rem; margin-bottom:14px; }
    .modal-title { font-size:1.9rem; font-weight:800; margin-bottom:6px; }
    .modal-sub { color:#94a3b8; margin-bottom:22px; font-size:15px; }
    .modal-btn {
      padding:12px 28px;
      border:none;
      background:linear-gradient(135deg,#4CAF50,#66BB6A);
      color:#fff; font-size:16px; font-weight:700;
      border-radius:12px; cursor:pointer; font-family:inherit;
      transition:transform .2s;
    }
    .modal-btn:hover { transform:translateY(-2px); }

    @media (max-width:420px) {
      .game-body { padding:6px; gap:6px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="load-icon">🐍</div>
  <div class="load-text">Loading Snake &amp; Ladder…</div>
</div>

<!-- Sound -->
<button id="soundBtn" title="Toggle sound">🔊</button>

<!-- ════ SETUP SCREEN ════ -->
<div id="setupScreen">
  <h1 class="setup-title">🐍 Snake &amp; Ladder 🪜</h1>
  <p class="setup-sub">Climb ladders, dodge snakes, reach 100!</p>
  <div class="setup-card">
    <label class="setup-label">Number of Players</label>
    <div class="count-row" id="countRow">
      <button class="count-btn active" data-n="2">2</button>
      <button class="count-btn" data-n="3">3</button>
      <button class="count-btn" data-n="4">4</button>
    </div>
    <label class="setup-label">Player Names</label>
    <div class="player-inputs" id="playerInputs">
      <div class="input-row">
        <div class="color-dot" style="background:#E53935"></div>
        <input class="name-input" data-pi="0" placeholder="Player 1" value="Player 1">
      </div>
      <div class="input-row">
        <div class="color-dot" style="background:#1E88E5"></div>
        <input class="name-input" data-pi="1" placeholder="Player 2" value="Player 2">
      </div>
      <div class="input-row" style="display:none">
        <div class="color-dot" style="background:#43A047"></div>
        <input class="name-input" data-pi="2" placeholder="Player 3" value="Player 3">
      </div>
      <div class="input-row" style="display:none">
        <div class="color-dot" style="background:#FDD835"></div>
        <input class="name-input" data-pi="3" placeholder="Player 4" value="Player 4">
      </div>
    </div>
    <button class="start-btn" id="startBtn">🎮 Start Game</button>
  </div>
  <a class="back-home" href="../../../index.html">← Back to Games</a>
</div>

<!-- ════ GAME SCREEN ════ -->
<div id="gameScreen">
  <header class="game-header">
    <a class="gh-back" href="../../../index.html">← Back</a>
    <div class="gh-title">🐍 Snake &amp; Ladder</div>
    <div class="gh-spacer"></div>
  </header>

  <div class="game-body">

    <!-- Turn Banner (top) -->
    <div class="turn-banner">
      <div>
        <div class="turn-name" id="turnName">Player 1's Turn</div>
        <div class="turn-msg"  id="turnMsg">Roll the dice!</div>
      </div>
    </div>

    <!-- Board: image + SVG token overlay -->
    <div class="board-wrap">
      <img class="board-img" src="assets/board.png" alt="Snake and Ladder Board">
      <svg id="tokensSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>

    <!-- Controls row (Ludo-style): player panels + dice -->
    <div class="controls-row">
      <!-- Player panels -->
      <div class="player-panels" id="playerPanels"></div>

      <!-- 3D Dice -->
      <div class="dice-area">
        <div class="dice-scene" id="diceScene">
          <div class="dice-cube" id="diceCube">
            <!-- Face 1: center dot -->
            <div class="face face-1"><div class="dots"><div class="dot"></div></div></div>
            <!-- Face 2: top-left + bottom-right -->
            <div class="face face-2"><div class="dots"><div class="dot"></div><div class="dot"></div></div></div>
            <!-- Face 3: diagonal -->
            <div class="face face-3"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            <!-- Face 4: four corners -->
            <div class="face face-4"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            <!-- Face 5: four corners + center -->
            <div class="face face-5"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            <!-- Face 6: two columns of three -->
            <div class="face face-6"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
          </div>
        </div>
        <button class="roll-btn" id="rollBtn">🎲 ROLL</button>
      </div>
    </div>

  </div>
</div>

<!-- Win Modal -->
<div class="modal-bg" id="winModal">
  <div class="modal-box">
    <div class="modal-emoji">🏆</div>
    <div class="modal-title" id="winTitle">Player 1 Wins!</div>
    <div class="modal-sub">Congratulations! 🎉</div>
    <button class="modal-btn" id="playAgainBtn">🔄 Play Again</button>
  </div>
</div>

<script src="../../assets/js/sound.js"></script>
<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const PLAYER_COLORS = ['#E53935','#1E88E5','#43A047','#FDD835'];
const PLAYER_TXT    = ['#fff',   '#fff',   '#fff',   '#222'  ];

// Snakes: head → tail
const SNAKES = { 99:41, 92:72, 83:59, 66:55, 36:14, 38:20, 31:10 };

// Ladders: bottom → top
const LADDERS = { 2:23, 5:35, 13:49, 24:44, 42:61, 53:74, 64:86 };

// Dice final transforms (front=1, right=2, top=3, bottom=4, left=5, back=6)
const DICE_FINAL = {
  1:'rotateX(0deg) rotateY(0deg)',
  2:'rotateX(0deg) rotateY(-90deg)',
  3:'rotateX(-90deg) rotateY(0deg)',
  4:'rotateX(90deg) rotateY(0deg)',
  5:'rotateX(0deg) rotateY(90deg)',
  6:'rotateX(0deg) rotateY(180deg)',
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let G = {
  players: [],
  count: 2,
  positions: [0,0,0,0],
  current: 0,
  busy: false,
  over: false,
};

// ═══════════════════════════════════════════════════
//  COORDINATE HELPER
// ═══════════════════════════════════════════════════
// The board image is a perfect 10×10 grid.
// We map cell number → center in SVG viewBox 0 0 100 100.
// Board image layout (matching generated image & reference):
//   Top row: 100,99,98,...,91  (left→right)
//   Row 2:    81,82,83,...,90  (left→right)
//   Row 3:    80,79,78,...,71  (left→right)
//   ...zigzag...
//   Bottom row: 1,2,3,...,10   (left→right)
function cellCenter(num) {
  // gridRow: 0 = top row (100..91), 9 = bottom row (1..10)
  const gridRow = Math.floor((100 - num) / 10);
  const posInRow = (100 - num) % 10; // 0 = leftmost number in this row (from top)

  let col;
  if (gridRow % 2 === 0) {
    // Even rows (0,2,4,6,8): numbers go RIGHT→LEFT top side, 100,99,...91
    // posInRow 0 → col 0 (leftmost)
    col = posInRow;
  } else {
    // Odd rows (1,3,5,7,9): numbers go LEFT→RIGHT, 81,82,...90
    // posInRow 0 → col 9 (rightmost)
    col = 9 - posInRow;
  }

  return {
    x: col * 10 + 5,
    y: gridRow * 10 + 5,
  };
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 500);
  initSetup();
  initSoundBtn();
});

// ═══════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════
function initSetup() {
  document.getElementById('countRow').addEventListener('click', e => {
    const btn = e.target.closest('.count-btn');
    if (!btn) return;
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    G.count = parseInt(btn.dataset.n);
    refreshInputRows();
  });
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('rollBtn').addEventListener('click', onRoll);
  document.getElementById('playAgainBtn').addEventListener('click', () => {
    document.getElementById('winModal').classList.remove('open');
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
  });
}

function refreshInputRows() {
  document.querySelectorAll('#playerInputs .input-row').forEach((r, i) => {
    r.style.display = i < G.count ? 'flex' : 'none';
  });
}

// ═══════════════════════════════════════════════════
//  START GAME
// ═══════════════════════════════════════════════════
function startGame() {
  const inputs = document.querySelectorAll('#playerInputs .name-input');
  G.players = [];
  for (let i = 0; i < G.count; i++) {
    G.players.push({
      name: inputs[i].value.trim() || `Player ${i+1}`,
      color: PLAYER_COLORS[i],
      text:  PLAYER_TXT[i],
    });
  }
  G.positions = [0, 0, 0, 0];
  G.current = 0;
  G.busy = false;
  G.over = false;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';

  renderUI();
  renderTokens();
  trySound(() => SoundManager.playSuccess());
}

function onRoll() {
  if (G.busy || G.over) return;
  G.busy = true;
  document.getElementById('rollBtn').disabled = true;

  const val   = Math.floor(Math.random() * 6) + 1;
  const cube  = document.getElementById('diceCube');
  const scene = document.getElementById('diceScene');

  // Reset cleanly (Ludo pattern)
  cube.className = 'dice-cube';
  cube.style.transform = '';
  scene.classList.remove('rolling');
  void cube.offsetWidth; // force reflow

  cube.classList.add('rolling-' + val);
  scene.classList.add('rolling');
  trySound(() => SoundManager.playDiceRoll());

  setTimeout(() => {
    cube.style.transform = DICE_FINAL[val];
    cube.classList.remove('rolling-' + val);
    scene.classList.remove('rolling');
    handleMove(G.current, val);
  }, 850);
}

// ═══════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════
function handleMove(pi, steps) {
  const cur = G.positions[pi];
  const raw = cur + steps;

  if (raw > 100) {
    const bounce = 100 - (raw - 100);
    setMsg(`Need exactly ${100 - cur} to win!`);
    animSteps(pi, cur, bounce, () => endTurn());
    return;
  }

  animSteps(pi, cur, raw, () => {
    if (SNAKES[raw] !== undefined) {
      setMsg('🐍 Oh no! Snake bite!');
      trySound(() => SoundManager.playLose());
      setTimeout(() => {
        G.positions[pi] = SNAKES[raw];
        renderTokens();
        setTimeout(endTurn, 500);
      }, 700);
    } else if (LADDERS[raw] !== undefined) {
      setMsg('🪜 Ladder! Climb up!');
      trySound(() => SoundManager.playLevelUp());
      setTimeout(() => {
        G.positions[pi] = LADDERS[raw];
        renderTokens();
        setTimeout(endTurn, 500);
      }, 700);
    } else if (raw === 100) {
      trySound(() => SoundManager.playWin());
      showWin(pi);
    } else {
      trySound(() => SoundManager.playMove());
      endTurn();
    }
  });
}

function animSteps(pi, from, to, done) {
  if (from === to) { done(); return; }
  let cur = from;
  const dir = from < to ? 1 : -1;
  function tick() {
    cur += dir;
    G.positions[pi] = cur;
    renderTokens();
    if (cur !== to) setTimeout(tick, 180);
    else done();
  }
  tick();
}

function endTurn() {
  if (G.over) return;
  G.current = (G.current + 1) % G.count;
  G.busy = false;
  document.getElementById('rollBtn').disabled = false;
  // Reset dice to neutral position (Ludo style)
  const cube = document.getElementById('diceCube');
  cube.className = 'dice-cube';
  cube.style.transform = 'rotateX(-25deg) rotateY(25deg)';
  renderUI();
}

function showWin(pi) {
  G.over = true;
  const p = G.players[pi];
  const t = document.getElementById('winTitle');
  t.textContent = `${p.name} Wins!`;
  t.style.color = p.color;
  document.getElementById('winModal').classList.add('open');
}

// ═══════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════
function renderUI() {
  const p = G.players[G.current];
  const nameEl = document.getElementById('turnName');
  nameEl.textContent = `${p.name}'s Turn`;
  nameEl.style.color = p.color;
  setMsg('Roll the dice!');
  renderPanels();
}

function setMsg(msg) {
  document.getElementById('turnMsg').textContent = msg;
}

function renderPanels() {
  const cont = document.getElementById('playerPanels');
  cont.innerHTML = '';
  G.players.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'p-panel' + (i === G.current ? ' active' : '');
    d.style.setProperty('--pc', p.color);
    const pos = G.positions[i];
    d.innerHTML = `<div class="p-dot"></div><span>${p.name} <b>(${pos || '-'})</b></span>`;
    cont.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════
//  TOKEN RENDERING
// ═══════════════════════════════════════════════════
function svgEl(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

function renderTokens() {
  const svg = document.getElementById('tokensSvg');
  svg.innerHTML = '';

  // Group by cell
  const groups = {};
  G.players.forEach((p, i) => {
    const pos = G.positions[i];
    if (pos <= 0) return;
    if (!groups[pos]) groups[pos] = [];
    groups[pos].push(i);
  });

  Object.entries(groups).forEach(([pos, pis]) => {
    const c = cellCenter(parseInt(pos));
    const n = pis.length;

    pis.forEach((pi, k) => {
      const p = G.players[pi];
      const r = n > 2 ? 2.6 : 3.2;

      // Offset tokens that share a cell
      let ox = 0, oy = 0;
      if (n === 2) { ox = (k === 0 ? -2.5 : 2.5); }
      else if (n === 3) { ox = (k - 1) * 3; oy = k === 1 ? -1 : 1; }
      else if (n === 4) { ox = (k % 2 === 0 ? -2.5 : 2.5); oy = k < 2 ? -2 : 2; }

      const cx = c.x + ox;
      const cy = c.y + oy;

      // Shadow
      const sh = svgEl('circle');
      sh.setAttribute('cx', cx + .5); sh.setAttribute('cy', cy + .7);
      sh.setAttribute('r', r); sh.setAttribute('fill', 'rgba(0,0,0,.4)');
      svg.appendChild(sh);

      // Body
      const circ = svgEl('circle');
      circ.setAttribute('cx', cx); circ.setAttribute('cy', cy);
      circ.setAttribute('r', r);
      circ.setAttribute('fill', p.color);
      circ.setAttribute('stroke', 'white');
      circ.setAttribute('stroke-width', '1.2');
      svg.appendChild(circ);

      // Number label
      const txt = svgEl('text');
      txt.setAttribute('x', cx); txt.setAttribute('y', cy + r * 0.4);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', r * 1.0);
      txt.setAttribute('font-weight', '800');
      txt.setAttribute('font-family', 'Poppins,sans-serif');
      txt.setAttribute('fill', p.text);
      txt.textContent = pi + 1;
      svg.appendChild(txt);
    });
  });

  renderPanels();
}

// ═══════════════════════════════════════════════════
//  SOUND
// ═══════════════════════════════════════════════════
function trySound(fn) {
  try { if (typeof SoundManager !== 'undefined' && SoundManager.enabled) fn(); } catch(e) {}
}
function initSoundBtn() {
  const btn = document.getElementById('soundBtn');
  function update() {
    try {
      const on = typeof SoundManager !== 'undefined' ? SoundManager.enabled : true;
      btn.textContent = on ? '🔊' : '🔇';
      btn.classList.toggle('muted', !on);
    } catch(e) {}
  }
  btn.addEventListener('click', () => {
    try { SoundManager.toggle(); if (SoundManager.enabled) SoundManager.playClick(); } catch(e) {}
    update();
  });
  update();
}
</script>
</body>
