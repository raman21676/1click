<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - 1click Games</title>
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1>Tic-Tac-Toe</h1>
            <div class="game-mode">
                <button id="mode-2p" class="mode-btn active">2 Players</button>
                <button id="mode-ai" class="mode-btn">vs AI</button>
            </div>
        </header>

        <main class="game-main">
            <div class="status-panel">
                <div class="player-turn">
                    <span id="turn-indicator" class="turn-x">Player X's Turn</span>
                </div>
                <div class="difficulty-selector" id="difficulty-selector" style="display: none;">
                    <label>AI Difficulty:</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
            </div>

            <div class="game-board" id="game-board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="score-panel">
                <div class="score-box">
                    <span class="player-label">Player X</span>
                    <span id="score-x" class="score">0</span>
                </div>
                <div class="score-box draws">
                    <span class="player-label">Draws</span>
                    <span id="score-draw" class="score">0</span>
                </div>
                <div class="score-box">
                    <span class="player-label">Player O</span>
                    <span id="score-o" class="score">0</span>
                </div>
            </div>

            <div class="game-controls">
                <button id="reset-btn" class="control-btn primary">New Game</button>
                <button id="clear-scores-btn" class="control-btn">Reset Scores</button>
            </div>
        </main>

        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title">Game Over!</h2>
                <p id="modal-message">Player X Wins!</p>
                <button id="modal-btn" class="control-btn primary">Play Again</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/storage.js"></script>
    <script src="game.js"></script>
</body>
</html>
