<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Chess</title>
<style>
body { margin: 0; padding: 10px; font-family: sans-serif; background: #333; color: white; }
#s1, #s2 { display: none; }
#s1.active, #s2.active { display: block; }
button { padding: 15px 30px; font-size: 16px; margin: 5px; cursor: pointer; }
#board { display: grid; grid-template-columns: repeat(8, 40px); margin: 10px 0; }
.sq { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
.sq.w { background: #f0d9b5; color: black; }
.sq.b { background: #b58863; color: black; }
.sq.sel { background: #7cb342 !important; }
</style>
</head>
<body>

<div id="s1" class="active">
  <h2>Chess</h2>
  <button id="b1">START GAME</button>
</div>

<div id="s2">
  <h2>Game</h2>
  <div id="board"></div>
  <button id="b2">Back</button>
</div>

<script>
// Game data
var board = [];
var selected = null;

// Button handlers
document.getElementById('b1').onclick = function() {
  document.getElementById('s1').classList.remove('active');
  document.getElementById('s2').classList.add('active');
  initBoard();
  draw();
};

document.getElementById('b2').onclick = function() {
  document.getElementById('s2').classList.remove('active');
  document.getElementById('s1').classList.add('active');
};

function initBoard() {
  board = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

function draw() {
  var b = document.getElementById('board');
  b.innerHTML = '';
  
  for (var r = 0; r < 8; r++) {
    for (var c = 0; c < 8; c++) {
      var sq = document.createElement('div');
      sq.className = 'sq ' + ((r+c)%2 ? 'b' : 'w');
      
      if (selected && selected[0] == r && selected[1] == c) {
        sq.classList.add('sel');
      }
      
      if (board[r][c]) {
        sq.textContent = board[r][c];
      }
      
      (function(row, col) {
        sq.onclick = function() {
          if (selected) {
            // Move
            board[row][col] = board[selected[0]][selected[1]];
            board[selected[0]][selected[1]] = '';
            selected = null;
          } else if (board[row][col]) {
            // Select
            selected = [row, col];
          }
          draw();
        };
      })(r, c);
      
      b.appendChild(sq);
    }
  }
}
</script>

</body>
</html>
