<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Test</title>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
#output { margin-top: 20px; padding: 10px; background: #f0f0f0; }
</style>
</head>
<body>
<h1>Test Page</h1>
<button id="test-btn">Click Me</button>
<div id="output">Not clicked yet</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM loaded');
  var btn = document.getElementById('test-btn');
  var out = document.getElementById('output');
  
  btn.addEventListener('click', function() {
    console.log('Button clicked!');
    out.textContent = 'Button was clicked at ' + new Date().toLocaleTimeString();
  });
});
</script>
</body>
</html>
