<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Chess</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        background: radial-gradient(
          ellipse at center,
          #a0612a 0%,
          #7a4520 40%,
          #5c3010 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-y: auto;
      }
      .screen {
        display: none;
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
      }
      .screen.active {
        display: block;
      }

      /* === SETUP === */
      #setup {
        padding: 30px 20px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: fadeUp 0.5s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo-crown {
        font-size: 3.5em;
        text-align: center;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
      }
      .logo-title {
        font-size: 2.6em;
        font-weight: 900;
        letter-spacing: 6px;
        color: #fff;
        text-shadow: 0 3px 12px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      .logo-sub {
        font-size: 0.8em;
        letter-spacing: 3px;
        color: rgba(255, 255, 255, 0.5);
        text-align: center;
        margin-top: -6px;
      }
      .scard {
        width: 100%;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 210, 100, 0.18);
        border-radius: 18px;
        padding: 18px 18px;
        backdrop-filter: blur(8px);
      }
      .scard-label {
        font-size: 0.68em;
        font-weight: 800;
        letter-spacing: 2.5px;
        color: rgba(255, 210, 100, 0.8);
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .color-btns {
        display: flex;
        gap: 10px;
      }
      .cbtn {
        flex: 1;
        border: 2px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        padding: 16px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .cbtn-icon {
        font-size: 2.3em;
      }
      .cbtn-name {
        font-size: 0.7em;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 1px;
      }
      .cbtn:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 210, 100, 0.4);
        background: rgba(255, 255, 255, 0.12);
      }
      .cbtn.sel {
        border-color: #f5b942;
        background: rgba(245, 185, 66, 0.18);
        box-shadow: 0 0 20px rgba(245, 185, 66, 0.35);
      }
      .cbtn .ck {
        display: none;
        position: absolute;
        top: 7px;
        right: 8px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #f5b942;
        font-size: 11px;
        color: #5c2d00;
        align-items: center;
        justify-content: center;
        font-weight: 900;
      }
      .cbtn.sel .ck {
        display: flex;
      }
      .diff-btns {
        display: flex;
        gap: 8px;
      }
      .dbtn {
        flex: 1;
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 6px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .dbtn-icon {
        font-size: 1.3em;
      }
      .dbtn-name {
        font-size: 0.7em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 3px;
        letter-spacing: 0.5px;
      }
      .dbtn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
      }
      .dbtn.sel {
        border-color: #6abf69;
        background: rgba(106, 191, 105, 0.2);
      }
      .play-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #5cb85c, #388e3c);
        color: #fff;
        font-size: 1.1em;
        font-weight: 800;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 6px 24px rgba(56, 142, 60, 0.45);
      }
      .play-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(56, 142, 60, 0.55);
      }

      /* === GAME === */
      #game {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 14px 12px 16px;
        gap: 9px;
        animation: fadeUp 0.35s ease;
      }
      .players-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 460px;
        gap: 10px;
      }
      .ppill {
        display: flex;
        align-items: center;
        gap: 9px;
        background: rgba(0, 0, 0, 0.3);
        border: 1.5px solid rgba(255, 255, 255, 0.12);
        border-radius: 50px;
        padding: 7px 14px 7px 7px;
        flex: 1;
        transition: all 0.3s;
        position: relative;
      }
      .ppill.right {
        flex-direction: row-reverse;
      }
      .ppill.active {
        border-color: #f5b942;
        box-shadow: 0 0 18px rgba(245, 185, 66, 0.4);
        background: rgba(245, 185, 66, 0.08);
      }
      .pava {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        overflow: hidden;
        border: 2.5px solid rgba(255, 255, 255, 0.28);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8em;
        background: rgba(0, 0, 0, 0.2);
      }
      .ppill.active .pava {
        border-color: #f5b942;
      }
      .pinfo {
        flex: 1;
      }
      .ppill.right .pinfo {
        text-align: right;
      }
      .pname {
        font-size: 0.68em;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.5px;
      }
      .ptimer {
        font-size: 1.12em;
        font-weight: 800;
        color: #fff;
        font-family: "Courier New", monospace;
        letter-spacing: 1px;
        line-height: 1.2;
      }
      .ptimer.low {
        color: #ef5350;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }
      .pcap {
        font-size: 0.62em;
        color: rgba(255, 255, 255, 0.45);
        min-height: 12px;
        overflow: hidden;
        white-space: nowrap;
      }

      /* Board */
      .board-section {
        width: 100%;
        max-width: 460px;
      }
      .board-frame {
        background: linear-gradient(145deg, #c8894a, #9b6530, #6d3f15);
        border-radius: 14px;
        padding: 10px;
        box-shadow:
          0 10px 50px rgba(0, 0, 0, 0.6),
          0 2px 0 rgba(255, 220, 140, 0.25) inset,
          0 -2px 0 rgba(0, 0, 0, 0.3) inset;
        border: 2px solid #7a4a1c;
        position: relative;
      }
      .bolt {
        position: absolute;
        font-size: 0.7em;
        color: rgba(255, 220, 150, 0.4);
        pointer-events: none;
      }
      .bolt-tl {
        top: 5px;
        left: 8px;
      }
      .bolt-tr {
        top: 5px;
        right: 8px;
      }
      .bolt-bl {
        bottom: 5px;
        left: 8px;
      }
      .bolt-br {
        bottom: 5px;
        right: 8px;
      }
      .board-inner {
        position: relative;
      }
      .coord-row {
        display: flex;
        height: 15px;
        align-items: center;
      }
      .coord-f {
        flex: 1;
        text-align: center;
        font-size: 0.6em;
        color: rgba(255, 220, 140, 0.55);
        font-weight: 700;
      }
      .coord-spc {
        width: 14px;
      }
      .board-with-ranks {
        display: flex;
        align-items: stretch;
      }
      .rank-col {
        width: 14px;
        display: flex;
        flex-direction: column;
      }
      .coord-r {
        flex: 1;
        font-size: 0.6em;
        color: rgba(255, 220, 140, 0.55);
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #chess-board {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        flex: 1;
      }

      /* Squares */
      .sq {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .sq.light {
        background: #f0d9b5;
      }
      .sq.dark {
        background: #b58863;
      }
      .sq:hover {
        filter: brightness(1.09);
      }
      .sq.sel {
        background: #7cb342 !important;
      }
      .sq.lmf,
      .sq.lmt {
        background: rgba(95, 155, 45, 0.5) !important;
      }
      .sq.chk {
        background: rgba(210, 40, 40, 0.7) !important;
      }
      .sq.dot::before {
        content: "";
        position: absolute;
        width: 32%;
        height: 32%;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
        pointer-events: none;
        z-index: 1;
      }
      .sq.cap::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid rgba(0, 0, 0, 0.22);
        pointer-events: none;
        z-index: 1;
      }
      .sq.hint {
        outline: 3px solid #29b6f6;
        outline-offset: -3px;
        z-index: 3;
      }
      .piece {
        font-size: clamp(1.3em, 5.5vw, 2.1em);
        line-height: 1;
        position: relative;
        z-index: 2;
        transition: transform 0.12s;
        pointer-events: none;
      }
      .piece.wp {
        color: #fff8ee;
        -webkit-text-stroke: 1px #8b5e2a;
        filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.7));
      }
      .piece.bp {
        color: #120a02;
        -webkit-text-stroke: 0.5px #c8a44a;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.85));
      }
      .sq:hover .piece {
        transform: translateY(-2px) scale(1.1);
      }
      .sq.sel .piece {
        transform: translateY(-3px) scale(1.13);
      }

      /* Controls */
      .ctrl-bar {
        display: flex;
        gap: 10px;
        justify-content: center;
        width: 100%;
        max-width: 360px;
      }
      .cbtn2 {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: rgba(0, 0, 0, 0.3);
        border: 1.5px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 12px 6px;
        cursor: pointer;
        transition: all 0.2s;
        color: rgba(255, 255, 255, 0.85);
      }
      .cbtn2:hover {
        background: rgba(255, 255, 255, 0.14);
        transform: translateY(-2px);
        border-color: rgba(255, 220, 130, 0.4);
      }
      .cbtn2:active {
        transform: translateY(0);
      }
      .cicon {
        font-size: 1.4em;
      }
      .clbl {
        font-size: 0.58em;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.5);
      }

      /* Leaves */
      #leaves {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        height: 65px;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .leaf {
        font-size: 2.2em;
        line-height: 1;
        opacity: 0.75;
      }
      .leaf.r {
        transform: scaleX(-1);
      }

      /* Modals */
      .mover {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.72);
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
      }
      .mover.show {
        display: flex;
      }
      .mbox {
        background: linear-gradient(145deg, #6d401a, #4e2e0e);
        border: 1.5px solid rgba(245, 185, 66, 0.3);
        border-radius: 24px;
        padding: 34px 26px;
        text-align: center;
        max-width: 310px;
        width: 90%;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.7);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .m-icon {
        font-size: 3.6em;
        margin-bottom: 8px;
      }
      .m-title {
        font-size: 1.65em;
        font-weight: 900;
        color: #f5b942;
        margin-bottom: 5px;
      }
      .m-sub {
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 22px;
        font-size: 0.9em;
        line-height: 1.5;
      }
      .m-btns {
        display: flex;
        gap: 10px;
      }
      .mbtn {
        flex: 1;
        padding: 13px;
        border: none;
        border-radius: 12px;
        font-size: 0.9em;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }
      .mbtn.p {
        background: linear-gradient(135deg, #5cb85c, #388e3c);
        color: #fff;
      }
      .mbtn.s {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .mbtn:hover {
        transform: scale(1.04);
      }
      .promo-row {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 4px;
      }
      .pbtn {
        font-size: 2.6em;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(245, 185, 66, 0.3);
        border-radius: 14px;
        padding: 10px 12px;
        cursor: pointer;
        transition: all 0.2s;
        color: #fff;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      }
      .pbtn:hover {
        background: rgba(245, 185, 66, 0.25);
        border-color: #f5b942;
        transform: scale(1.08);
      }

      #ai-toast {
        display: none;
        position: fixed;
        bottom: 110px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.75);
        color: #f5b942;
        padding: 10px 22px;
        border-radius: 30px;
        font-size: 0.85em;
        font-weight: 700;
        z-index: 100;
        border: 1px solid rgba(245, 185, 66, 0.3);
        animation: blink 1.2s infinite;
      }
      #error-log {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #c62828;
        color: #fff;
        padding: 8px 12px;
        font-size: 0.72em;
        display: none;
        z-index: 999;
        font-family: monospace;
        max-height: 100px;
        overflow-y: auto;
      }

      @media (max-width: 380px) {
        .piece {
          font-size: clamp(1.1em, 4vw, 1.7em);
        }
        .pava {
          width: 40px;
          height: 40px;
          font-size: 1.5em;
        }
        .ptimer {
          font-size: 0.95em;
        }
      }
      @media (min-width: 561px) {
        #game {
          padding: 20px 16px;
        }
        .board-frame {
          padding: 13px;
        }
        .players-bar,
        .board-section {
          max-width: 520px;
        }
        .ctrl-bar {
          max-width: 420px;
          gap: 14px;
        }
      }
      @media (min-width: 769px) {
        .screen {
          max-width: 520px;
        }
        #game {
          padding: 28px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="error-log"></div>
    <div id="ai-toast">🤔 AI thinking…</div>
    <div id="leaves">
      <div class="leaf">🌿🍃</div>
      <div class="leaf r">🌿🍃</div>
    </div>

    <!-- ===== SETUP ===== -->
    <div class="screen active" id="setup">
      <div class="logo-crown">♛</div>
      <div class="logo-title">CHESS</div>
      <div class="logo-sub">CLASSIC BOARD GAME</div>

      <div class="scard">
        <div class="scard-label">Play As</div>
        <div class="color-btns">
          <div class="cbtn sel" id="pw" onclick="selColor('w')">
            <div class="ck">✓</div>
            <div class="cbtn-icon">♔</div>
            <div class="cbtn-name">WHITE</div>
          </div>
          <div class="cbtn" id="pb" onclick="selColor('b')">
            <div class="ck">✓</div>
            <div class="cbtn-icon">♚</div>
            <div class="cbtn-name">BLACK</div>
          </div>
        </div>
      </div>

      <div class="scard">
        <div class="scard-label">Difficulty</div>
        <div class="diff-btns">
          <div class="dbtn sel" id="de" onclick="selDiff(1)">
            <div class="dbtn-icon">😊</div>
            <div class="dbtn-name">EASY</div>
          </div>
          <div class="dbtn" id="dm" onclick="selDiff(2)">
            <div class="dbtn-icon">🧐</div>
            <div class="dbtn-name">MEDIUM</div>
          </div>
          <div class="dbtn" id="dh" onclick="selDiff(3)">
            <div class="dbtn-icon">🔥</div>
            <div class="dbtn-name">HARD</div>
          </div>
        </div>
      </div>

      <button class="play-btn" onclick="startGame()">♟ PLAY CHESS</button>
    </div>

    <!-- ===== GAME ===== -->
    <div class="screen" id="game">
      <div class="players-bar" id="players-bar"></div>

      <div class="board-section">
        <div class="board-frame">
          <span class="bolt bolt-tl">⊙</span><span class="bolt bolt-tr">⊙</span>
          <span class="bolt bolt-bl">⊙</span><span class="bolt bolt-br">⊙</span>
          <div class="board-inner">
            <div class="coord-row" id="file-top"></div>
            <div class="board-with-ranks">
              <div class="rank-col" id="rank-left"></div>
              <div id="chess-board"></div>
              <div class="rank-col" id="rank-right"></div>
            </div>
            <div class="coord-row" id="file-bot"></div>
          </div>
        </div>
      </div>

      <div class="ctrl-bar">
        <button class="cbtn2" onclick="undoMove()">
          <span class="cicon">↩️</span><span class="clbl">UNDO</span>
        </button>
        <button class="cbtn2" onclick="showHint()">
          <span class="cicon">💡</span><span class="clbl">HINT</span>
        </button>
        <button class="cbtn2" onclick="flipBoard()">
          <span class="cicon">🔁</span><span class="clbl">FLIP</span>
        </button>
        <button class="cbtn2" onclick="goMenu()">
          <span class="cicon">⚙️</span><span class="clbl">MENU</span>
        </button>
      </div>
    </div>

    <!-- End Modal -->
    <div class="mover" id="end-modal">
      <div class="mbox">
        <div class="m-icon" id="end-icon"></div>
        <div class="m-title" id="end-title"></div>
        <div class="m-sub" id="end-sub"></div>
        <div class="m-btns">
          <button class="mbtn p" onclick="restart()">▶ NEW GAME</button>
          <button class="mbtn s" onclick="goMenu()">⚙ MENU</button>
        </div>
      </div>
    </div>

    <!-- Promo Modal -->
    <div class="mover" id="promo-modal">
      <div class="mbox">
        <div class="m-title">Promote Pawn</div>
        <div class="promo-row" id="promo-pieces"></div>
      </div>
    </div>

    <script>
      try {
        // =============================================
        // CHESS ENGINE
        // =============================================

        var WS = { K: "♔", Q: "♕", R: "♖", B: "♗", N: "♘", P: "♙" };
        var BS = { K: "♚", Q: "♛", R: "♜", B: "♝", N: "♞", P: "♟" };
        var FILES = ["a", "b", "c", "d", "e", "f", "g", "h"];
        var VALS = { P: 100, N: 320, B: 330, R: 500, Q: 900, K: 20000 };
        var PST = {
          P: [
            0, 0, 0, 0, 0, 0, 0, 0, 50, 50, 50, 50, 50, 50, 50, 50, 10, 10, 20,
            30, 30, 20, 10, 10, 5, 5, 10, 25, 25, 10, 5, 5, 0, 0, 0, 20, 20, 0,
            0, 0, 5, -5, -10, 0, 0, -10, -5, 5, 5, 10, 10, -20, -20, 10, 10, 5,
            0, 0, 0, 0, 0, 0, 0, 0,
          ],
          N: [
            -50, -40, -30, -30, -30, -30, -40, -50, -40, -20, 0, 0, 0, 0, -20,
            -40, -30, 0, 10, 15, 15, 10, 0, -30, -30, 5, 15, 20, 20, 15, 5, -30,
            -30, 0, 15, 20, 20, 15, 0, -30, -30, 5, 10, 15, 15, 10, 5, -30, -40,
            -20, 0, 5, 5, 0, -20, -40, -50, -40, -30, -30, -30, -30, -40, -50,
          ],
          B: [
            -20, -10, -10, -10, -10, -10, -10, -20, -10, 0, 0, 0, 0, 0, 0, -10,
            -10, 0, 5, 10, 10, 5, 0, -10, -10, 5, 5, 10, 10, 5, 5, -10, -10, 0,
            10, 10, 10, 10, 0, -10, -10, 10, 10, 10, 10, 10, 10, -10, -10, 5, 0,
            0, 0, 0, 5, -10, -20, -10, -10, -10, -10, -10, -10, -20,
          ],
          R: [
            0, 0, 0, 0, 0, 0, 0, 0, 5, 10, 10, 10, 10, 10, 10, 5, -5, 0, 0, 0,
            0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, -5,
            0, 0, 0, 0, 0, 0, -5, -5, 0, 0, 0, 0, 0, 0, -5, 0, 0, 0, 5, 5, 0, 0,
            0,
          ],
          Q: [
            -20, -10, -10, -5, -5, -10, -10, -20, -10, 0, 0, 0, 0, 0, 0, -10,
            -10, 0, 5, 5, 5, 5, 0, -10, -5, 0, 5, 5, 5, 5, 0, -5, 0, 0, 5, 5, 5,
            5, 0, -5, -10, 5, 5, 5, 5, 5, 0, -10, -10, 0, 5, 0, 0, 0, 0, -10,
            -20, -10, -10, -5, -5, -10, -10, -20,
          ],
          K: [
            -30, -40, -40, -50, -50, -40, -40, -30, -30, -40, -40, -50, -50,
            -40, -40, -30, -30, -40, -40, -50, -50, -40, -40, -30, -30, -40,
            -40, -50, -50, -40, -40, -30, -20, -30, -30, -40, -40, -30, -30,
            -20, -10, -20, -20, -20, -20, -20, -20, -10, 20, 20, 0, 0, 0, 0, 20,
            20, 20, 30, 10, 0, 0, 10, 30, 20,
          ],
        };

        // State (avoid window.history conflict by using unique name)
        var bd = [],
          trn = "w",
          cast = { wK: 1, wQ: 1, bK: 1, bQ: 1 },
          epSq = null;
        var moveHist = [],
          capW = [],
          capB = [];
        var selSq = null,
          vmoves = [],
          gOver = false,
          lastMv = null;
        var plColor = "w",
          flipped = false,
          diff = 1;
        var tmrs = { w: 600, b: 600 },
          tmrInt = null;
        var hintTmr = null;
        var chColor = "w",
          chDiff = 1;

        function IX(r, f) {
          return r * 8 + f;
        }
        function RW(i) {
          return Math.floor(i / 8);
        }
        function CL(i) {
          return i % 8;
        }
        function op(c) {
          return c === "w" ? "b" : "w";
        }

        function initBd() {
          bd = new Array(64).fill(null);
          var back = ["R", "N", "B", "Q", "K", "B", "N", "R"];
          for (var i = 0; i < 8; i++) {
            bd[i] = { t: back[i], c: "b" };
            bd[8 + i] = { t: "P", c: "b" };
            bd[48 + i] = { t: "P", c: "w" };
            bd[56 + i] = { t: back[i], c: "w" };
          }
          trn = "w";
          cast = { wK: 1, wQ: 1, bK: 1, bQ: 1 };
          epSq = null;
          moveHist = [];
          capW = [];
          capB = [];
          selSq = null;
          vmoves = [];
          gOver = false;
          lastMv = null;
          tmrs = { w: 600, b: 600 };
        }

        function pseudoM(b, sq, ep, ca) {
          var p = b[sq];
          if (!p) return [];
          var ms = [],
            r = RW(sq),
            f = CL(sq),
            c = p.c;
          function slide(dr, df) {
            var nr = r + dr,
              nf = f + df;
            while (nr >= 0 && nr < 8 && nf >= 0 && nf < 8) {
              var t = IX(nr, nf);
              if (!b[t]) {
                ms.push({ from: sq, to: t });
              } else {
                if (b[t].c !== c) ms.push({ from: sq, to: t, cap: b[t] });
                break;
              }
              nr += dr;
              nf += df;
            }
          }
          function step(dr, df) {
            var nr = r + dr,
              nf = f + df;
            if (nr >= 0 && nr < 8 && nf >= 0 && nf < 8) {
              var t = IX(nr, nf);
              if (!b[t] || b[t].c !== c)
                ms.push({ from: sq, to: t, cap: b[t] || null });
            }
          }
          if (p.t === "P") {
            var dir = c === "w" ? -1 : 1,
              sr = c === "w" ? 6 : 1,
              nr = r + dir;
            if (nr >= 0 && nr < 8 && !b[IX(nr, f)]) {
              var mv = { from: sq, to: IX(nr, f) };
              if (nr === 0 || nr === 7) mv.promo = 1;
              ms.push(mv);
              if (r === sr && !b[IX(nr + dir, f)])
                ms.push({ from: sq, to: IX(nr + dir, f), ep2: IX(r, f) });
            }
            for (var dx = -1; dx <= 1; dx += 2) {
              var nf2 = f + dx;
              if (nr >= 0 && nr < 8 && nf2 >= 0 && nf2 < 8) {
                var t2 = IX(nr, nf2);
                if (b[t2] && b[t2].c !== c) {
                  var mv2 = { from: sq, to: t2, cap: b[t2] };
                  if (nr === 0 || nr === 7) mv2.promo = 1;
                  ms.push(mv2);
                }
                if (ep !== null && t2 === ep)
                  ms.push({ from: sq, to: t2, epCap: IX(r, nf2) });
              }
            }
          } else if (p.t === "N") {
            [
              [-2, -1],
              [-2, 1],
              [-1, -2],
              [-1, 2],
              [1, -2],
              [1, 2],
              [2, -1],
              [2, 1],
            ].forEach(function (d) {
              step(d[0], d[1]);
            });
          } else if (p.t === "B") {
            slide(-1, -1);
            slide(-1, 1);
            slide(1, -1);
            slide(1, 1);
          } else if (p.t === "R") {
            slide(-1, 0);
            slide(1, 0);
            slide(0, -1);
            slide(0, 1);
          } else if (p.t === "Q") {
            slide(-1, -1);
            slide(-1, 1);
            slide(1, -1);
            slide(1, 1);
            slide(-1, 0);
            slide(1, 0);
            slide(0, -1);
            slide(0, 1);
          } else if (p.t === "K") {
            for (var dr = -1; dr <= 1; dr++)
              for (var df = -1; df <= 1; df++) if (dr || df) step(dr, df);
            if (ca) {
              var cr = c === "w" ? 7 : 0;
              if (
                (c === "w" ? ca.wK : ca.bK) &&
                !b[IX(cr, 5)] &&
                !b[IX(cr, 6)] &&
                sq === IX(cr, 4)
              )
                ms.push({ from: sq, to: IX(cr, 6), castle: "K" });
              if (
                (c === "w" ? ca.wQ : ca.bQ) &&
                !b[IX(cr, 3)] &&
                !b[IX(cr, 2)] &&
                !b[IX(cr, 1)] &&
                sq === IX(cr, 4)
              )
                ms.push({ from: sq, to: IX(cr, 2), castle: "Q" });
            }
          }
          return ms;
        }

        function isAtt(b, sq, byC) {
          for (var i = 0; i < 64; i++) {
            if (b[i] && b[i].c === byC) {
              var ms = pseudoM(b, i, null, null);
              for (var j = 0; j < ms.length; j++)
                if (ms[j].to === sq) return true;
            }
          }
          return false;
        }
        function fKing(b, c) {
          for (var i = 0; i < 64; i++)
            if (b[i] && b[i].t === "K" && b[i].c === c) return i;
          return -1;
        }

        function applyM(b, mv, ca) {
          var nb = b.slice(),
            nc = JSON.parse(JSON.stringify(ca)),
            p = nb[mv.from];
          nb[mv.to] = p;
          nb[mv.from] = null;
          if (mv.epCap !== undefined) nb[mv.epCap] = null;
          if (mv.castle) {
            var cr = p.c === "w" ? 7 : 0;
            if (mv.castle === "K") {
              nb[IX(cr, 5)] = nb[IX(cr, 7)];
              nb[IX(cr, 7)] = null;
            } else {
              nb[IX(cr, 3)] = nb[IX(cr, 0)];
              nb[IX(cr, 0)] = null;
            }
          }
          if (p.t === "K") {
            if (p.c === "w") {
              nc.wK = 0;
              nc.wQ = 0;
            } else {
              nc.bK = 0;
              nc.bQ = 0;
            }
          }
          if (p.t === "R") {
            if (mv.from === 63) nc.wK = 0;
            if (mv.from === 56) nc.wQ = 0;
            if (mv.from === 7) nc.bK = 0;
            if (mv.from === 0) nc.bQ = 0;
          }
          return { b: nb, ca: nc, ep: mv.ep2 !== undefined ? mv.ep2 : null };
        }

        function legalM(b, c, ep, ca) {
          var leg = [];
          for (var i = 0; i < 64; i++) {
            if (b[i] && b[i].c === c) {
              var ms = pseudoM(b, i, ep, ca);
              for (var j = 0; j < ms.length; j++) {
                var mv = ms[j];
                if (mv.castle) {
                  var cr = c === "w" ? 7 : 0;
                  var pass =
                    mv.castle === "K"
                      ? [IX(cr, 4), IX(cr, 5), IX(cr, 6)]
                      : [IX(cr, 4), IX(cr, 3), IX(cr, 2)];
                  var ok = 1;
                  for (var k = 0; k < pass.length; k++)
                    if (isAtt(b, pass[k], op(c))) {
                      ok = 0;
                      break;
                    }
                  if (!ok) continue;
                }
                var res = applyM(b, mv, ca);
                var kp = fKing(res.b, c);
                if (kp >= 0 && !isAtt(res.b, kp, op(c))) leg.push(mv);
              }
            }
          }
          return leg;
        }

        function inCk(b, c, ep, ca) {
          var kp = fKing(b, c);
          return kp >= 0 && isAtt(b, kp, op(c));
        }

        function pst(type, c, sq) {
          var ti = c === "w" ? sq : (7 - RW(sq)) * 8 + CL(sq);
          return (PST[type] && PST[type][ti]) || 0;
        }
        function evalBd(b) {
          var s = 0;
          for (var i = 0; i < 64; i++) {
            var p = b[i];
            if (!p) continue;
            var v = (VALS[p.t] || 0) + pst(p.t, p.c, i);
            s += p.c === "w" ? v : -v;
          }
          return s;
        }
        function orderM(ms) {
          return ms.slice().sort(function (a, b2) {
            return (
              (b2.cap ? VALS[b2.cap.t] || 0 : 0) -
              (a.cap ? VALS[a.cap.t] || 0 : 0)
            );
          });
        }

        function minimax(b, depth, alpha, beta, max, c, ep, ca) {
          var ms = legalM(b, c, ep, ca);
          if (!depth || !ms.length) {
            if (!ms.length)
              return inCk(b, c, ep, ca) ? (max ? -99999 : 99999) : 0;
            return evalBd(b);
          }
          ms = orderM(ms);
          if (max) {
            var best = -Infinity;
            for (var i = 0; i < ms.length; i++) {
              var r = applyM(b, ms[i], ca);
              if (ms[i].promo && r.b[ms[i].to])
                r.b[ms[i].to] = { t: "Q", c: c };
              var v = minimax(
                r.b,
                depth - 1,
                alpha,
                beta,
                false,
                op(c),
                r.ep,
                r.ca,
              );
              if (v > best) best = v;
              if (v > alpha) alpha = v;
              if (beta <= alpha) break;
            }
            return best;
          } else {
            var best = Infinity;
            for (var i = 0; i < ms.length; i++) {
              var r = applyM(b, ms[i], ca);
              if (ms[i].promo && r.b[ms[i].to])
                r.b[ms[i].to] = { t: "Q", c: c };
              var v = minimax(
                r.b,
                depth - 1,
                alpha,
                beta,
                true,
                op(c),
                r.ep,
                r.ca,
              );
              if (v < best) best = v;
              if (v < beta) beta = v;
              if (beta <= alpha) break;
            }
            return best;
          }
        }

        function bestM(b, c, ep, ca, depth) {
          var ms = legalM(b, c, ep, ca);
          if (!ms.length) return null;
          if (diff === 1 && Math.random() < 0.55)
            return ms[Math.floor(Math.random() * ms.length)];
          ms = orderM(ms);
          var bm = null,
            bv = c === "w" ? -Infinity : Infinity,
            al = -Infinity,
            be = Infinity;
          for (var i = 0; i < ms.length; i++) {
            var r = applyM(b, ms[i], ca);
            if (ms[i].promo && r.b[ms[i].to]) r.b[ms[i].to] = { t: "Q", c: c };
            var v = minimax(
              r.b,
              depth - 1,
              al,
              be,
              c === "b",
              op(c),
              r.ep,
              r.ca,
            );
            if (c === "w" ? v > bv : v < bv) {
              bv = v;
              bm = ms[i];
            }
            if (c === "w") al = Math.max(al, v);
            else be = Math.min(be, v);
          }
          return bm;
        }

        // =============================================
        // UI
        // =============================================

        function fmtT(s) {
          var m = Math.floor(s / 60),
            sc = s % 60;
          return (m < 10 ? "0" : "") + m + ":" + (sc < 10 ? "0" : "") + sc;
        }

        function startTimer() {
          if (tmrInt) clearInterval(tmrInt);
          tmrInt = setInterval(function () {
            if (gOver) {
              clearInterval(tmrInt);
              return;
            }
            tmrs[trn]--;
            updateTimers();
            if (tmrs[trn] <= 0) {
              clearInterval(tmrInt);
              gOver = true;
              showEnd(
                "⏰",
                "Time's Up!",
                (trn === "w" ? "Black" : "White") + " wins on time!",
              );
            }
          }, 1000);
        }

        function updateTimers() {
          var topC = flipped ? plColor : op(plColor),
            botC = flipped ? op(plColor) : plColor;
          var te = document.getElementById("t-" + topC),
            be = document.getElementById("t-" + botC);
          if (te) {
            te.textContent = fmtT(tmrs[topC]);
            te.className = "ptimer" + (tmrs[topC] < 30 ? " low" : "");
          }
          if (be) {
            be.textContent = fmtT(tmrs[botC]);
            be.className = "ptimer" + (tmrs[botC] < 30 ? " low" : "");
          }
        }

        function buildBar() {
          var bar = document.getElementById("players-bar");
          var topC = flipped ? plColor : op(plColor),
            botC = flipped ? op(plColor) : plColor;
          bar.innerHTML = "";
          function mkCard(c, isRight) {
            var isAI = c !== plColor;
            var d = document.createElement("div");
            d.className = "ppill" + (isRight ? " right" : "");
            d.id = "card-" + c;
            var av = document.createElement("div");
            av.className = "pava";
            av.textContent = isAI ? "🤖" : "👤";
            var info = document.createElement("div");
            info.className = "pinfo";
            var nm = document.createElement("div");
            nm.className = "pname";
            nm.textContent =
              (isAI ? "AI – " : "You – ") + (c === "w" ? "White" : "Black");
            var ti = document.createElement("div");
            ti.className = "ptimer";
            ti.id = "t-" + c;
            ti.textContent = fmtT(tmrs[c]);
            var cp = document.createElement("div");
            cp.className = "pcap";
            cp.id = "cap-" + c;
            info.appendChild(nm);
            info.appendChild(ti);
            info.appendChild(cp);
            if (isRight) {
              d.appendChild(info);
              d.appendChild(av);
            } else {
              d.appendChild(av);
              d.appendChild(info);
            }
            return d;
          }
          bar.appendChild(mkCard(topC, false));
          bar.appendChild(mkCard(botC, true));
        }

        function updCards() {
          ["w", "b"].forEach(function (c) {
            var cd = document.getElementById("card-" + c);
            if (!cd) return;
            cd.classList.toggle("active", trn === c);
            var cp = document.getElementById("cap-" + c);
            if (cp) {
              var lst = c === "w" ? capW : capB;
              cp.textContent = lst
                .map(function (p) {
                  return p.c === "w" ? WS[p.t] : BS[p.t];
                })
                .join("");
            }
          });
          updateTimers();
        }

        // Board rendering — WHITE always at bottom conceptually (rank 1), BLACK at top (rank 8)
        // With flipped=false: bottom = rank 1 (row index 7), top = rank 8 (row index 0)
        // With flipped=true: bottom = rank 8 (row index 0), top = rank 1 (row index 7)
        function buildBoard() {
          // ranks[0] = top-most visible rank, ranks[7] = bottom-most visible rank
          // NOT flipped: row 0 at top (rank 8, black) → row 7 at bottom (rank 1, white)
          // Flipped: row 7 at top (rank 1, white) → row 0 at bottom (rank 8, black)
          var ranks = flipped
            ? [7, 6, 5, 4, 3, 2, 1, 0]
            : [0, 1, 2, 3, 4, 5, 6, 7];
          var files = flipped
            ? [7, 6, 5, 4, 3, 2, 1, 0]
            : [0, 1, 2, 3, 4, 5, 6, 7];

          // File labels
          var ft = document.getElementById("file-top"),
            fb = document.getElementById("file-bot");
          ft.innerHTML = "";
          fb.innerHTML = "";
          var spc1 = document.createElement("div");
          spc1.className = "coord-spc";
          ft.appendChild(spc1.cloneNode());
          fb.appendChild(spc1.cloneNode());
          files.forEach(function (fi) {
            var a = document.createElement("div");
            a.className = "coord-f";
            a.textContent = FILES[fi];
            ft.appendChild(a);
            var b2 = document.createElement("div");
            b2.className = "coord-f";
            b2.textContent = FILES[fi];
            fb.appendChild(b2);
          });
          ft.appendChild(spc1.cloneNode());
          fb.appendChild(spc1.cloneNode());

          // Rank labels
          var rl = document.getElementById("rank-left"),
            rr = document.getElementById("rank-right");
          rl.innerHTML = "";
          rr.innerHTML = "";
          ranks.forEach(function (ri) {
            // rank number: row0=rank8 (black, top when not flipped), row7=rank1 (white, bottom)
            var rankNum = flipped ? ri + 1 : 8 - ri;
            var a = document.createElement("div");
            a.className = "coord-r";
            a.textContent = rankNum;
            rl.appendChild(a);
            var b2 = document.createElement("div");
            b2.className = "coord-r";
            b2.textContent = rankNum;
            rr.appendChild(b2);
          });

          // Squares — a1 (row7,file0) is dark in standard chess → (row+file)%2===1 is light
          var cb = document.getElementById("chess-board");
          cb.innerHTML = "";
          ranks.forEach(function (ri) {
            files.forEach(function (fi) {
              var sqI = IX(ri, fi);
              var d = document.createElement("div");
              // a1=row7,file0: sum=7(odd)=dark → odd=dark, even=light
              d.className = "sq " + ((ri + fi) % 2 !== 0 ? "dark" : "light");
              d.id = "sq" + sqI;
              (function (si) {
                d.onclick = function () {
                  handleClick(si);
                };
              })(sqI);
              cb.appendChild(d);
            });
          });
          renderPcs();
        }

        function renderPcs() {
          for (var i = 0; i < 64; i++) {
            var el = document.getElementById("sq" + i);
            if (!el) continue;
            el.className = el.className
              .replace(/\s*(sel|lmf|lmt|chk|dot|cap|hint)\s*/g, " ")
              .trim();
            while (el.firstChild) el.removeChild(el.firstChild);
            if (bd[i]) {
              var p = bd[i];
              var sp = document.createElement("span");
              sp.className = "piece " + (p.c === "w" ? "wp" : "bp");
              sp.textContent = p.c === "w" ? WS[p.t] : BS[p.t];
              el.appendChild(sp);
            }
          }
          if (lastMv) {
            var lf = document.getElementById("sq" + lastMv.from);
            var lt = document.getElementById("sq" + lastMv.to);
            if (lf) lf.classList.add("lmf");
            if (lt) lt.classList.add("lmt");
          }
          if (selSq !== null) {
            var se = document.getElementById("sq" + selSq);
            if (se) se.classList.add("sel");
            vmoves.forEach(function (m) {
              var me = document.getElementById("sq" + m.to);
              if (!me) return;
              if (bd[m.to] || m.epCap !== undefined) me.classList.add("cap");
              else me.classList.add("dot");
            });
          }
          if (inCk(bd, trn, epSq, cast)) {
            var kp = fKing(bd, trn);
            var ke = document.getElementById("sq" + kp);
            if (ke) ke.classList.add("chk");
          }
          updCards();
        }

        function handleClick(sqI) {
          if (gOver || trn !== plColor) return;
          var piece = bd[sqI];
          if (selSq === null) {
            if (piece && piece.c === plColor) {
              selSq = sqI;
              vmoves = legalM(bd, plColor, epSq, cast).filter(function (m) {
                return m.from === sqI;
              });
              renderPcs();
            }
          } else {
            var mv = null;
            for (var i = 0; i < vmoves.length; i++)
              if (vmoves[i].to === sqI) {
                mv = vmoves[i];
                break;
              }
            if (mv) {
              if (mv.promo) showPromo(mv);
              else execMove(mv, null);
            } else if (piece && piece.c === plColor) {
              selSq = sqI;
              vmoves = legalM(bd, plColor, epSq, cast).filter(function (m) {
                return m.from === sqI;
              });
              renderPcs();
            } else {
              selSq = null;
              vmoves = [];
              renderPcs();
            }
          }
        }

        function execMove(mv, promoT) {
          moveHist.push({
            bd: bd.slice(),
            cast: JSON.parse(JSON.stringify(cast)),
            ep: epSq,
            trn: trn,
            cW: capW.slice(),
            cB: capB.slice(),
            lm: lastMv ? JSON.parse(JSON.stringify(lastMv)) : null,
          });
          var res = applyM(bd, mv, cast);
          bd = res.b;
          cast = res.ca;
          epSq = res.ep;
          if (mv.promo || promoT) {
            bd[mv.to] = { t: promoT || "Q", c: trn };
          }
          if (mv.cap) {
            (trn === "w" ? capW : capB).push(mv.cap);
          }
          if (mv.epCap !== undefined) {
            (trn === "w" ? capW : capB).push({ t: "P", c: op(trn) });
          }
          lastMv = mv;
          selSq = null;
          vmoves = [];
          trn = op(trn);
          renderPcs();
          checkEnd();
          if (!gOver && trn !== plColor) setTimeout(aiGo, 320);
        }

        function aiGo() {
          if (gOver) return;
          var toast = document.getElementById("ai-toast");
          toast.style.display = "block";
          setTimeout(function () {
            try {
              var depth = diff === 1 ? 2 : diff === 2 ? 3 : 4;
              var mv = bestM(bd, op(plColor), epSq, cast, depth);
              toast.style.display = "none";
              if (mv) {
                var aiC = op(plColor);
                moveHist.push({
                  bd: bd.slice(),
                  cast: JSON.parse(JSON.stringify(cast)),
                  ep: epSq,
                  trn: trn,
                  cW: capW.slice(),
                  cB: capB.slice(),
                  lm: lastMv ? JSON.parse(JSON.stringify(lastMv)) : null,
                });
                var res = applyM(bd, mv, cast);
                bd = res.b;
                cast = res.ca;
                epSq = res.ep;
                if (mv.promo && bd[mv.to]) bd[mv.to] = { t: "Q", c: aiC };
                if (mv.cap) (trn === "w" ? capW : capB).push(mv.cap);
                if (mv.epCap !== undefined)
                  (trn === "w" ? capW : capB).push({ t: "P", c: op(trn) });
                lastMv = mv;
                trn = op(trn);
                renderPcs();
                checkEnd();
              }
            } catch (e) {
              logErr("AI err:" + e);
              document.getElementById("ai-toast").style.display = "none";
            }
          }, 60);
        }

        function checkEnd() {
          var ms = legalM(bd, trn, epSq, cast);
          if (!ms.length) {
            gOver = true;
            clearInterval(tmrInt);
            if (inCk(bd, trn, epSq, cast)) {
              showEnd(
                "♛",
                "Checkmate!",
                (trn === "w" ? "Black" : "White") + " wins! Brilliant play.",
              );
            } else showEnd("🤝", "Stalemate!", "It's a draw — no legal moves.");
          }
        }

        function undoMove() {
          if (moveHist.length < 2) return;
          moveHist.pop();
          var st = moveHist.pop();
          bd = st.bd;
          cast = st.cast;
          epSq = st.ep;
          trn = st.trn;
          capW = st.cW;
          capB = st.cB;
          lastMv = st.lm;
          gOver = false;
          selSq = null;
          vmoves = [];
          renderPcs();
        }

        function showHint() {
          if (gOver || trn !== plColor) return;
          if (hintTmr) clearTimeout(hintTmr);
          document.querySelectorAll(".hint").forEach(function (e) {
            e.classList.remove("hint");
          });
          var depth = diff === 1 ? 2 : diff === 2 ? 3 : 4;
          var mv = bestM(bd, plColor, epSq, cast, depth);
          if (!mv) return;
          var hf = document.getElementById("sq" + mv.from),
            ht = document.getElementById("sq" + mv.to);
          if (hf) hf.classList.add("hint");
          if (ht) ht.classList.add("hint");
          hintTmr = setTimeout(function () {
            document.querySelectorAll(".hint").forEach(function (e) {
              e.classList.remove("hint");
            });
          }, 2500);
        }

        function flipBoard() {
          flipped = !flipped;
          buildBoard();
          buildBar();
        }

        function goMenu() {
          clearInterval(tmrInt);
          gOver = true;
          document.getElementById("end-modal").classList.remove("show");
          document.getElementById("game").classList.remove("active");
          document.getElementById("setup").classList.add("active");
        }

        function restart() {
          document.getElementById("end-modal").classList.remove("show");
          plColor = chColor;
          diff = chDiff;
          flipped = plColor === "b";
          initBd();
          buildBar();
          buildBoard();
          startTimer();
          if (plColor === "b") setTimeout(aiGo, 600);
        }

        function showPromo(mv) {
          var pd = document.getElementById("promo-pieces");
          pd.innerHTML = "";
          ["Q", "R", "B", "N"].forEach(function (pt) {
            var sym = plColor === "w" ? WS[pt] : BS[pt];
            var btn = document.createElement("button");
            btn.className = "pbtn";
            btn.textContent = sym;
            (function (t) {
              btn.onclick = function () {
                document.getElementById("promo-modal").classList.remove("show");
                execMove(mv, t);
              };
            })(pt);
            pd.appendChild(btn);
          });
          document.getElementById("promo-modal").classList.add("show");
        }

        function showEnd(icon, title, sub) {
          document.getElementById("end-icon").textContent = icon;
          document.getElementById("end-title").textContent = title;
          document.getElementById("end-sub").textContent = sub;
          document.getElementById("end-modal").classList.add("show");
        }

        function selColor(c) {
          chColor = c;
          document.getElementById("pw").classList.toggle("sel", c === "w");
          document.getElementById("pb").classList.toggle("sel", c === "b");
        }
        function selDiff(d) {
          chDiff = d;
          document.getElementById("de").classList.toggle("sel", d === 1);
          document.getElementById("dm").classList.toggle("sel", d === 2);
          document.getElementById("dh").classList.toggle("sel", d === 3);
        }

        function startGame() {
          plColor = chColor;
          diff = chDiff;
          flipped = plColor === "b";
          initBd();
          document.getElementById("setup").classList.remove("active");
          document.getElementById("game").classList.add("active");
          buildBar();
          buildBoard();
          startTimer();
          if (plColor === "b") setTimeout(aiGo, 600);
        }

        function logErr(m) {
          var el = document.getElementById("error-log");
          el.style.display = "block";
          el.textContent += m + "\n";
        }
        window.onerror = function (m, s, l) {
          logErr(m + " (ln " + l + ")");
        };
      } catch (e) {
        var el = document.getElementById("error-log");
        if (el) {
          el.style.display = "block";
          el.textContent = "Crit: " + e + "\n" + (e.stack || "");
        } else alert("Error: " + e);
      }
    </script>
  </body>
</html>
