<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chess - 1click Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --wood-dark: #5d3a1a;
  --wood-med: #8b5a2b;
  --wood-light: #c4a35a;
  --board-frame: #6b4423;
  --sq-light: #f0d9b5;
  --sq-dark: #b58863;
  --highlight: #7cb342;
  --panel: #5d4037;
  --text: #fff8e1;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #3e2723 0%, #5d3a1a 50%, #3e2723 100%);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

header a { color: var(--text); text-decoration: none; }

.page { display: none; flex: 1; flex-direction: column; align-items: center; padding: 0.5rem; overflow-y: auto; }
.page.active { display: flex; }

.setup-title { text-align: center; margin: 1.5rem 0; }
.setup-title h1 { font-size: 2rem; background: linear-gradient(135deg, var(--wood-light), #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.card {
  background: linear-gradient(145deg, var(--panel), rgba(0,0,0,0.3));
  border-radius: 16px;
  padding: 1rem;
  border: 1px solid var(--wood-light);
  width: 100%;
  max-width: 360px;
  margin: 0.5rem 0;
}

.card h3 { font-size: 0.75rem; color: #aaa; text-transform: uppercase; margin-bottom: 0.8rem; }

.opts { display: flex; gap: 0.5rem; }

.opt-btn {
  flex: 1;
  padding: 0.8rem;
  border-radius: 12px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.1);
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
  font-size: 0.9rem;
  text-align: center;
}

.opt-btn:hover { background: rgba(255,255,255,0.15); }
.opt-btn.sel { border-color: var(--wood-light); background: rgba(255,215,0,0.15); box-shadow: 0 0 15px rgba(255,215,0,0.2); }

.play-btn {
  width: 100%;
  max-width: 360px;
  padding: 1rem;
  margin-top: 1.5rem;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: white;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(76,175,80,0.4);
}

.play-btn:active { transform: translateY(2px); }

.players {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 500px;
  padding: 0.5rem;
  gap: 1rem;
}

.p-card {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: linear-gradient(135deg, var(--panel), var(--wood-dark));
  padding: 0.5rem 0.8rem;
  border-radius: 25px;
  border: 2px solid var(--wood-light);
  flex: 1;
}

.p-card.active { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }

.p-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--wood-light), var(--wood-med)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 2px solid var(--text); }

.p-name { font-size: 0.8rem; font-weight: 600; }

.board-wrap {
  padding: 10px;
  background: linear-gradient(135deg, var(--board-frame), var(--wood-dark), var(--board-frame));
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  margin: 0.5rem 0;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: min(85vmin, 460px);
  height: min(85vmin, 460px);
  border: 3px solid var(--wood-dark);
}

.square {
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
}

.square.w { background: var(--sq-light); }
.square.b { background: var(--sq-dark); }
.square.sel { background: var(--highlight) !important; }
.square.valid::after { content: ''; position: absolute; width: 30%; height: 30%; background: rgba(0,0,0,0.2); border-radius: 50%; }
.square.capture::after { content: ''; position: absolute; inset: 0; border: 4px solid rgba(0,0,0,0.3); border-radius: 50%; }
.square.check { background: #ef5350 !important; }
.square.last { background: rgba(255,215,0,0.3) !important; }

.piece {
  font-size: clamp(28px, 10vmin, 50px);
  line-height: 1;
  user-select: none;
  filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.4));
}

.piece.W { color: #fff; text-shadow: -1px -1px 0 #bbb, 1px -1px 0 #999, -1px 1px 0 #999, 1px 1px 0 #666; }
.piece.B { color: #222; text-shadow: -1px -1px 0 #555, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

.controls {
  display: flex;
  justify-content: center;
  gap: 1rem;
  padding: 0.8rem;
  margin-top: auto;
}

.c-btn {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(145deg, var(--panel), var(--wood-dark));
  color: var(--text);
  font-size: 1.4rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}

.c-btn:active { transform: translateY(2px); }

.captured { display: flex; justify-content: space-between; width: 100%; max-width: 500px; padding: 0.2rem 1rem; font-size: 1.1rem; min-height: 1.5rem; }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.overlay.show { display: flex; }

.modal-box {
  background: linear-gradient(135deg, var(--panel), var(--wood-dark));
  border-radius: 20px;
  padding: 2rem;
  text-align: center;
  max-width: 300px;
  border: 3px solid var(--wood-light);
}

.modal-box .emoji { font-size: 4rem; margin-bottom: 0.5rem; }
.modal-box h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
.modal-box p { color: #aaa; margin-bottom: 1.5rem; }

.m-btns { display: flex; gap: 0.8rem; }
.m-btn { flex: 1; padding: 0.8rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
.m-btn.p { background: linear-gradient(135deg, #4caf50, #2e7d32); color: white; }
.m-btn.s { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--wood-light); }

.promo-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.promo-overlay.show { display: flex; }

.promo-box { background: linear-gradient(135deg, var(--panel), var(--wood-dark)); border-radius: 16px; padding: 1.5rem; border: 2px solid var(--wood-light); }
.promo-box h3 { margin-bottom: 1rem; text-align: center; }
.p-opts { display: flex; gap: 1rem; }
.p-opt { width: 60px; height: 60px; border-radius: 12px; background: var(--sq-light); border: 3px solid var(--wood-light); font-size: 2.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.p-opt:hover { transform: scale(1.1); border-color: #ffd700; }
</style>
</head>
<body>

<header>
  <a href="../../../index.html">&lt;- Back</a>
  <span>Chess</span>
  <span></span>
</header>

<div id="setup-page" class="page active">
  <div class="setup-title">
    <h1>Chess</h1>
    <p style="color:#aaa;margin-top:0.3rem">Play against AI</p>
  </div>
  
  <div class="card">
    <h3>Play As</h3>
    <div class="opts">
      <button class="opt-btn sel" id="opt-white">White</button>
      <button class="opt-btn" id="opt-black">Black</button>
    </div>
  </div>
  
  <div class="card">
    <h3>Difficulty</h3>
    <div class="opts">
      <button class="opt-btn" id="opt-easy">Easy</button>
      <button class="opt-btn sel" id="opt-med">Medium</button>
      <button class="opt-btn" id="opt-hard">Hard</button>
    </div>
  </div>
  
  <button class="play-btn" id="btn-play">PLAY CHESS</button>
</div>

<div id="game-page" class="page">
  <div class="players">
    <div class="p-card" id="p-black">
      <div class="p-avatar">AI</div>
      <div>
        <div class="p-name" id="name-black">Computer</div>
      </div>
    </div>
    <div class="p-card active" id="p-white">
      <div class="p-avatar">P</div>
      <div>
        <div class="p-name" id="name-white">You</div>
      </div>
    </div>
  </div>
  
  <div class="captured">
    <span id="cap-black"></span>
    <span id="cap-white"></span>
  </div>
  
  <div class="board-wrap">
    <div id="board"></div>
  </div>
  
  <div class="controls">
    <button class="c-btn" id="ctrl-menu">Menu</button>
  </div>
</div>

<div id="overlay-end" class="overlay">
  <div class="modal-box">
    <div class="emoji" id="end-emoji">Trophy</div>
    <h2 id="end-title">Game Over</h2>
    <p id="end-msg">Result</p>
    <div class="m-btns">
      <button class="m-btn p" id="end-again">Again</button>
      <button class="m-btn s" id="end-menu">Menu</button>
    </div>
  </div>
</div>

<script>
// Simple chess game
var PIECES = { K:'K', Q:'Q', R:'R', B:'B', N:'N', P:'P', k:'k', q:'q', r:'r', b:'b', n:'n', p:'p' };

var game = {
  board: [],
  turn: 'white',
  player: 'white',
  sel: null,
  over: false
};

function createBoard() {
  return [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

function init() {
  // Setup buttons
  document.getElementById('opt-white').onclick = function() { setColor('white'); };
  document.getElementById('opt-black').onclick = function() { setColor('black'); };
  document.getElementById('opt-easy').onclick = function() { setDiff('easy'); };
  document.getElementById('opt-med').onclick = function() { setDiff('medium'); };
  document.getElementById('opt-hard').onclick = function() { setDiff('hard'); };
  document.getElementById('btn-play').onclick = startGame;
  document.getElementById('ctrl-menu').onclick = showSetup;
  document.getElementById('end-again').onclick = startGame;
  document.getElementById('end-menu').onclick = showSetup;
}

function setColor(c) {
  game.player = c;
  document.getElementById('opt-white').classList.toggle('sel', c === 'white');
  document.getElementById('opt-black').classList.toggle('sel', c === 'black');
}

function setDiff(d) {
  document.getElementById('opt-easy').classList.toggle('sel', d === 'easy');
  document.getElementById('opt-med').classList.toggle('sel', d === 'medium');
  document.getElementById('opt-hard').classList.toggle('sel', d === 'hard');
}

function startGame() {
  game.board = createBoard();
  game.turn = 'white';
  game.sel = null;
  game.over = false;
  
  document.getElementById('overlay-end').classList.remove('show');
  document.getElementById('setup-page').classList.remove('active');
  document.getElementById('game-page').classList.add('active');
  
  var isWhite = game.player === 'white';
  document.getElementById('name-white').textContent = isWhite ? 'You' : 'Computer';
  document.getElementById('name-black').textContent = isWhite ? 'Computer' : 'You';
  
  drawBoard();
  updateTurn();
}

function showSetup() {
  document.getElementById('game-page').classList.remove('active');
  document.getElementById('setup-page').classList.add('active');
  document.getElementById('overlay-end').classList.remove('show');
}

function drawBoard() {
  var b = document.getElementById('board');
  b.innerHTML = '';
  
  var flip = game.player === 'black';
  
  for (var r = 0; r < 8; r++) {
    for (var c = 0; c < 8; c++) {
      var sq = document.createElement('div');
      var br = flip ? 7-r : r;
      var bc = flip ? 7-c : c;
      var pc = game.board[br][bc];
      
      sq.className = 'square ' + ((r+c)%2 === 0 ? 'w' : 'b');
      
      if (game.sel && game.sel[0] === br && game.sel[1] === bc) {
        sq.classList.add('sel');
      }
      
      if (pc) {
        var p = document.createElement('span');
        p.className = 'piece ' + (pc === pc.toUpperCase() ? 'W' : 'B');
        p.textContent = PIECES[pc];
        sq.appendChild(p);
      }
      
      (function(br, bc) {
        sq.onclick = function() { onClick(br, bc); };
      })(br, bc);
      
      b.appendChild(sq);
    }
  }
}

function onClick(r, c) {
  if (game.over) return;
  
  var pc = game.board[r][c];
  
  if (game.sel) {
    // Move piece
    game.board[r][c] = game.board[game.sel[0]][game.sel[1]];
    game.board[game.sel[0]][game.sel[1]] = '';
    game.sel = null;
    game.turn = game.turn === 'white' ? 'black' : 'white';
    drawBoard();
    updateTurn();
    return;
  }
  
  if (pc) {
    game.sel = [r, c];
    drawBoard();
  }
}

function updateTurn() {
  document.getElementById('p-white').classList.toggle('active', game.turn === 'white');
  document.getElementById('p-black').classList.toggle('active', game.turn === 'black');
}

// Initialize
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
