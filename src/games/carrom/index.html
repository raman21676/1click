<script>
// ============================================
// CARROM GAME - CORRECT IMPLEMENTATION
// ============================================

const canvas=document.getElementById("cv")
const ctx=canvas.getContext("2d")

// Board constants
const W=700,H=700
const BOARD_MARGIN=65  // Tight boundary - striker stays strictly inside wooden frame
const PLAY_MIN=BOARD_MARGIN
const PLAY_MAX=W-BOARD_MARGIN
const FRICTION=0.985
const WALL_BOUNCE=0.8

// Sizes (proportional to 700px board)
const COIN_R=10      // Carrommen radius (slightly smaller)
const STRIKER_R=14   // Striker radius
const POCKET_R=28    // Exact size of black holes for perfect alignment

// Game state
let mode="pass"      // "pass" or "ai"
let turn=1           // 1 or 2
let turnCount=1
let score1=0,score2=0
let p1Name="Player 1",p2Name="Player 2"
let gameOver=false

// 4 Corner pockets - exactly at black holes (green arrows)
// Adjusted for 130% zoom to align with visible board corners
const POCKETS=[
  {x:25,y:25},      // Top-left black hole
  {x:675,y:25},     // Top-right black hole
  {x:25,y:675},     // Bottom-left black hole
  {x:675,y:675}     // Bottom-right black hole
]

// Striker baseline positions (Y coordinates)
// Striker must be BETWEEN these baselines
const BASELINE_Y_TOP=130      // Upper baseline (adjusted for 130% zoom)
const BASELINE_Y_BOTTOM=530   // Lower baseline (adjusted for 130% zoom)
const BASELINE_X_MIN=150      // Left limit
const BASELINE_X_MAX=550      // Right limit

// Disk class for coins and striker
class Disk{
  constructor(x,y,r,color,type){
    this.x=x
    this.y=y
    this.r=r
    this.color=color
    this.type=type        // "queen", "white", "black", "striker"
    this.vx=0
    this.vy=0
    this.active=true
    this.inPocket=false
  }
  
  draw(){
    if(!this.active||this.inPocket)return
    
    // Shadow
    ctx.beginPath()
    ctx.arc(this.x+2,this.y+3,this.r,0,Math.PI*2)
    ctx.fillStyle="rgba(0,0,0,0.4)"
    ctx.fill()
    
    // Main disk with gradient
    ctx.beginPath()
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
    
    const grad=ctx.createRadialGradient(
      this.x-this.r*0.3,this.y-this.r*0.3,this.r*0.2,
      this.x,this.y,this.r
    )
    
    if(this.color==="red"){
      // Queen
      grad.addColorStop(0,"#ff6b6b")
      grad.addColorStop(0.5,"#e53935")
      grad.addColorStop(1,"#b71c1c")
    }else if(this.color==="white"){
      grad.addColorStop(0,"#ffffff")
      grad.addColorStop(0.5,"#f5f5f5")
      grad.addColorStop(1,"#cccccc")
    }else{
      // Black
      grad.addColorStop(0,"#555555")
      grad.addColorStop(0.5,"#333333")
      grad.addColorStop(1,"#111111")
    }
    
    ctx.fillStyle=grad
    ctx.fill()
    
    // Rim
    ctx.strokeStyle="rgba(0,0,0,0.3)"
    ctx.lineWidth=1
    ctx.stroke()
    
    // Highlight for 3D effect
    ctx.beginPath()
    ctx.arc(this.x-this.r*0.3,this.y-this.r*0.3,this.r*0.2,0,Math.PI*2)
    ctx.fillStyle="rgba(255,255,255,0.4)"
    ctx.fill()
  }
  
  update(){
    if(!this.active||this.inPocket)return
    
    // Move
    this.x+=this.vx
    this.y+=this.vy
    
    // Friction
    this.vx*=FRICTION
    this.vy*=FRICTION
    
    // Stop if very slow
    if(Math.abs(this.vx)<0.05)this.vx=0
    if(Math.abs(this.vy)<0.05)this.vy=0
    
    // Wall collisions - keep inside wooden frame
    const minX=PLAY_MIN+this.r
    const maxX=PLAY_MAX-this.r
    const minY=PLAY_MIN+this.r
    const maxY=PLAY_MAX-this.r
    
    if(this.x<minX){
      this.x=minX
      this.vx=Math.abs(this.vx)*WALL_BOUNCE
    }
    if(this.x>maxX){
      this.x=maxX
      this.vx=-Math.abs(this.vx)*WALL_BOUNCE
    }
    if(this.y<minY){
      this.y=minY
      this.vy=Math.abs(this.vy)*WALL_BOUNCE
    }
    if(this.y>maxY){
      this.y=maxY
      this.vy=-Math.abs(this.vy)*WALL_BOUNCE
    }
  }
  
  isMoving(){
    return Math.abs(this.vx)>0.1||Math.abs(this.vy)>0.1
  }
}

// Game objects
let coins=[]      // 19 coins (9 white, 9 black, 1 queen)
let striker       // Striker disk

// ============================================
// SETUP FUNCTIONS
// ============================================

function setupCoins(){
  coins=[]
  const cx=W/2
  const cy=H/2
  
  // 1. QUEEN at exact center
  coins.push(new Disk(cx,cy,COIN_R,"red","queen"))
  
  // 2. INNER RING - 6 coins alternating black/white
  // Starting from angle that creates Y-shape toward pockets
  const innerR=COIN_R*2.2
  for(let i=0;i<6;i++){
    const angle=(i*Math.PI/3)+(Math.PI/6)  // Offset for Y-shape
    const x=cx+Math.cos(angle)*innerR
    const y=cy+Math.sin(angle)*innerR
    const color=i%2===0?"black":"white"
    const type=i%2===0?"black":"white"
    coins.push(new Disk(x,y,COIN_R,color,type))
  }
  
  // 3. OUTER RING - 12 coins alternating black/white
  const outerR=COIN_R*4.2
  for(let i=0;i<12;i++){
    const angle=(i*Math.PI/6)
    const x=cx+Math.cos(angle)*outerR
    const y=cy+Math.sin(angle)*outerR
    const color=i%2===0?"white":"black"
    const type=i%2===0?"white":"black"
    coins.push(new Disk(x,y,COIN_R,color,type))
  }
  
  // Total: 1 queen + 6 inner + 12 outer = 19 coins
}

function setupStriker(){
  // Striker positioned BETWEEN the two baselines
  // Player 1 (bottom) uses lower baselines
  // Player 2 (top) uses upper baselines
  let strikerY
  if(turn===1){
    strikerY=BASELINE_Y_BOTTOM-15  // Bottom player - between lower baselines
  }else{
    strikerY=BASELINE_Y_TOP+15     // Top player - between upper baselines
  }
  striker=new Disk(W/2,strikerY,STRIKER_R,"white","striker")
  striker.vx=0
  striker.vy=0
}

// ============================================
// PHYSICS
// ============================================

function checkCollision(a,b){
  const dx=b.x-a.x
  const dy=b.y-a.y
  const dist=Math.sqrt(dx*dx+dy*dy)
  
  if(dist<a.r+b.r&&dist>0.1){
    // Collision normal
    const nx=dx/dist
    const ny=dy/dist
    
    // Separate disks
    const overlap=(a.r+b.r-dist)/2
    a.x-=nx*overlap
    a.y-=ny*overlap
    b.x+=nx*overlap
    b.y+=ny*overlap
    
    // Exchange momentum
    const dvx=b.vx-a.vx
    const dvy=b.vy-a.vy
    const dot=dvx*nx+dvy*ny
    
    if(dot<0){
      const impulse=dot*0.8  // Restitution
      a.vx+=impulse*nx
      a.vy+=impulse*ny
      b.vx-=impulse*nx
      b.vy-=impulse*ny
    }
  }
}

function checkPocket(disk){
  if(!disk.active||disk.inPocket)return false
  
  for(const p of POCKETS){
    const dx=disk.x-p.x
    const dy=disk.y-p.y
    const dist=Math.sqrt(dx*dx+dy*dy)
    
    if(dist<POCKET_R){
      disk.inPocket=true
      disk.active=false
      return true
    }
  }
  return false
}

// ============================================
// GAME LOGIC
// ============================================

let queenPocketed=false
let queenPocketedBy=null
let queenCovered=false

function handlePocketing(disk){
  if(disk.type==="striker"){
    // Foul - striker pocketed
    setupStriker()
    showMessage("Foul! Striker pocketed")
    return
  }
  
  if(disk.type==="queen"){
    queenPocketed=true
    queenPocketedBy=turn
    showMessage("Queen pocketed! Cover it!")
    return
  }
  
  // Regular coin
  if(turn===1){
    if(disk.type==="white"){
      score1++
      // Check if queen is covered
      if(queenPocketed&&queenPocketedBy===1&&!queenCovered){
        queenCovered=true
        score1+=3  // Bonus for queen
        showMessage("Queen covered! +3 points")
      }
    }else{
      // Foul - pocketed opponent's coin
      score2++
      showMessage("Foul! Opponent's coin")
    }
  }else{
    if(disk.type==="black"){
      score2++
      if(queenPocketed&&queenPocketedBy===2&&!queenCovered){
        queenCovered=true
        score2+=3
        showMessage("Queen covered! +3 points")
      }
    }else{
      score2++
      showMessage("Foul! Opponent's coin")
    }
  }
  
  updateScore()
  checkWin()
}

function checkWin(){
  const whiteLeft=coins.filter(c=>c.type==="white"&&c.active).length
  const blackLeft=coins.filter(c=>c.type==="black"&&c.active).length
  
  if(whiteLeft===0||blackLeft===0){
    gameOver=true
    const winner=score1>score2?p1Name:p2Name
    showMessage(`${winner} wins!`)
    setTimeout(()=>{
      if(confirm(`${winner} wins! Play again?`)){
        resetGame()
      }
    },1000)
  }
}

function updateScore(){
  document.getElementById("s1").textContent=score1
  document.getElementById("s2").textContent=score2
}

function showMessage(msg){
  // Could add a message display
  console.log(msg)
}

// ============================================
// TURN SYSTEM
// ============================================

let turnInProgress=false
let coinsMoving=false

function nextTurn(){
  // Check if any coins are still moving
  coinsMoving=false
  for(const c of coins){
    if(c.isMoving()){
      coinsMoving=true
      break
    }
  }
  if(striker.isMoving())coinsMoving=true
  
  if(coinsMoving)return  // Wait for movement to stop
  
  // Return queen if not covered
  if(queenPocketed&&!queenCovered){
    // Return queen to center
    const cx=W/2,cy=H/2
    const queen=coins.find(c=>c.type==="queen")
    if(queen){
      queen.active=true
      queen.inPocket=false
      queen.x=cx+(Math.random()-0.5)*20
      queen.y=cy+(Math.random()-0.5)*20
      queen.vx=0
      queen.vy=0
    }
    queenPocketed=false
    queenPocketedBy=null
    showMessage("Queen returned - not covered!")
  }
  
  // Reset striker
  setupStriker()
  
  // Switch turn
  turn=turn===1?2:1
  turnCount++
  document.getElementById("turnName").textContent=turn===1?p1Name:p2Name
  document.getElementById("turnNum").textContent=turnCount
  
  turnInProgress=false
  
  // AI turn
  if(mode==="ai"&&turn===2){
    setTimeout(aiPlay,1000)
  }
}

// ============================================
// AI
// ============================================

function aiPlay(){
  // Find a target coin
  const targets=coins.filter(c=>c.active&&c.type==="black")
  if(targets.length===0)return
  
  const target=targets[Math.floor(Math.random()*targets.length)]
  
  // Calculate shot
  const dx=target.x-striker.x
  const dy=target.y-striker.y
  const angle=Math.atan2(dy,dx)
  
  // Add some randomness
  const power=8+Math.random()*4
  const accuracy=0.9+Math.random()*0.2
  
  striker.vx=Math.cos(angle)*power*accuracy
  striker.vy=Math.sin(angle)*power*accuracy
  
  // Check turn end
  setInterval(()=>{
    if(!turnInProgress)return
    let moving=false
    for(const c of coins)if(c.isMoving())moving=true
    if(striker.isMoving())moving=true
    if(!moving){
      turnInProgress=true
      nextTurn()
    }
  },500)
}

// ============================================
// INPUT
// ============================================

let dragStart=null
let isDragging=false

function getPos(e){
  const rect=canvas.getBoundingClientRect()
  const scaleX=canvas.width/rect.width
  const scaleY=canvas.height/rect.height
  
  let clientX,clientY
  if(e.touches){
    clientX=e.touches[0].clientX
    clientY=e.touches[0].clientY
  }else{
    clientX=e.clientX
    clientY=e.clientY
  }
  
  return{
    x:(clientX-rect.left)*scaleX,
    y:(clientY-rect.top)*scaleY
  }
}

function shoot(pos){
  if(turnInProgress)return
  
  // Calculate power based on drag distance
  const dx=striker.x-pos.x
  const dy=striker.y-pos.y
  
  // Limit power
  const maxPower=25
  const power=Math.min(Math.sqrt(dx*dx+dy*dy)*0.15,maxPower)
  const angle=Math.atan2(dy,dx)
  
  striker.vx=Math.cos(angle)*power
  striker.vy=Math.sin(angle)*power
  
  turnInProgress=true
}

canvas.addEventListener("mousedown",e=>{
  const pos=getPos(e)
  // Check if clicking near striker
  const dx=pos.x-striker.x
  const dy=pos.y-striker.y
  if(Math.sqrt(dx*dx+dy*dy)<striker.r*2){
    isDragging=true
    dragStart=pos
  }
})

canvas.addEventListener("mousemove",e=>{
  if(!isDragging)return
  dragStart=getPos(e)
})

canvas.addEventListener("mouseup",e=>{
  if(!isDragging)return
  isDragging=false
  shoot(getPos(e))
})

// Touch support
canvas.addEventListener("touchstart",e=>{
  e.preventDefault()
  const pos=getPos(e)
  const dx=pos.x-striker.x
  const dy=pos.y-striker.y
  if(Math.sqrt(dx*dx+dy*dy)<striker.r*2){
    isDragging=true
    dragStart=pos
  }
})

canvas.addEventListener("touchend",e=>{
  e.preventDefault()
  if(!isDragging)return
  isDragging=false
  shoot(getPos(e))
})

// ============================================
// GAME LOOP
// ============================================

function update(){
  // Update all disks
  striker.update()
  
  // Hard boundary - never let striker escape wooden frame
  const boundMin=PLAY_MIN+striker.r
  const boundMax=PLAY_MAX-striker.r
  if(striker.x<boundMin)striker.x=boundMin
  if(striker.x>boundMax)striker.x=boundMax
  if(striker.y<boundMin)striker.y=boundMin
  if(striker.y>boundMax)striker.y=boundMax
  
  for(const c of coins)c.update()
  
  // Collisions
  for(const c of coins)checkCollision(striker,c)
  for(let i=0;i<coins.length;i++){
    for(let j=i+1;j<coins.length;j++){
      checkCollision(coins[i],coins[j])
    }
  }
  
  // Pocket detection
  if(checkPocket(striker))handlePocketing(striker)
  for(const c of coins){
    if(checkPocket(c))handlePocketing(c)
  }
  
  // Check for turn end
  if(turnInProgress){
    let moving=false
    for(const c of coins)if(c.active&&c.isMoving())moving=true
    if(striker.active&&striker.isMoving())moving=true
    
    if(!moving){
      // All stopped - end turn
      setTimeout(nextTurn,500)
      turnInProgress=false
    }
  }
}

function draw(){
  ctx.clearRect(0,0,W,H)
  
  // Draw striker
  striker.draw()
  
  // Draw coins
  for(const c of coins)c.draw()
  
  // Draw drag line
  if(isDragging&&dragStart){
    ctx.beginPath()
    ctx.moveTo(striker.x,striker.y)
    ctx.lineTo(dragStart.x,dragStart.y)
    ctx.strokeStyle="rgba(255,255,255,0.5)"
    ctx.lineWidth=2
    ctx.setLineDash([5,5])
    ctx.stroke()
    ctx.setLineDash([])
    
    // Draw aim circle
    ctx.beginPath()
    ctx.arc(dragStart.x,dragStart.y,8,0,Math.PI*2)
    ctx.fillStyle="rgba(255,255,255,0.8)"
    ctx.fill()
  }
}

function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

// ============================================
// SETUP & START
// ============================================

function startGame(){
  // Get settings
  const modeBtn=document.querySelector(".mode-btn.sel")
  mode=modeBtn?modeBtn.dataset.mode:"pass"
  p1Name=document.getElementById("p1name").value||"Player 1"
  p2Name=document.getElementById("p2name").value||"Player 2"
  
  // Update UI
  document.getElementById("n1").textContent=p1Name
  document.getElementById("n2").textContent=mode==="ai"?"Computer":p2Name
  document.getElementById("turnName").textContent=p1Name
  
  // Show game
  document.getElementById("setup").style.display="none"
  document.getElementById("game").style.display="flex"
  
  // Init game
  resetGame()
  loop()
}

function resetGame(){
  score1=0
  score2=0
  turn=1
  turnCount=1
  gameOver=false
  queenPocketed=false
  queenPocketedBy=null
  queenCovered=false
  turnInProgress=false
  
  updateScore()
  document.getElementById("turnName").textContent=p1Name
  document.getElementById("turnNum").textContent="1"
  
  setupCoins()
  setupStriker()
}

// Mode selection
document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("sel"))
    btn.classList.add("sel")
  })
})
</script>
