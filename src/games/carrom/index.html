<script>
// ============================================
// CARROM GAME - IMAGE BASED WITH PROPER RULES
// ============================================

const canvas=document.getElementById("cv")
const ctx=canvas.getContext("2d")

// Board constants
const W=700,H=700

// Frame and playing area boundaries
const FRAME_INSET=25      // Outer frame inset
const FRAME_THICKNESS=45  // Wooden frame thickness
const PLAY_MIN=FRAME_INSET+FRAME_THICKNESS  // Inner playing boundary
const PLAY_MAX=W-PLAY_MIN

const FRICTION=0.985
const WALL_BOUNCE=0.8

// Sizes
const COIN_R=12      // Coin radius
const STRIKER_R=18   // Striker radius
const POCKET_R=22    // Pocket radius (slightly smaller)

// Game state
let mode="pass"
let turn=1
let turnCount=1
let score1=0,score2=0
let p1Name="Player 1",p2Name="Player 2"
let gameOver=false

// Pockets (at the four corners inside the frame)
const POCKET_INSET=FRAME_INSET+18
const POCKETS=[
  {x:POCKET_INSET,y:POCKET_INSET},
  {x:W-POCKET_INSET,y:POCKET_INSET},
  {x:POCKET_INSET,y:H-POCKET_INSET},
  {x:W-POCKET_INSET,y:H-POCKET_INSET}
]

// Baseline positions (for striker movement)
const BASELINE_OFFSET=70
const STRIKER_Y_TOP=PLAY_MIN+BASELINE_OFFSET
const STRIKER_Y_BOTTOM=PLAY_MAX-BASELINE_OFFSET
const BASELINE_X_MIN=PLAY_MIN+BASELINE_OFFSET
const BASELINE_X_MAX=PLAY_MAX-BASELINE_OFFSET

// Load images
const IMAGES={}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image()
    img.onload=()=>resolve(img)
    img.onerror=reject
    img.src=src
  })
}

async function loadAllImages(){
  try{
    IMAGES.blackCoin=await loadImage("./assets/black-coin.png")
    IMAGES.whiteCoin=await loadImage("./assets/white-coin.png")
    IMAGES.redCoin=await loadImage("./assets/red-coin.png")
    IMAGES.striker=await loadImage("./assets/striker.png")
    IMAGES.centerStar=await loadImage("./assets/center-star.png")
    IMAGES.arrow1=await loadImage("./assets/arrow-1.png")
    IMAGES.arrow2=await loadImage("./assets/arrow-2.png")
    IMAGES.arrow3=await loadImage("./assets/arrow-3.png")
    IMAGES.arrow4=await loadImage("./assets/arrow-4.png")
  }catch(e){
    console.error("Failed to load images:",e)
  }
}

// ============================================
// BOARD DRAWING - EXACT MATCH TO GOAL IMAGE
// ============================================

function drawBoard(){
  // === 1. OUTER BACKGROUND (Dark teal table) ===
  ctx.fillStyle="#2d5a52"
  ctx.fillRect(0,0,W,H)
  
  // === 2. WOODEN FRAME (Thick, with rounded corners) ===
  const frameInset=20  // Slightly smaller inset
  const frameThickness=50
  
  // Main wooden frame - warm brown color
  ctx.fillStyle="#c17f3e"
  ctx.fillRect(frameInset,frameInset,W-frameInset*2,H-frameInset*2)
  
  // Rounded corners for frame (orange-ish wood at corners)
  const cornerR=42  // Larger radius for more rounded corners
  ctx.fillStyle="#d48c45"
  
  // Top-left rounded corner - more pronounced curve
  ctx.beginPath()
  ctx.moveTo(frameInset,frameInset+cornerR)
  ctx.quadraticCurveTo(frameInset,frameInset,frameInset+cornerR,frameInset)
  ctx.lineTo(frameInset+cornerR,frameInset+cornerR)
  ctx.lineTo(frameInset,frameInset+cornerR)
  ctx.fill()
  
  // Draw the curved corner segment properly
  ctx.beginPath()
  ctx.moveTo(frameInset,frameInset+cornerR)
  ctx.arc(frameInset+cornerR,frameInset+cornerR,cornerR,Math.PI,Math.PI*1.5)
  ctx.lineTo(frameInset,frameInset)
  ctx.closePath()
  ctx.fill()
  
  // Top-right rounded corner
  ctx.beginPath()
  ctx.moveTo(W-frameInset-cornerR,frameInset)
  ctx.arc(W-frameInset-cornerR,frameInset+cornerR,cornerR,Math.PI*1.5,0)
  ctx.lineTo(W-frameInset,frameInset)
  ctx.closePath()
  ctx.fill()
  
  // Bottom-left rounded corner
  ctx.beginPath()
  ctx.moveTo(frameInset,H-frameInset-cornerR)
  ctx.arc(frameInset+cornerR,H-frameInset-cornerR,cornerR,Math.PI/2,Math.PI)
  ctx.lineTo(frameInset,H-frameInset)
  ctx.closePath()
  ctx.fill()
  
  // Bottom-right rounded corner
  ctx.beginPath()
  ctx.moveTo(W-frameInset,H-frameInset-cornerR)
  ctx.arc(W-frameInset-cornerR,H-frameInset-cornerR,cornerR,0,Math.PI/2)
  ctx.lineTo(W-frameInset,H-frameInset)
  ctx.closePath()
  ctx.fill()
  
  // === 3. INNER PLAYING SURFACE (Cream/beige) ===
  const innerMargin=frameInset+25
  ctx.fillStyle="#f5e6c8"
  ctx.fillRect(innerMargin,innerMargin,W-innerMargin*2,H-innerMargin*2)
  
  // === 4. CORNER POCKETS (Black circles at exact corners) ===
  const pocketInset=frameInset+22  // More inset
  const POCKET_POSITIONS=[
    {x:pocketInset,y:pocketInset},
    {x:W-pocketInset,y:pocketInset},
    {x:pocketInset,y:H-pocketInset},
    {x:W-pocketInset,y:H-pocketInset}
  ]
  
  for(const p of POCKET_POSITIONS){
    ctx.beginPath()
    ctx.arc(p.x,p.y,22,0,Math.PI*2)
    ctx.fillStyle="#1a1a1a"
    ctx.fill()
    // Inner shadow
    ctx.beginPath()
    ctx.arc(p.x,p.y,18,0,Math.PI*2)
    ctx.fillStyle="#0a0a0a"
    ctx.fill()
  }
  
  // === 5. BASELINE RECTANGLE (Inner boundary lines) ===
  const baselineOffset=65
  const blLeft=innerMargin+baselineOffset
  const blRight=W-innerMargin-baselineOffset
  const blTop=innerMargin+baselineOffset
  const blBottom=H-innerMargin-baselineOffset
  
  // Thin inner rectangle (double line like goal)
  ctx.strokeStyle="#8b6f47"
  ctx.lineWidth=1.5
  ctx.strokeRect(blLeft,blTop,blRight-blLeft,blBottom-blTop)
  ctx.strokeRect(blLeft-3,blTop-3,blRight-blLeft+6,blBottom-blTop+6)
  
  // === 6. BASELINE MARKINGS (Orange/red circles at corners) ===
  ctx.fillStyle="#d4822a"  // Orange-brown like goal
  
  // Four orange circles at corners of baseline (larger, more visible)
  const markerR=14
  ctx.beginPath(); ctx.arc(blLeft+12,blTop+12,markerR,0,Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(blRight-12,blTop+12,markerR,0,Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(blRight-12,blBottom-12,markerR,0,Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(blLeft+12,blBottom-12,markerR,0,Math.PI*2); ctx.fill()
  
  // Inner lighter orange circle
  ctx.fillStyle="#e89a4a"
  const innerMarkerR=8
  ctx.beginPath(); ctx.arc(blLeft+12,blTop+12,innerMarkerR,0,Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(blRight-12,blTop+12,innerMarkerR,0,Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(blRight-12,blBottom-12,innerMarkerR,0,Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(blLeft+12,blBottom-12,innerMarkerR,0,Math.PI*2); ctx.fill()
  
  // === 7. BASELINE END CIRCLES (Small white/gray circles at edges) ===
  const edgeCircleOffset=40
  ctx.fillStyle="rgba(200,200,200,0.6)"
  ctx.strokeStyle="#8b6f47"
  ctx.lineWidth=1
  
  // Top edge circles
  ctx.beginPath(); ctx.arc(blLeft+edgeCircleOffset,blTop-6,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  ctx.beginPath(); ctx.arc(blRight-edgeCircleOffset,blTop-6,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  
  // Bottom edge circles  
  ctx.beginPath(); ctx.arc(blLeft+edgeCircleOffset,blBottom+6,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  ctx.beginPath(); ctx.arc(blRight-edgeCircleOffset,blBottom+6,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  
  // === 8. CORNER ARROWS (Curved indicators) ===
  drawGoalCornerArrows(blLeft,blRight,blTop,blBottom)
  
  // === 9. CENTER STAR (Red 8-pointed star burst) ===
  drawGoalCenterStar()
  
  // === 10. DECORATIVE CIRCLES (Small corner accents) ===
  drawDecorativeCircles()
}

function drawGoalCornerArrows(blLeft,blRight,blTop,blBottom){
  ctx.strokeStyle="#5d4e37"
  ctx.lineWidth=1.5
  
  const arcR=25
  const offset=20
  
  // Top-left corner: arc from top to left
  ctx.beginPath()
  ctx.arc(blLeft+offset,blTop+offset,arcR,Math.PI,Math.PI*1.5)
  ctx.stroke()
  // Arrow head
  drawGoalArrowHead(blLeft+offset+arcR,blTop+offset,0)
  
  // Top-right corner: arc from top to right
  ctx.beginPath()
  ctx.arc(blRight-offset,blTop+offset,arcR,Math.PI*1.5,Math.PI*2)
  ctx.stroke()
  drawGoalArrowHead(blRight-offset,blTop+offset+arcR,Math.PI/2)
  
  // Bottom-right corner: arc from right to bottom
  ctx.beginPath()
  ctx.arc(blRight-offset,blBottom-offset,arcR,0,Math.PI/2)
  ctx.stroke()
  drawGoalArrowHead(blRight-offset-arcR,blBottom-offset,Math.PI)
  
  // Bottom-left corner: arc from left to bottom
  ctx.beginPath()
  ctx.arc(blLeft+offset,blBottom-offset,arcR,Math.PI/2,Math.PI)
  ctx.stroke()
  drawGoalArrowHead(blLeft+offset,blBottom-offset-arcR,Math.PI*1.5)
}

function drawGoalArrowHead(x,y,angle){
  const len=8
  ctx.beginPath()
  ctx.moveTo(x,y)
  ctx.lineTo(x-Math.cos(angle-0.4)*len,y-Math.sin(angle-0.4)*len)
  ctx.moveTo(x,y)
  ctx.lineTo(x-Math.cos(angle+0.4)*len,y-Math.sin(angle+0.4)*len)
  ctx.stroke()
}

function drawDecorativeCircles(){
  // Small white circles near corners (on the cream surface near frame)
  ctx.fillStyle="rgba(255,255,255,0.6)"
  ctx.strokeStyle="#8b7355"
  ctx.lineWidth=1
  
  const pos1=PLAY_MIN+15
  const pos2=PLAY_MAX-15
  
  // Four small circles near corners
  ctx.beginPath(); ctx.arc(pos1,pos1,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  ctx.beginPath(); ctx.arc(pos2,pos1,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  ctx.beginPath(); ctx.arc(pos1,pos2,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
  ctx.beginPath(); ctx.arc(pos2,pos2,5,0,Math.PI*2); ctx.fill(); ctx.stroke()
}

function drawGoalCenterStar(){
  const cx=W/2
  const cy=H/2
  
  // Outer thin circle (faint guide)
  ctx.beginPath()
  ctx.arc(cx,cy,90,0,Math.PI*2)
  ctx.strokeStyle="#8b7355"
  ctx.lineWidth=1
  ctx.stroke()
  
  // Draw the iconic 8-pointed red star burst (like in goal image)
  const outerR=80
  const midR=50
  const innerR=20
  
  // First draw the main 4 red points (N, E, S, W)
  ctx.fillStyle="#c44536"  // Red
  for(let i=0;i<4;i++){
    const angle=(i*Math.PI/2)-Math.PI/2  // 0, 90, 180, 270 degrees
    
    ctx.beginPath()
    ctx.moveTo(cx,cy)
    // Wide triangle for each point
    ctx.lineTo(cx+Math.cos(angle-Math.PI/6)*outerR,cy+Math.sin(angle-Math.PI/6)*outerR)
    ctx.lineTo(cx+Math.cos(angle)*outerR,cy+Math.sin(angle)*outerR)
    ctx.lineTo(cx+Math.cos(angle+Math.PI/6)*outerR,cy+Math.sin(angle+Math.PI/6)*outerR)
    ctx.closePath()
    ctx.fill()
  }
  
  // Draw the diagonal points (NE, SE, SW, NW) - slightly smaller/darker
  ctx.fillStyle="#8b3a2e"  // Darker red
  for(let i=0;i<4;i++){
    const angle=(i*Math.PI/2)  // 45, 135, 225, 315 degrees
    
    ctx.beginPath()
    ctx.moveTo(cx,cy)
    ctx.lineTo(cx+Math.cos(angle-Math.PI/8)*(outerR-10),cy+Math.sin(angle-Math.PI/8)*(outerR-10))
    ctx.lineTo(cx+Math.cos(angle)*(outerR-5),cy+Math.sin(angle)*(outerR-5))
    ctx.lineTo(cx+Math.cos(angle+Math.PI/8)*(outerR-10),cy+Math.sin(angle+Math.PI/8)*(outerR-10))
    ctx.closePath()
    ctx.fill()
  }
  
  // Draw white/background colored separators between points
  ctx.fillStyle="#f5e6c8"
  for(let i=0;i<8;i++){
    const angle=(i*Math.PI/4)-Math.PI/2+Math.PI/8
    ctx.beginPath()
    ctx.moveTo(cx,cy)
    ctx.lineTo(cx+Math.cos(angle-Math.PI/16)*midR,cy+Math.sin(angle-Math.PI/16)*midR)
    ctx.lineTo(cx+Math.cos(angle+Math.PI/16)*midR,cy+Math.sin(angle+Math.PI/16)*midR)
    ctx.fill()
  }
  
  // Center red circle (the focal point)
  ctx.beginPath()
  ctx.arc(cx,cy,innerR,0,Math.PI*2)
  ctx.fillStyle="#d94e3b"
  ctx.fill()
  
  // Center highlight
  ctx.beginPath()
  ctx.arc(cx-3,cy-3,6,0,Math.PI*2)
  ctx.fillStyle="#e85d4a"
  ctx.fill()
}

// (Removed old unused drawing functions - now using goal-style functions)

// Disk class for coins and striker
class Disk{
  constructor(x,y,r,color,type){
    this.x=x
    this.y=y
    this.r=r
    this.color=color
    this.type=type
    this.vx=0
    this.vy=0
    this.active=true
    this.inPocket=false
  }
  
  getImage(){
    if(this.type==="striker")return IMAGES.striker
    if(this.type==="queen")return IMAGES.redCoin
    if(this.type==="black")return IMAGES.blackCoin
    return IMAGES.whiteCoin
  }
  
  draw(){
    if(!this.active||this.inPocket)return
    
    // Always draw flat design (no images)
    ctx.beginPath()
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
    
    if(this.type==="queen"){
      ctx.fillStyle="#c41e3a"  // Red
    }else if(this.type==="black"){
      ctx.fillStyle="#1a1a1a"  // Black
    }else if(this.type==="striker"){
      ctx.fillStyle="#4a6fa5"  // Blue
    }else{
      ctx.fillStyle="#e8e8e8"  // White
    }
    
    ctx.fill()
    
    // Border
    ctx.strokeStyle="rgba(0,0,0,0.4)"
    ctx.lineWidth=1
    ctx.stroke()
    
    // Small highlight
    ctx.beginPath()
    ctx.arc(this.x-2,this.y-2,this.r*0.3,0,Math.PI*2)
    ctx.fillStyle="rgba(255,255,255,0.5)"
    ctx.fill()
  }
  
  update(){
    if(!this.active||this.inPocket)return
    
    // Move
    this.x+=this.vx
    this.y+=this.vy
    
    // Friction
    this.vx*=FRICTION
    this.vy*=FRICTION
    
    // Stop if very slow
    if(Math.abs(this.vx)<0.05)this.vx=0
    if(Math.abs(this.vy)<0.05)this.vy=0
    
    // Wall collisions - keep inside wooden frame
    const minX=PLAY_MIN+this.r
    const maxX=PLAY_MAX-this.r
    const minY=PLAY_MIN+this.r
    const maxY=PLAY_MAX-this.r
    
    if(this.x<minX){
      this.x=minX
      this.vx=Math.abs(this.vx)*WALL_BOUNCE
    }
    if(this.x>maxX){
      this.x=maxX
      this.vx=-Math.abs(this.vx)*WALL_BOUNCE
    }
    if(this.y<minY){
      this.y=minY
      this.vy=Math.abs(this.vy)*WALL_BOUNCE
    }
    if(this.y>maxY){
      this.y=maxY
      this.vy=-Math.abs(this.vy)*WALL_BOUNCE
    }
  }
  
  isMoving(){
    return Math.abs(this.vx)>0.1||Math.abs(this.vy)>0.1
  }
}

// Game objects
let coins=[]      // 19 coins (9 white, 9 black, 1 queen)
let striker       // Striker disk

// ============================================
// SETUP FUNCTIONS
// ============================================

function setupCoins(){
  coins=[]
  const cx=W/2
  const cy=H/2
  
  // 1. QUEEN at exact center
  coins.push(new Disk(cx,cy,COIN_R,"red","queen"))
  
  // Standard carrom setup - tight formation around queen
  const spacing=COIN_R*2.1
  
  // Inner ring - 6 coins
  for(let i=0;i<6;i++){
    const angle=(i*Math.PI/3)
    const x=cx+Math.cos(angle)*spacing
    const y=cy+Math.sin(angle)*spacing
    const type=i%2===0?"black":"white"
    coins.push(new Disk(x,y,COIN_R,type,type))
  }
  
  // Outer positions to complete the pattern (13 more coins)
  // Top and bottom
  coins.push(new Disk(cx,cy-spacing*2,COIN_R,"white","white"))
  coins.push(new Disk(cx,cy+spacing*2,COIN_R,"white","white"))
  
  // Sides
  coins.push(new Disk(cx-spacing*2,cy,COIN_R,"black","black"))
  coins.push(new Disk(cx+spacing*2,cy,COIN_R,"black","black"))
  
  // Diagonal positions
  const diag=spacing*1.5
  coins.push(new Disk(cx-diag,cy-diag,COIN_R,"black","black"))
  coins.push(new Disk(cx+diag,cy-diag,COIN_R,"white","white"))
  coins.push(new Disk(cx-diag,cy+diag,COIN_R,"white","white"))
  coins.push(new Disk(cx+diag,cy+diag,COIN_R,"black","black"))
  
  // Additional positions to make 19 total
  coins.push(new Disk(cx-spacing*2.5,cy-spacing*0.5,COIN_R,"white","white"))
  coins.push(new Disk(cx+spacing*2.5,cy-spacing*0.5,COIN_R,"black","black"))
  coins.push(new Disk(cx-spacing*2.5,cy+spacing*0.5,COIN_R,"black","black"))
  coins.push(new Disk(cx+spacing*2.5,cy+spacing*0.5,COIN_R,"white","white"))
  coins.push(new Disk(cx-spacing*0.5,cy-spacing*2.5,COIN_R,"black","black"))
  coins.push(new Disk(cx+spacing*0.5,cy-spacing*2.5,COIN_R,"black","black"))
  coins.push(new Disk(cx-spacing*0.5,cy+spacing*2.5,COIN_R,"white","white"))
  coins.push(new Disk(cx+spacing*0.5,cy+spacing*2.5,COIN_R,"white","white"))
}

function setupStriker(){
  // Striker positioned exactly BETWEEN the two black baseline lines
  // It slides left-right along this Y position only
  let strikerY
  if(turn===1){
    strikerY=STRIKER_Y_BOTTOM  // Bottom player - on lower baseline
  }else{
    strikerY=STRIKER_Y_TOP     // Top player - on upper baseline
  }
  striker=new Disk(W/2,strikerY,STRIKER_R,"white","striker")
  striker.vx=0
  striker.vy=0
}

// ============================================
// PHYSICS
// ============================================

function checkCollision(a,b){
  const dx=b.x-a.x
  const dy=b.y-a.y
  const dist=Math.sqrt(dx*dx+dy*dy)
  
  if(dist<a.r+b.r&&dist>0.1){
    // Collision normal
    const nx=dx/dist
    const ny=dy/dist
    
    // Separate disks
    const overlap=(a.r+b.r-dist)/2
    a.x-=nx*overlap
    a.y-=ny*overlap
    b.x+=nx*overlap
    b.y+=ny*overlap
    
    // Exchange momentum
    const dvx=b.vx-a.vx
    const dvy=b.vy-a.vy
    const dot=dvx*nx+dvy*ny
    
    if(dot<0){
      const impulse=dot*0.8  // Restitution
      a.vx+=impulse*nx
      a.vy+=impulse*ny
      b.vx-=impulse*nx
      b.vy-=impulse*ny
    }
  }
}

function checkPocket(disk){
  if(!disk.active||disk.inPocket)return false
  
  for(const p of POCKETS){
    const dx=disk.x-p.x
    const dy=disk.y-p.y
    const dist=Math.sqrt(dx*dx+dy*dy)
    
    if(dist<POCKET_R){
      disk.inPocket=true
      disk.active=false
      return true
    }
  }
  return false
}

// ============================================
// GAME LOGIC
// ============================================

let queenPocketed=false
let queenPocketedBy=null
let queenCovered=false

function handlePocketing(disk){
  if(disk.type==="striker"){
    // Foul - striker pocketed
    setupStriker()
    showMessage("Foul! Striker pocketed")
    return
  }
  
  if(disk.type==="queen"){
    queenPocketed=true
    queenPocketedBy=turn
    showMessage("Queen pocketed! Cover it!")
    return
  }
  
  // Regular coin
  if(turn===1){
    if(disk.type==="white"){
      score1++
      // Check if queen is covered
      if(queenPocketed&&queenPocketedBy===1&&!queenCovered){
        queenCovered=true
        score1+=3  // Bonus for queen
        showMessage("Queen covered! +3 points")
      }
    }else{
      // Foul - pocketed opponent's coin
      score2++
      showMessage("Foul! Opponent's coin")
    }
  }else{
    if(disk.type==="black"){
      score2++
      if(queenPocketed&&queenPocketedBy===2&&!queenCovered){
        queenCovered=true
        score2+=3
        showMessage("Queen covered! +3 points")
      }
    }else{
      score2++
      showMessage("Foul! Opponent's coin")
    }
  }
  
  updateScore()
  checkWin()
}

function checkWin(){
  const whiteLeft=coins.filter(c=>c.type==="white"&&c.active).length
  const blackLeft=coins.filter(c=>c.type==="black"&&c.active).length
  
  if(whiteLeft===0||blackLeft===0){
    gameOver=true
    const winner=score1>score2?p1Name:p2Name
    showMessage(`${winner} wins!`)
    setTimeout(()=>{
      if(confirm(`${winner} wins! Play again?`)){
        resetGame()
      }
    },1000)
  }
}

function updateScore(){
  document.getElementById("s1").textContent=score1
  document.getElementById("s2").textContent=score2
}

function showMessage(msg){
  // Could add a message display
  console.log(msg)
}

// ============================================
// TURN SYSTEM
// ============================================

let turnInProgress=false
let coinsMoving=false

function nextTurn(){
  // Check if any coins are still moving
  coinsMoving=false
  for(const c of coins){
    if(c.isMoving()){
      coinsMoving=true
      break
    }
  }
  if(striker.isMoving())coinsMoving=true
  
  if(coinsMoving)return  // Wait for movement to stop
  
  // Return queen if not covered
  if(queenPocketed&&!queenCovered){
    // Return queen to center
    const cx=W/2,cy=H/2
    const queen=coins.find(c=>c.type==="queen")
    if(queen){
      queen.active=true
      queen.inPocket=false
      queen.x=cx+(Math.random()-0.5)*20
      queen.y=cy+(Math.random()-0.5)*20
      queen.vx=0
      queen.vy=0
    }
    queenPocketed=false
    queenPocketedBy=null
    showMessage("Queen returned - not covered!")
  }
  
  // Switch turn FIRST
  turn=turn===1?2:1
  turnCount++
  document.getElementById("turnName").textContent=turn===1?p1Name:p2Name
  document.getElementById("turnNum").textContent=turnCount
  
  // Reset striker for the NEW current player
  setupStriker()
  
  // Reset controls for new turn
  resetControls()
  
  turnInProgress=false
  
  // AI turn
  if(mode==="ai"&&turn===2){
    setTimeout(aiPlay,1000)
  }
}

// ============================================
// AI
// ============================================

function aiPlay(){
  // Find a target coin
  const targets=coins.filter(c=>c.active&&c.type==="black")
  if(targets.length===0)return
  
  const target=targets[Math.floor(Math.random()*targets.length)]
  
  // Calculate shot direction
  const dx=target.x-striker.x
  const dy=target.y-striker.y
  
  // Set aim directly toward target
  aimAngle=Math.atan2(dy,dx)
  aimPower=60+Math.random()*50  // Random power
  
  // Small delay then shoot
  setTimeout(()=>{
    const maxPower=22
    const power=(aimPower/150)*maxPower
    
    // Shoot in OPPOSITE direction of drag (pull back to shoot forward)
    striker.vx=Math.cos(aimAngle+Math.PI)*power
    striker.vy=Math.sin(aimAngle+Math.PI)*power
    
    turnInProgress=true
    cancelAiming()
  },800)
}

// ============================================
// MOBILE-STYLE CONTROLS
// ============================================

// State
let isDraggingSlider=false
let isAimingOnBoard=false
let dragStartPos=null
let dragCurrentPos=null
let aimAngle=0
let aimPower=0

// Slider elements
let sliderContainer,sliderTrack,sliderStriker

// Initialize controls
function initControls(){
  sliderContainer=document.getElementById("sliderContainer")
  sliderTrack=document.getElementById("sliderTrack")
  sliderStriker=document.getElementById("sliderStriker")
  
  // Slider touch/mouse events for positioning
  sliderTrack.addEventListener("mousedown",handleSliderStart)
  sliderTrack.addEventListener("touchstart",handleSliderStart,{passive:false})
  
  document.addEventListener("mousemove",handleSliderMove)
  document.addEventListener("touchmove",handleSliderMove,{passive:false})
  
  document.addEventListener("mouseup",handleSliderEnd)
  document.addEventListener("touchend",handleSliderEnd)
  
  // Board touch events for aiming
  canvas.addEventListener("mousedown",handleBoardStart)
  canvas.addEventListener("touchstart",handleBoardStart,{passive:false})
  
  canvas.addEventListener("mousemove",handleBoardMove)
  canvas.addEventListener("touchmove",handleBoardMove,{passive:false})
  
  canvas.addEventListener("mouseup",handleBoardEnd)
  canvas.addEventListener("touchend",handleBoardEnd)
  canvas.addEventListener("mouseleave",cancelAiming)
  
  updateSliderPosition()
}

// Get position from mouse/touch event
function getEventPos(e,element){
  const rect=element.getBoundingClientRect()
  let clientX,clientY
  
  if(e.touches&&e.touches.length>0){
    clientX=e.touches[0].clientX
    clientY=e.touches[0].clientY
  }else if(e.changedTouches&&e.changedTouches.length>0){
    clientX=e.changedTouches[0].clientX
    clientY=e.changedTouches[0].clientY
  }else{
    clientX=e.clientX
    clientY=e.clientY
  }
  
  return{
    x:clientX-rect.left,
    y:clientY-rect.top
  }
}

// Get canvas position
function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect()
  const scaleX=canvas.width/rect.width
  const scaleY=canvas.height/rect.height
  
  let clientX,clientY
  if(e.touches&&e.touches.length>0){
    clientX=e.touches[0].clientX
    clientY=e.touches[0].clientY
  }else if(e.changedTouches&&e.changedTouches.length>0){
    clientX=e.changedTouches[0].clientX
    clientY=e.changedTouches[0].clientY
  }else{
    clientX=e.clientX
    clientY=e.clientY
  }
  
  return{
    x:(clientX-rect.left)*scaleX,
    y:(clientY-rect.top)*scaleY
  }
}

// SLIDER HANDLERS (Position striker)
function handleSliderStart(e){
  if(turnInProgress)return
  e.preventDefault()
  isDraggingSlider=true
  updateSliderFromEvent(e)
}

function handleSliderMove(e){
  if(!isDraggingSlider)return
  e.preventDefault()
  updateSliderFromEvent(e)
}

function handleSliderEnd(e){
  if(!isDraggingSlider)return
  isDraggingSlider=false
}

function updateSliderFromEvent(e){
  const pos=getEventPos(e,sliderTrack)
  const rect=sliderTrack.getBoundingClientRect()
  let percent=(pos.x/rect.width)*100
  percent=Math.max(0,Math.min(100,percent))
  
  // Update slider visual
  sliderStriker.style.left=percent+"%"
  
  // Update striker position on board
  // Striker center moves from BASELINE_X_MIN to BASELINE_X_MAX (full red circle to red circle)
  const boardRange=BASELINE_X_MAX-BASELINE_X_MIN
  striker.x=BASELINE_X_MIN+(percent/100)*boardRange
}

function updateSliderPosition(){
  if(!striker)return
  // Striker center moves from BASELINE_X_MIN to BASELINE_X_MAX (full red circle to red circle)
  const boardRange=BASELINE_X_MAX-BASELINE_X_MIN
  const percent=((striker.x-BASELINE_X_MIN)/boardRange)*100
  if(sliderStriker)sliderStriker.style.left=Math.max(0,Math.min(100,percent))+"%"
}

// BOARD HANDLERS (Aiming)
function handleBoardStart(e){
  if(turnInProgress)return
  const pos=getCanvasPos(e)
  
  // Check if touching near striker
  const dx=pos.x-striker.x
  const dy=pos.y-striker.y
  const dist=Math.sqrt(dx*dx+dy*dy)
  
  if(dist<striker.r*3){
    isAimingOnBoard=true
    dragStartPos={x:striker.x,y:striker.y}
    dragCurrentPos=pos
    e.preventDefault()
  }
}

function handleBoardMove(e){
  if(!isAimingOnBoard)return
  e.preventDefault()
  dragCurrentPos=getCanvasPos(e)
  
  // Calculate aim angle and power
  const dx=dragCurrentPos.x-dragStartPos.x
  const dy=dragCurrentPos.y-dragStartPos.y
  
  aimAngle=Math.atan2(dy,dx)
  aimPower=Math.min(Math.sqrt(dx*dx+dy*dy),150)  // Max pull distance
}

function handleBoardEnd(e){
  if(!isAimingOnBoard)return
  
  // Shoot if pulled back enough
  if(aimPower>20){
    const maxPower=22
    const power=(aimPower/150)*maxPower
    
    // Shoot in OPPOSITE direction of drag (pull back to shoot forward)
    striker.vx=Math.cos(aimAngle+Math.PI)*power
    striker.vy=Math.sin(aimAngle+Math.PI)*power
    
    turnInProgress=true
  }
  
  cancelAiming()
}

function cancelAiming(){
  isAimingOnBoard=false
  dragStartPos=null
  dragCurrentPos=null
  aimPower=0
}

function resetControls(){
  aimAngle=0
  aimPower=0
  updateSliderPosition()
}

// ============================================
// GAME LOOP
// ============================================

function update(){
  // Update striker
  striker.update()
  
  // Hard boundary - never let striker escape wooden frame
  const boundMin=PLAY_MIN+striker.r
  const boundMax=PLAY_MAX-striker.r
  if(striker.x<boundMin)striker.x=boundMin
  if(striker.x>boundMax)striker.x=boundMax
  if(striker.y<boundMin)striker.y=boundMin
  if(striker.y>boundMax)striker.y=boundMax
  
  for(const c of coins)c.update()
  
  // Collisions
  for(const c of coins)checkCollision(striker,c)
  for(let i=0;i<coins.length;i++){
    for(let j=i+1;j<coins.length;j++){
      checkCollision(coins[i],coins[j])
    }
  }
  
  // Pocket detection
  if(checkPocket(striker))handlePocketing(striker)
  for(const c of coins){
    if(checkPocket(c))handlePocketing(c)
  }
  
  // Check for turn end
  if(turnInProgress){
    let moving=false
    for(const c of coins)if(c.active&&c.isMoving())moving=true
    if(striker.active&&striker.isMoving())moving=true
    
    if(!moving){
      // All stopped - end turn
      setTimeout(nextTurn,500)
      turnInProgress=false
    }
  }
}

function draw(){
  // Draw board background
  drawBoard()
  
  // Draw striker
  striker.draw()
  
  // Draw coins
  for(const c of coins)c.draw()
  
  // Draw aim guide (Mobile game style)
  if(!turnInProgress&&striker&&striker.active){
    if(isAimingOnBoard&&aimPower>10){
      // When dragging to aim - show mobile-style visuals
      const powerRatio=Math.min(aimPower/150,1)
      
      // Shooting angle is OPPOSITE of drag direction
      const shootAngle=aimAngle+Math.PI
      
      // Draw dashed circle around striker (aiming guide)
      ctx.beginPath()
      ctx.arc(striker.x,striker.y,striker.r+25,0,Math.PI*2)
      ctx.strokeStyle="rgba(255,255,255,0.3)"
      ctx.lineWidth=2
      ctx.setLineDash([8,6])
      ctx.stroke()
      ctx.setLineDash([])
      
      // Calculate trajectory end point (in SHOOT direction, opposite of drag)
      const maxLineLen=200
      const lineLen=powerRatio*maxLineLen
      const endX=striker.x+Math.cos(shootAngle)*lineLen
      const endY=striker.y+Math.sin(shootAngle)*lineLen
      
      // Draw dotted trajectory line
      ctx.beginPath()
      ctx.moveTo(striker.x,striker.y)
      ctx.lineTo(endX,endY)
      ctx.setLineDash([6,6])
      ctx.lineWidth=3
      
      // Color based on power: yellow -> orange -> red
      if(powerRatio<0.4){
        ctx.strokeStyle="rgba(250,204,21,0.8)"  // Yellow
      }else if(powerRatio<0.7){
        ctx.strokeStyle="rgba(251,146,60,0.8)"  // Orange  
      }else{
        ctx.strokeStyle="rgba(239,68,68,0.8)"   // Red
      }
      ctx.stroke()
      ctx.setLineDash([])
      
      // Draw solid colored arrow (thicker, more visible)
      const arrowLen=25
      const arrowAngle=0.5
      
      ctx.beginPath()
      ctx.moveTo(striker.x,striker.y)
      ctx.lineTo(endX,endY)
      ctx.lineWidth=6
      // Gradient color based on power
      if(powerRatio<0.4){
        ctx.strokeStyle="#facc15"  // Yellow
      }else if(powerRatio<0.7){
        ctx.strokeStyle="#fb923c"  // Orange
      }else{
        ctx.strokeStyle="#ef4444"  // Red
      }
      ctx.stroke()
      
      // Arrow head (pointing in shoot direction)
      ctx.beginPath()
      ctx.moveTo(endX,endY)
      ctx.lineTo(
        endX-Math.cos(shootAngle-arrowAngle)*arrowLen,
        endY-Math.sin(shootAngle-arrowAngle)*arrowLen
      )
      ctx.moveTo(endX,endY)
      ctx.lineTo(
        endX-Math.cos(shootAngle+arrowAngle)*arrowLen,
        endY-Math.sin(shootAngle+arrowAngle)*arrowLen
      )
      ctx.lineWidth=5
      ctx.stroke()
      
      // Draw pull line (from striker to finger)
      if(dragCurrentPos){
        ctx.beginPath()
        ctx.moveTo(striker.x,striker.y)
        ctx.lineTo(dragCurrentPos.x,dragCurrentPos.y)
        ctx.strokeStyle="rgba(255,255,255,0.3)"
        ctx.lineWidth=2
        ctx.setLineDash([4,4])
        ctx.stroke()
        ctx.setLineDash([])
      }
      
      // Power percentage display
      ctx.font="bold 16px Poppins,sans-serif"
      ctx.textAlign="center"
      ctx.fillStyle="white"
      ctx.fillText(Math.round(powerRatio*100)+"%",endX,endY-15)
      
    }else{
      // Not aiming - show simple direction hint toward center
      const cx=W/2
      const cy=H/2
      const angle=Math.atan2(cy-striker.y,cx-striker.x)
      const hintLen=40
      
      ctx.beginPath()
      ctx.moveTo(striker.x,striker.y)
      ctx.lineTo(striker.x+Math.cos(angle)*hintLen,striker.y+Math.sin(angle)*hintLen)
      ctx.strokeStyle="rgba(34,197,94,0.5)"
      ctx.lineWidth=3
      ctx.stroke()
      
      // Small arrow head
      ctx.beginPath()
      ctx.moveTo(striker.x+Math.cos(angle)*hintLen,striker.y+Math.sin(angle)*hintLen)
      ctx.lineTo(
        striker.x+Math.cos(angle)*hintLen-Math.cos(angle-0.4)*8,
        striker.y+Math.sin(angle)*hintLen-Math.sin(angle-0.4)*8
      )
      ctx.moveTo(striker.x+Math.cos(angle)*hintLen,striker.y+Math.sin(angle)*hintLen)
      ctx.lineTo(
        striker.x+Math.cos(angle)*hintLen-Math.cos(angle+0.4)*8,
        striker.y+Math.sin(angle)*hintLen-Math.sin(angle+0.4)*8
      )
      ctx.stroke()
    }
  }
}

function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

// ============================================
// SETUP & START
// ============================================

async function startGame(){
  // Load images first
  await loadAllImages()
  
  // Get settings
  const modeBtn=document.querySelector(".mode-btn.sel")
  mode=modeBtn?modeBtn.dataset.mode:"pass"
  p1Name=document.getElementById("p1name").value||"Player 1"
  p2Name=document.getElementById("p2name").value||"Player 2"
  
  // Update UI
  document.getElementById("n1").textContent=p1Name
  document.getElementById("n2").textContent=mode==="ai"?"Computer":p2Name
  document.getElementById("turnName").textContent=p1Name
  
  // Show game
  document.getElementById("setup").style.display="none"
  document.getElementById("game").style.display="flex"
  
  // Init game first (creates striker)
  resetGame()
  loop()
  
  // Then init controls (needs striker to exist)
  setTimeout(initControls,100)
}

function resetGame(){
  score1=0
  score2=0
  turn=1
  turnCount=1
  gameOver=false
  queenPocketed=false
  queenPocketedBy=null
  queenCovered=false
  turnInProgress=false
  
  updateScore()
  document.getElementById("turnName").textContent=p1Name
  document.getElementById("turnNum").textContent="1"
  
  setupCoins()
  setupStriker()
  resetControls()
}

// Mode selection
document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("sel"))
    btn.classList.add("sel")
  })
})

// Initialize button controls when page loads
document.addEventListener("DOMContentLoaded",initControls)
