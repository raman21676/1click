<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="description" content="Play Carrom online FREE! Strike coins, cover the Queen. Realistic physics. 1-2 players. No download!">
<title>Carrom Online Free | Play Carrom Board Game - 1click</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;
  --bg-grad:radial-gradient(ellipse at 30% 20%,#1a1f3a 0%,#0a0e1a 50%,#050810 100%);
  --green:#22c55e;--red:#ef4444;--gold:#f59e0b;
  --ui:#1e293b;--ui2:#334155;--text:#f1f5f9;--muted:#94a3b8;
}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg-grad),var(--bg);background-attachment:fixed;color:var(--text);overflow-x:hidden;user-select:none}

/* SETUP */
#setup{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.s-title{font-size:clamp(2rem,8vw,3rem);font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.s-sub{color:var(--muted);margin:.5rem 0 2rem;text-align:center;font-size:.9rem}
.s-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;width:100%;max-width:420px;backdrop-filter:blur(10px)}
.mode-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.mode-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit}
.mode-btn:hover{background:rgba(255,255,255,.08)}
.mode-btn.sel{border-color:var(--green);background:rgba(34,197,94,.12)}
.start-btn{width:100%;padding:16px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:1rem;font-weight:800;border-radius:14px;cursor:pointer;font-family:inherit}

/* GAME */
#game{display:none;height:100dvh;flex-direction:column;overflow:hidden}
.g-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.g-back{color:var(--muted);text-decoration:none;font-size:.85rem}
.g-title{font-weight:800;font-size:1rem;text-align:center;flex:1;background:linear-gradient(90deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.g-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;gap:8px;min-height:0}

/* SCOREBOARD */
.scoreboard{width:100%;max-width:580px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;flex-shrink:0}
.p-card{padding:10px 14px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.1);border-radius:14px}
.p-name{font-size:.78rem;font-weight:600;color:var(--muted)}
.p-pts{font-size:1.4rem;font-weight:900;color:var(--pc,#fff);line-height:1}
.vs-badge{text-align:center;font-size:.7rem;font-weight:700;color:var(--muted);background:rgba(255,255,255,.05);border-radius:8px;padding:6px 8px}

/* CANVAS */
.c-wrap{position:relative;width:100%;max-width:min(85vmin,700px);aspect-ratio:1;flex-shrink:1;min-height:0;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.8);overflow:hidden;margin:0 auto;background:url("./assets/carromboard.png");background-size:cover;background-position:center}
#cv{width:100%;height:100%;cursor:crosshair;display:block}

/* CONTROLS */
.controls{width:100%;max-width:580px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.turn-pill{padding:8px 14px;border-radius:10px;font-size:.8rem;background:rgba(255,255,255,.06)}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1 class="s-title">Carrom Board</h1>
  <p class="s-sub">Strike coins, pocket the Queen!</p>
  <div class="s-card">
    <div class="mode-grid">
      <button class="mode-btn sel" data-mode="pass"><span>👥</span><div><b>Pass & Play</b><br><small>2 players on same device</small></div></button>
      <button class="mode-btn" data-mode="ai"><span>🤖</span><div><b>vs Computer</b><br><small>Play against AI</small></div></button>
    </div>
    <input id="p1name" type="text" placeholder="Player 1" value="Player 1" style="width:100%;padding:12px;margin-bottom:10px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;font-family:inherit">
    <input id="p2name" type="text" placeholder="Player 2" value="Player 2" style="width:100%;padding:12px;margin-bottom:22px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;font-family:inherit">
    <button class="start-btn" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <header class="g-hdr">
    <a class="g-back" href="../../../index.html">Back</a>
    <div class="g-title">Carrom Board</div>
    <div style="font-size:.75rem;color:var(--muted);cursor:pointer" onclick="location.reload()">Menu</div>
  </header>
  <div class="g-body">
    <div class="scoreboard">
      <div class="p-card" style="--pc:#fff"><div class="p-name" id="n1">Player 1</div><div class="p-pts" id="s1">0</div></div>
      <div class="vs-badge">VS<br><span id="turnLabel">Turn 1</span></div>
      <div class="p-card" style="--pc:#aaa"><div class="p-name" id="n2">Player 2</div><div class="p-pts" id="s2">0</div></div>
    </div>
    <div class="c-wrap"><canvas id="cv"></canvas></div>
    <div class="controls">
      <div class="turn-pill">Turn: <b id="turnDisplay">Player 1</b></div>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById("cv")
const ctx=canvas.getContext("2d")

// Game constants
const W=700, H=700
const friction=0.985
const coinRadius=12
const strikerRadius=15

// Game state
let mode="pass"
let turn=1
let score1=0
let score2=0
let p1Name="Player 1"
let p2Name="Player 2"

// Pockets (corners of the board)
const pockets=[
  {x:50,y:50},{x:650,y:50},
  {x:50,y:650},{x:650,y:650}
]

// Disk class for coins and striker
class Disk{
  constructor(x,y,r,color){
    this.x=x;this.y=y;this.r=r;this.color=color
    this.vx=0;this.vy=0;this.active=true
  }
  draw(){
    if(!this.active)return
    // 3D effect
    ctx.beginPath()
    ctx.arc(this.x+2,this.y+2,this.r,0,Math.PI*2)
    ctx.fillStyle="rgba(0,0,0,0.3)"
    ctx.fill()
    // Main disk
    ctx.beginPath()
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
    const grad=ctx.createRadialGradient(this.x-3,this.y-3,2,this.x,this.y,this.r)
    if(this.color==="red"){
      grad.addColorStop(0,"#ff6b6b")
      grad.addColorStop(1,"#c0392b")
    }else if(this.color=="white"){
      grad.addColorStop(0,"#fff")
      grad.addColorStop(1,"#ddd")
    }else{
      grad.addColorStop(0,"#555")
      grad.addColorStop(1,"#222")
    }
    ctx.fillStyle=grad
    ctx.fill()
    ctx.strokeStyle="rgba(0,0,0,0.3)"
    ctx.lineWidth=1
    ctx.stroke()
  }
  update(){
    if(!this.active)return
    this.x+=this.vx;this.y+=this.vy
    this.vx*=friction;this.vy*=friction
    if(Math.abs(this.vx)<0.01)this.vx=0
    if(Math.abs(this.vy)<0.01)this.vy=0
    // Wall bounce
    if(this.x<this.r){this.x=this.r;this.vx*=-0.8}
    if(this.x>W-this.r){this.x=W-this.r;this.vx*=-0.8}
    if(this.y<this.r){this.y=this.r;this.vy*=-0.8}
    if(this.y>H-this.r){this.y=H-this.r;this.vy*=-0.8}
  }
}

let coins=[]
let striker

// Setup coins in center
function setupCoins(){
  coins=[]
  let cx=W/2,cy=H/2
  // Queen in center
  coins.push(new Disk(cx,cy,coinRadius,"red"))
  // 8 coins around queen
  for(let i=0;i<8;i++){
    let a=i*(Math.PI/4)
    coins.push(new Disk(
      cx+Math.cos(a)*28,
      cy+Math.sin(a)*28,
      coinRadius,
      i%2?"black":"white"
    ))
  }
}

// Setup striker position (between baselines)
function setupStriker(){
  striker=new Disk(W/2,H-110,strikerRadius,"white")
  striker.vx=0;striker.vy=0
}

// Collision between two disks
function collision(a,b){
  let dx=b.x-a.x,dy=b.y-a.y
  let dist=Math.sqrt(dx*dx+dy*dy)
  if(dist<a.r+b.r){
    let angle=Math.atan2(dy,dx)
    let tx=a.x+Math.cos(angle)*(a.r+b.r)
    let ty=a.y+Math.sin(angle)*(a.r+b.r)
    let ax=(tx-b.x)*0.5,ay=(ty-b.y)*0.5
    a.vx-=ax;a.vy-=ay
    b.vx+=ax;b.vy+=ay
  }
}

// Check if disk falls in pocket
function pocket(d){
  for(let p of pockets){
    let dx=d.x-p.x,dy=d.y-p.y
    if(Math.sqrt(dx*dx+dy*dy)<30){
      d.active=false
      if(d!==striker){
        if(turn==1)score1++;else score2++
        updateScore()
      }else{
        setupStriker()
      }
      return true
    }
  }
  return false
}

// Update score display
function updateScore(){
  document.getElementById("s1").innerText=score1
  document.getElementById("s2").innerText=score2
}

// Next turn
function nextTurn(){
  turn=turn==1?2:1
  document.getElementById("turnDisplay").innerText=turn==1?p1Name:p2Name
  document.getElementById("turnLabel").innerText="Turn "+(turn==1?"1":"2")
  if(mode=="ai"&&turn==2)setTimeout(aiShot,500)
}

// Update physics
function update(){
  striker.update()
  for(let c of coins)c.update()
  // Collisions
  for(let c of coins)collision(striker,c)
  for(let i=0;i<coins.length;i++)
    for(let j=i+1;j<coins.length;j++)
      collision(coins[i],coins[j])
  // Pockets
  pocket(striker)
  for(let c of coins)pocket(c)
}

// Draw everything
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height)
  striker.draw()
  for(let c of coins)c.draw()
}

// Game loop
function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

// Input handling
let drag=false
function getPos(e){
  let rect=canvas.getBoundingClientRect()
  let clientX=e.touches?e.touches[0].clientX:e.clientX
  let clientY=e.touches?e.touches[0].clientY:e.clientY
  return{
    x:(clientX-rect.left)*(W/rect.width),
    y:(clientY-rect.top)*(H/rect.height)
  }
}

function shoot(e){
  let pos=getPos(e)
  let dx=striker.x-pos.x
  let dy=striker.y-pos.y
  striker.vx=dx*0.15
  striker.vy=dy*0.15
  setTimeout(nextTurn,1500)
}

canvas.addEventListener("mousedown",e=>{drag=true})
canvas.addEventListener("mouseup",e=>{drag=false;shoot(e)})
canvas.addEventListener("touchstart",e=>{drag=true;e.preventDefault()})
canvas.addEventListener("touchend",e=>{drag=false;shoot(e);e.preventDefault()})

// AI shot
function aiShot(){
  let target=coins.find(c=>c.active)
  if(!target)return
  let dx=striker.x-target.x
  let dy=striker.y-target.y
  striker.vx=dx*0.12
  striker.vy=dy*0.12
  setTimeout(nextTurn,1500)
}

// Start game
function startGame(){
  mode=document.querySelector(".mode-btn.sel").dataset.mode
  p1Name=document.getElementById("p1name").value||"Player 1"
  p2Name=document.getElementById("p2name").value||"Player 2"
  document.getElementById("n1").innerText=p1Name
  document.getElementById("n2").innerText=mode=="ai"?"Computer":p2Name
  document.getElementById("setup").style.display="none"
  document.getElementById("game").style.display="flex"
  canvas.width=W;canvas.height=H
  setupCoins()
  setupStriker()
  loop()
}

// Mode selection
document.querySelectorAll(".mode-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".mode-btn").forEach(x=>x.classList.remove("sel"))
    b.classList.add("sel")
  })
})
</script>
</body>
</html>
