<script>
// ============================================
// CARROM GAME - IMAGE BASED WITH PROPER RULES
// ============================================

const canvas=document.getElementById("cv")
const ctx=canvas.getContext("2d")

// Board constants
const W=700,H=700

// Frame and playing area boundaries
const FRAME_MARGIN=12
const BOARD_MARGIN=45
const PLAY_MIN=BOARD_MARGIN
const PLAY_MAX=W-PLAY_MIN

const FRICTION=0.992  // Less friction - faster, smoother sliding
const WALL_BOUNCE=0.85  // Good bounce

// Sizes
const COIN_R=12      // Coin radius
const STRIKER_R=18   // Striker radius
const POCKET_R=26    // Pocket radius (slightly smaller)

// Game state
let mode="pass"
let turn=1
let turnCount=1
let score1=0,score2=0
let p1Name="Player 1",p2Name="Player 2"
let gameOver=false

// Carrom Rules State
let firstCoinPocketed=false  // Queen can only be pocketed after first coin
let coinsPocketedThisTurn=[] // Track what was pocketed this turn

// Player coin assignments
function getPlayerCoinType(playerNum){
  return playerNum===1?"white":"black"
}
function getOpponentCoinType(playerNum){
  return playerNum===1?"black":"white"
}

// Pockets 
const POCKET_INSET=BOARD_MARGIN+18
const POCKETS=[
  {x:POCKET_INSET,y:POCKET_INSET},
  {x:W-POCKET_INSET,y:POCKET_INSET},
  {x:POCKET_INSET,y:H-POCKET_INSET},
  {x:W-POCKET_INSET,y:H-POCKET_INSET}
]

// Baseline positions - MATCH VISUAL BASELINES
const BASELINE_WIDTH=28
const EDGE_GAP=BOARD_MARGIN+20
const END_GAP=BOARD_MARGIN+60
const CIRCLE_R=18
// Top baseline center Y
const STRIKER_Y_TOP=EDGE_GAP+BASELINE_WIDTH/2
// Bottom baseline center Y  
const STRIKER_Y_BOTTOM=H-EDGE_GAP-BASELINE_WIDTH/2
// Striker slides from left orange circle to right orange circle
const BASELINE_X_MIN=END_GAP+CIRCLE_R+5
const BASELINE_X_MAX=W-END_GAP-CIRCLE_R-5

// Load images
const IMAGES={}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image()
    img.onload=()=>resolve(img)
    img.onerror=reject
    img.src=src
  })
}

async function loadAllImages(){
  try{
    IMAGES.blackCoin=await loadImage("./assets/black-coin.webp")
    IMAGES.whiteCoin=await loadImage("./assets/white-coin.webp")
    IMAGES.redCoin=await loadImage("./assets/red-coin.webp")
    IMAGES.striker=await loadImage("./assets/striker.webp")
    IMAGES.centerStar=await loadImage("./assets/center-star.webp")
    IMAGES.arrow1=await loadImage("./assets/arrow-1.webp")
    IMAGES.arrow2=await loadImage("./assets/arrow-2.webp")
    IMAGES.arrow3=await loadImage("./assets/arrow-3.webp")
    IMAGES.arrow4=await loadImage("./assets/arrow-4.webp")
  }catch(e){
    console.error("Failed to load images:",e)
  }
}

// ============================================
// BOARD DRAWING - MATCH GOAL IMAGE STYLE
// ============================================

function drawBoard(){
  const cx=W/2, cy=H/2;
  
  // 1. OUTER BACKGROUND (Dark teal frame area)
  ctx.fillStyle="#0d4a3a";
  ctx.fillRect(0,0,W,H);
  
  // 2. WOODEN FRAME (Reddish-brown border)
  ctx.fillStyle="#8b3a2e";
  ctx.fillRect(FRAME_MARGIN, FRAME_MARGIN, W-FRAME_MARGIN*2, H-FRAME_MARGIN*2);
  
  // 3. ORANGE CORNERS (rounded corners at frame)
  const cornerSize=55;
  ctx.fillStyle="#e8913a";
  // Top-left
  ctx.beginPath();
  ctx.moveTo(FRAME_MARGIN, FRAME_MARGIN+cornerSize);
  ctx.quadraticCurveTo(FRAME_MARGIN, FRAME_MARGIN, FRAME_MARGIN+cornerSize, FRAME_MARGIN);
  ctx.lineTo(FRAME_MARGIN+cornerSize, FRAME_MARGIN+cornerSize);
  ctx.lineTo(FRAME_MARGIN, FRAME_MARGIN+cornerSize);
  ctx.fill();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(W-FRAME_MARGIN-cornerSize, FRAME_MARGIN);
  ctx.quadraticCurveTo(W-FRAME_MARGIN, FRAME_MARGIN, W-FRAME_MARGIN, FRAME_MARGIN+cornerSize);
  ctx.lineTo(W-FRAME_MARGIN-cornerSize, FRAME_MARGIN+cornerSize);
  ctx.lineTo(W-FRAME_MARGIN-cornerSize, FRAME_MARGIN);
  ctx.fill();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(FRAME_MARGIN, H-FRAME_MARGIN-cornerSize);
  ctx.quadraticCurveTo(FRAME_MARGIN, H-FRAME_MARGIN, FRAME_MARGIN+cornerSize, H-FRAME_MARGIN);
  ctx.lineTo(FRAME_MARGIN+cornerSize, H-FRAME_MARGIN-cornerSize);
  ctx.lineTo(FRAME_MARGIN, H-FRAME_MARGIN-cornerSize);
  ctx.fill();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(W-FRAME_MARGIN-cornerSize, H-FRAME_MARGIN);
  ctx.quadraticCurveTo(W-FRAME_MARGIN, H-FRAME_MARGIN, W-FRAME_MARGIN, H-FRAME_MARGIN-cornerSize);
  ctx.lineTo(W-FRAME_MARGIN-cornerSize, H-FRAME_MARGIN-cornerSize);
  ctx.lineTo(W-FRAME_MARGIN-cornerSize, H-FRAME_MARGIN);
  ctx.fill();
  
  // 4. INNER PLAYING SURFACE (Cream/beige)
  ctx.fillStyle="#f5e6c8";
  ctx.fillRect(BOARD_MARGIN, BOARD_MARGIN, W-BOARD_MARGIN*2, H-BOARD_MARGIN*2);
  
  // 5. POCKETS (Black circles at corners)
  ctx.fillStyle="#1a1a1a";
  for(let p of POCKETS){
    ctx.beginPath(); 
    ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI*2); 
    ctx.fill();
    // Pocket inner shadow
    ctx.beginPath();
    ctx.arc(p.x, p.y, POCKET_R-3, 0, Math.PI*2);
    ctx.fillStyle="#0d0d0d";
    ctx.fill();
    ctx.fillStyle="#1a1a1a";
  }
  
  // 6. BASELINES - Wide red lines at edges with orange circles
  const baselineY=80; // Distance from edge
  const baselineWidth=28; // Width of baseline area
  
  ctx.lineWidth=2;
  
  // Function to draw a baseline
  function drawBaselineArea(isHorizontal, x1, y1, x2, y2) {
    // Main baseline lines (thick)
    ctx.strokeStyle="#c4a86b";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Second parallel line
    if(isHorizontal){
      ctx.beginPath();
      ctx.moveTo(x1, y1+baselineWidth);
      ctx.lineTo(x2, y2+baselineWidth);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(x1+baselineWidth, y1);
      ctx.lineTo(x2+baselineWidth, y2);
      ctx.stroke();
    }
    
    // End circles (orange with red center)
    const circleR=18;
    const centers = isHorizontal ? [
      {x: x1+circleR+5, y: y1+baselineWidth/2},
      {x: x2-circleR-5, y: y2+baselineWidth/2}
    ] : [
      {x: x1+baselineWidth/2, y: y1+circleR+5},
      {x: x2+baselineWidth/2, y: y2-circleR-5}
    ];
    
    centers.forEach(c => {
      // Outer orange circle
      ctx.beginPath();
      ctx.arc(c.x, c.y, circleR, 0, Math.PI*2);
      ctx.fillStyle="#e8913a";
      ctx.fill();
      ctx.strokeStyle="#b87333";
      ctx.stroke();
      
      // Inner red circle
      ctx.beginPath();
      ctx.arc(c.x, c.y, 7, 0, Math.PI*2);
      ctx.fillStyle="#c44536";
      ctx.fill();
    });
    
    // Arrow indicators on baseline
    ctx.fillStyle="#333";
    if(isHorizontal){
      // Center mark
      const midX = (x1+x2)/2;
      ctx.beginPath();
      ctx.arc(midX, y1+baselineWidth/2, 4, 0, Math.PI*2);
      ctx.fill();
    } else {
      const midY = (y1+y2)/2;
      ctx.beginPath();
      ctx.arc(x1+baselineWidth/2, midY, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  // Draw 4 baselines
  const edgeGap=BOARD_MARGIN+20;
  const endGap=BOARD_MARGIN+60;
  // Top
  drawBaselineArea(true, endGap, edgeGap, W-endGap, edgeGap);
  // Bottom
  drawBaselineArea(true, endGap, H-edgeGap-baselineWidth, W-endGap, H-edgeGap-baselineWidth);
  // Left
  drawBaselineArea(false, edgeGap, endGap, edgeGap, H-endGap);
  // Right
  drawBaselineArea(false, W-edgeGap-baselineWidth, endGap, W-edgeGap-baselineWidth, H-endGap);
  
  // 7. DIAGONAL LINES - From corner areas to center
  ctx.strokeStyle="#5a5a5a";
  ctx.lineWidth=1.5;
  
  // Draw 4 diagonal lines with arrow heads
  for(let i=0; i<4; i++){
    const angle = i*Math.PI/2 + Math.PI/4;
    const startDist = 120; // Start from near corner
    const endDist = 170;   // End before center circle
    
    const startX = cx + Math.cos(angle)*startDist;
    const startY = cy + Math.sin(angle)*startDist;
    const endX = cx + Math.cos(angle)*endDist;
    const endY = cy + Math.sin(angle)*endDist;
    
    // Main diagonal line
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    
    // Arrow head at end (pointing to center)
    const arrowSize=10;
    const arrowAngle1 = angle + Math.PI - 0.3;
    const arrowAngle2 = angle + Math.PI + 0.3;
    
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX + Math.cos(arrowAngle1)*arrowSize, endY + Math.sin(arrowAngle1)*arrowSize);
    ctx.lineTo(endX + Math.cos(arrowAngle2)*arrowSize, endY + Math.sin(arrowAngle2)*arrowSize);
    ctx.closePath();
    ctx.fillStyle="#5a5a5a";
    ctx.fill();
    
    // Small circle at start
    ctx.beginPath();
    ctx.arc(startX, startY, 12, 0, Math.PI*2);
    ctx.stroke();
  }
  
  // 8. CENTER COMPASS/STAR DESIGN
  // Outer center circle
  ctx.strokeStyle="#8b7355";
  ctx.lineWidth=2;
  ctx.beginPath(); 
  ctx.arc(cx, cy, 110, 0, Math.PI*2); 
  ctx.stroke();
  
  // Compass star - 8 points
  ctx.lineWidth=2;
  for(let i=0; i<8; i++){
    const angle = i*Math.PI/4 - Math.PI/2;
    const innerR = 25;
    const outerR = i%2===0 ? 100 : 70; // Alternating long/short points
    
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle)*innerR, cy + Math.sin(angle)*innerR);
    ctx.lineTo(cx + Math.cos(angle)*outerR, cy + Math.sin(angle)*outerR);
    
    // Color: alternate between red and black/white
    if(i%2 === 0){
      ctx.strokeStyle="#c44536"; // Red
      ctx.lineWidth=3;
    } else {
      ctx.strokeStyle="#1a1a1a"; // Black
      ctx.lineWidth=2;
    }
    ctx.stroke();
  }
  
  // Red center circle
  ctx.beginPath(); 
  ctx.arc(cx, cy, 25, 0, Math.PI*2); 
  ctx.fillStyle="#c44536"; 
  ctx.fill(); 
  ctx.strokeStyle="#8b3a2e";
  ctx.lineWidth=2;
  ctx.stroke();
  
  // Inner white highlight
  ctx.beginPath();
  ctx.arc(cx-5, cy-5, 8, 0, Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.fill();
}

// (Removed old unused drawing functions - now using goal-style functions)

// Disk class for coins and striker
class Disk{
  constructor(x,y,r,color,type){
    this.x=x
    this.y=y
    this.r=r
    this.color=color
    this.type=type
    this.vx=0
    this.vy=0
    this.active=true
    this.inPocket=false
  }
  
  getImage(){
    if(this.type==="striker")return IMAGES.striker
    if(this.type==="queen")return IMAGES.redCoin
    if(this.type==="black")return IMAGES.blackCoin
    return IMAGES.whiteCoin
  }
  
  draw(){
    if(this.inPocket)return  // Only skip if pocketed, not if inactive
    if(!this.active&&this.type!=="striker")return  // Non-strikers skip if inactive
    
    ctx.beginPath()
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
    
    // Draw base shadow
    ctx.shadowColor="rgba(0,0,0,0.4)"
    ctx.shadowBlur=4
    ctx.shadowOffsetY=2
    
    if(this.type==="queen"){
      // Queen (Red with white inner circle)
      ctx.fillStyle="#c41e3a"; ctx.fill(); ctx.shadowBlur=0; ctx.shadowOffsetY=0;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*0.6,0,Math.PI*2); ctx.strokeStyle="#ffffff"; ctx.lineWidth=2; ctx.stroke()
      ctx.beginPath(); ctx.arc(this.x,this.y,2,0,Math.PI*2); ctx.fillStyle="#ffffff"; ctx.fill()
    }else if(this.type==="black"){
      // Black coin (with inner grey/white circle)
      ctx.fillStyle="#1c1c1c"; ctx.fill(); ctx.shadowBlur=0; ctx.shadowOffsetY=0;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*0.6,0,Math.PI*2); ctx.strokeStyle="#666"; ctx.lineWidth=2; ctx.stroke()
      ctx.beginPath(); ctx.arc(this.x,this.y,2,0,Math.PI*2); ctx.fillStyle="#666"; ctx.fill()
    }else if(this.type==="striker"){
      // Striker (Light blue/grey with complex inner circles)
      ctx.fillStyle="#bdd3d4"; ctx.fill(); ctx.shadowBlur=0; ctx.shadowOffsetY=0;
      // Outer rim
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r-2,0,Math.PI*2); ctx.strokeStyle="#4f758b"; ctx.lineWidth=1.5; ctx.stroke();
      // Inner blue circle
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*0.5,0,Math.PI*2); ctx.fillStyle="#3a6078"; ctx.fill();
      // Inner star/cross
      const sr = this.r*0.5;
      ctx.beginPath();
      ctx.moveTo(this.x - sr, this.y); ctx.lineTo(this.x + sr, this.y);
      ctx.moveTo(this.x, this.y - sr); ctx.lineTo(this.x, this.y + sr);
      ctx.strokeStyle = "#fff"; ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(this.x,this.y,3,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill();
    }else{
      // White coin (with inner dark circle)
      ctx.fillStyle="#f8f8f8"; ctx.fill(); ctx.shadowBlur=0; ctx.shadowOffsetY=0;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*0.6,0,Math.PI*2); ctx.strokeStyle="#aaa"; ctx.lineWidth=2; ctx.stroke()
      ctx.beginPath(); ctx.arc(this.x,this.y,2,0,Math.PI*2); ctx.fillStyle="#aaa"; ctx.fill()
    }
    
    ctx.shadowBlur=0;
    ctx.shadowOffsetY=0;
  }
  
  update(){
    if(!this.active||this.inPocket)return
    
    // Move
    this.x+=this.vx
    this.y+=this.vy
    
    // Friction
    this.vx*=FRICTION
    this.vy*=FRICTION
    
    // Stop if very slow (lower threshold = slides longer)
    if(Math.abs(this.vx)<0.08)this.vx=0
    if(Math.abs(this.vy)<0.08)this.vy=0
    
    // Wall collisions - keep inside wooden frame
    const minX=PLAY_MIN+this.r
    const maxX=PLAY_MAX-this.r
    const minY=PLAY_MIN+this.r
    const maxY=PLAY_MAX-this.r
    
    if(this.x<minX){
      this.x=minX
      this.vx=Math.abs(this.vx)*WALL_BOUNCE
    }
    if(this.x>maxX){
      this.x=maxX
      this.vx=-Math.abs(this.vx)*WALL_BOUNCE
    }
    if(this.y<minY){
      this.y=minY
      this.vy=Math.abs(this.vy)*WALL_BOUNCE
    }
    if(this.y>maxY){
      this.y=maxY
      this.vy=-Math.abs(this.vy)*WALL_BOUNCE
    }
  }
  
  isMoving(){
    return Math.abs(this.vx)>0.1||Math.abs(this.vy)>0.1
  }
}

// Game objects
let coins=[]      // 19 coins (9 white, 9 black, 1 queen)
let striker1      // Player 1 striker (bottom)
let striker2      // Player 2 striker (top)
let striker       // Current active striker

// ============================================
// SETUP FUNCTIONS
// ============================================

function setupCoins(){
  coins=[]
  const cx=W/2
  const cy=H/2
  
  // 1. QUEEN at exact center
  coins.push(new Disk(cx,cy,COIN_R,"red","queen"))
  
  // Arrange 9 white and 9 black coins in a proper carrom Y-shape pattern
  
  // Inner hex (6 coins: 3 white, 3 black alternating)
  const innR=COIN_R*2
  for(let i=0;i<6;i++){
    const angle=i*Math.PI/3
    const x=cx+Math.cos(angle)*innR
    const y=cy+Math.sin(angle)*innR
    const type=i%2===0?"white":"black"
    coins.push(new Disk(x,y,COIN_R,type,type))
  }
  
  // Outer layer (12 coins)
  const outR=COIN_R*4
  for(let i=0;i<12;i++){
    const angle=(i*Math.PI/6) + Math.PI/12
    const x=cx+Math.cos(angle)*outR
    const y=cy+Math.sin(angle)*outR
    let type="white"
    // specific pattern to match goal image
    if (i%2 !== 0) type="black" 
    coins.push(new Disk(x,y,COIN_R,type,type))
  }
}

function setupStriker(){
  // In 2-player carrom, BOTH strikers are on the board
  // Player 1 at bottom, Player 2 at top
  // Only current player's striker is active
  
  if(!striker1){
    striker1=new Disk(W/2,STRIKER_Y_BOTTOM,STRIKER_R,"white","striker")
    striker1.vx=0; striker1.vy=0
  }
  if(!striker2){
    striker2=new Disk(W/2,STRIKER_Y_TOP,STRIKER_R,"white","striker")
    striker2.vx=0; striker2.vy=0
  }
  
  // Reset striker positions and states (in case they were pocketed)
  striker1.x=W/2; striker1.y=STRIKER_Y_BOTTOM
  striker1.vx=0; striker1.vy=0
  striker1.inPocket=false
  striker1.active=true
  
  striker2.x=W/2; striker2.y=STRIKER_Y_TOP
  striker2.vx=0; striker2.vy=0
  striker2.inPocket=false
  striker2.active=true
  
  // Set active striker based on turn
  if(turn===1){
    striker=striker1
    striker1.active=true
    striker2.active=false
  }else{
    striker=striker2
    striker1.active=false
    striker2.active=true
  }
}

// ============================================
// PHYSICS
// ============================================

function checkCollision(a,b){
  const dx=b.x-a.x
  const dy=b.y-a.y
  const dist=Math.sqrt(dx*dx+dy*dy)
  
  if(dist<a.r+b.r&&dist>0.1){
    // Collision normal
    const nx=dx/dist
    const ny=dy/dist
    
    // Separate disks
    const overlap=(a.r+b.r-dist)/2
    a.x-=nx*overlap
    a.y-=ny*overlap
    b.x+=nx*overlap
    b.y+=ny*overlap
    
    // Exchange momentum
    const dvx=b.vx-a.vx
    const dvy=b.vy-a.vy
    const dot=dvx*nx+dvy*ny
    
    if(dot<0){
      const impulse=dot*0.8  // Restitution
      a.vx+=impulse*nx
      a.vy+=impulse*ny
      b.vx-=impulse*nx
      b.vy-=impulse*ny
    }
  }
}

function checkPocket(disk){
  if(!disk.active||disk.inPocket)return false
  
  for(const p of POCKETS){
    const dx=disk.x-p.x
    const dy=disk.y-p.y
    const dist=Math.sqrt(dx*dx+dy*dy)
    
    if(dist<POCKET_R){
      disk.inPocket=true
      disk.active=false
      disk.vx=0  // Stop movement
      disk.vy=0
      return true
    }
  }
  return false
}

// ============================================
// GAME LOGIC
// ============================================

let queenPocketed=false
let queenPocketedBy=null
let queenCovered=false
let keepTurn=false

function handlePocketing(disk){
  const myCoinType=getPlayerCoinType(turn)
  const oppCoinType=getOpponentCoinType(turn)
  
  if(disk.type==="striker"){
    // Foul - striker pocketed: lose turn + penalty coin placed by opponent
    showMessage("Foul! Striker pocketed - penalty coin returned")
    keepTurn=false
    // Return one of player's pocketed coins to center as penalty
    returnPenaltyCoin(myCoinType)
    return
  }
  
  if(disk.type==="queen"){
    // Queen can only be pocketed after at least one regular coin is pocketed
    if(!firstCoinPocketed){
      showMessage("Cannot pocket Queen yet! Pocket a coin first")
      // Return queen to center
      disk.active=true
      disk.inPocket=false
      disk.x=W/2+(Math.random()-0.5)*30
      disk.y=H/2+(Math.random()-0.5)*30
      disk.vx=0;disk.vy=0
      keepTurn=false
      return
    }
    queenPocketed=true
    queenPocketedBy=turn
    keepTurn=true
    coinsPocketedThisTurn.push("queen")
    showMessage("Queen pocketed! Cover it with your coin!")
    return
  }
  
  // Regular coin
  firstCoinPocketed=true  // Mark that a coin has been pocketed
  coinsPocketedThisTurn.push(disk.type)
  
  if(disk.type===myCoinType){
    // Pocketed own coin - get another turn
    if(turn===1) score1++
    else score2++
    keepTurn=true
    showMessage(`Pocketed own coin! Another turn`)
    
    // Check if queen is covered (pocketed own coin right after queen)
    if(queenPocketed&&queenPocketedBy===turn&&!queenCovered){
      queenCovered=true
      if(turn===1) score1+=3
      else score2+=3
      showMessage("Queen covered! +3 points")
    }
  }else{
    // Foul - pocketed opponent's coin: coin returned to center, lose turn
    showMessage("Foul! Opponent's coin returned")
    // Return opponent's coin to center
    disk.active=true
    disk.inPocket=false
    disk.x=W/2+(Math.random()-0.5)*40
    disk.y=H/2+(Math.random()-0.5)*40
    disk.vx=0;disk.vy=0
    keepTurn=false
  }
  
  updateScore()
  checkWin()
}

// Return a penalty coin to center when striker is pocketed
function returnPenaltyCoin(coinType){
  // Find a pocketed coin of the player to return as penalty
  // For simplicity, we don't actually track which coins were pocketed
  // We just create a new coin or reactivate one
  const pocketedCoin=coins.find(c=>c.type===coinType&&!c.active)
  if(pocketedCoin){
    pocketedCoin.active=true
    pocketedCoin.inPocket=false
    pocketedCoin.x=W/2+(Math.random()-0.5)*40
    pocketedCoin.y=H/2+(Math.random()-0.5)*40
    pocketedCoin.vx=0;pocketedCoin.vy=0
    // Adjust score
    if(turn===1) score1=Math.max(0,score1-1)
    else score2=Math.max(0,score2-1)
    updateScore()
  }
}

function checkWin(){
  // Check if player 1 (white) has pocketed all their coins
  const whiteLeft=coins.filter(c=>c.type==="white"&&c.active).length
  // Check if player 2 (black) has pocketed all their coins  
  const blackLeft=coins.filter(c=>c.type==="black"&&c.active).length
  
  // Win condition: pocket all your coins AND cover the queen
  let winner=null
  
  if(whiteLeft===0){
    // Player 1 pocketed all white coins
    if(queenCovered){
      winner=p1Name
    }else{
      // If queen was pocketed but not covered, player loses
      if(queenPocketed&&queenPocketedBy===1&&!queenCovered){
        showMessage(`${p1Name} failed to cover Queen!`)
        winner=p2Name
      }else{
        // Queen not involved - player 1 wins
        winner=p1Name
      }
    }
  }
  
  if(blackLeft===0){
    // Player 2 pocketed all black coins
    if(queenCovered){
      winner=p2Name
    }else{
      if(queenPocketed&&queenPocketedBy===2&&!queenCovered){
        showMessage(`${p2Name} failed to cover Queen!`)
        winner=p1Name
      }else{
        winner=p2Name
      }
    }
  }
  
  // If both finish at same time, check scores
  if(whiteLeft===0&&blackLeft===0){
    winner=score1>score2?p1Name:p2Name
  }
  
  if(winner){
    gameOver=true
    showMessage(`${winner} wins!`)
    setTimeout(()=>{
      if(confirm(`${winner} wins! Play again?`)){
        resetGame()
      }
    },1000)
  }
}

function updateScore(){
  document.getElementById("s1").textContent=score1
  document.getElementById("s2").textContent=score2
}

function showMessage(msg){
  // Could add a message display
  console.log(msg)
}

// ============================================
// TURN SYSTEM
// ============================================

let turnInProgress=false
let coinsMoving=false

function nextTurn(){
  // Check if any coins are still moving
  coinsMoving=false
  for(const c of coins){
    if(c.isMoving()){
      coinsMoving=true
      break
    }
  }
  if(striker.isMoving())coinsMoving=true
  
  if(coinsMoving)return  // Wait for movement to stop
  
  // Check queen coverage at end of turn
  if(queenPocketed&&!queenCovered){
    // Player pocketed queen but failed to cover it in this turn
    if(queenPocketedBy===turn){
      // Check if they pocketed their own coin this turn (which would have covered it)
      const myCoinType=getPlayerCoinType(turn)
      const coveredThisTurn=coinsPocketedThisTurn.includes(myCoinType)
      
      if(!coveredThisTurn){
        // Return queen to center - not covered
        const cx=W/2,cy=H/2
        const queen=coins.find(c=>c.type==="queen")
        if(queen){
          queen.active=true
          queen.inPocket=false
          queen.x=cx+(Math.random()-0.5)*20
          queen.y=cy+(Math.random()-0.5)*20
          queen.vx=0;queen.vy=0
        }
        queenPocketed=false
        queenPocketedBy=null
        showMessage("Queen returned - not covered!")
      }
    }
  }
  
  if(!keepTurn){
    // Switch turn
    turn=turn===1?2:1
    turnCount++
    document.getElementById("turnName").textContent=turn===1?p1Name:p2Name
    document.getElementById("turnNum").textContent=turnCount
  }
  
  // Reset for next shot
  keepTurn=false
  coinsPocketedThisTurn=[]
  
  // Reset striker for the current player
  setupStriker()
  
  // Reset controls for new turn
  resetControls()
  
  turnInProgress=false
  
  // AI turn
  if(mode==="ai"&&turn===2){
    setTimeout(aiPlay,1000)
  }
}

// ============================================
// AI
// ============================================

function aiPlay(){
  // Find a target coin
  const targets=coins.filter(c=>c.active&&c.type==="black")
  if(targets.length===0)return
  
  const target=targets[Math.floor(Math.random()*targets.length)]
  
  // Calculate shot direction
  const dx=target.x-striker.x
  const dy=target.y-striker.y
  
  // Set aim directly toward target
  aimAngle=Math.atan2(dy,dx)
  aimPower=100+Math.random()*100  // Random power (using new max 250)
  
  // Small delay then shoot
  setTimeout(()=>{
    const maxPower=35  // Much stronger shots
    const power=(aimPower/250)*maxPower
    
    // Shoot in OPPOSITE direction of drag (pull back to shoot forward)
    striker.vx=Math.cos(aimAngle+Math.PI)*power
    striker.vy=Math.sin(aimAngle+Math.PI)*power
    
    // Reset turn state for this shot
    keepTurn=false
    coinsPocketedThisTurn=[]
    
    turnInProgress=true
    cancelAiming()
  },800)
}

// State
let isDraggingSlider=false
let isAimingOnBoard=false
let dragStartPos=null
let dragCurrentPos=null
let aimAngle=0
let aimPower=0

// Slider elements
let sliderContainer,sliderTrack,sliderStriker

// Initialize controls
function initControls(){
  sliderContainer=document.getElementById("sliderContainer")
  sliderTrack=document.getElementById("sliderTrack")
  sliderStriker=document.getElementById("sliderStriker")
  
  // Slider touch/mouse events for positioning
  sliderTrack.addEventListener("mousedown",handleSliderStart)
  sliderTrack.addEventListener("touchstart",handleSliderStart,{passive:false})
  
  document.addEventListener("mousemove",handleSliderMove)
  document.addEventListener("touchmove",handleSliderMove,{passive:false})
  
  document.addEventListener("mouseup",handleSliderEnd)
  document.addEventListener("touchend",handleSliderEnd)
  
  // Board touch events for aiming
  canvas.addEventListener("mousedown",handleBoardStart)
  canvas.addEventListener("touchstart",handleBoardStart,{passive:false})
  
  canvas.addEventListener("mousemove",handleBoardMove)
  canvas.addEventListener("touchmove",handleBoardMove,{passive:false})
  
  canvas.addEventListener("mouseup",handleBoardEnd)
  canvas.addEventListener("touchend",handleBoardEnd)
  canvas.addEventListener("mouseleave",cancelAiming)
  
  updateSliderPosition()
}

// Get position from mouse/touch event
function getEventPos(e,element){
  const rect=element.getBoundingClientRect()
  let clientX,clientY
  
  if(e.touches&&e.touches.length>0){
    clientX=e.touches[0].clientX
    clientY=e.touches[0].clientY
  }else if(e.changedTouches&&e.changedTouches.length>0){
    clientX=e.changedTouches[0].clientX
    clientY=e.changedTouches[0].clientY
  }else{
    clientX=e.clientX
    clientY=e.clientY
  }
  
  return{
    x:clientX-rect.left,
    y:clientY-rect.top
  }
}

// Get canvas position
function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect()
  const scaleX=canvas.width/rect.width
  const scaleY=canvas.height/rect.height
  
  let clientX,clientY
  if(e.touches&&e.touches.length>0){
    clientX=e.touches[0].clientX
    clientY=e.touches[0].clientY
  }else if(e.changedTouches&&e.changedTouches.length>0){
    clientX=e.changedTouches[0].clientX
    clientY=e.changedTouches[0].clientY
  }else{
    clientX=e.clientX
    clientY=e.clientY
  }
  
  return{
    x:(clientX-rect.left)*scaleX,
    y:(clientY-rect.top)*scaleY
  }
}

// SLIDER HANDLERS (Position striker)
function handleSliderStart(e){
  if(turnInProgress)return
  e.preventDefault()
  isDraggingSlider=true
  updateSliderFromEvent(e)
}

function handleSliderMove(e){
  if(!isDraggingSlider)return
  e.preventDefault()
  updateSliderFromEvent(e)
}

function handleSliderEnd(e){
  if(!isDraggingSlider)return
  isDraggingSlider=false
}

function updateSliderFromEvent(e){
  const pos=getEventPos(e,sliderTrack)
  const rect=sliderTrack.getBoundingClientRect()
  let percent=(pos.x/rect.width)*100
  percent=Math.max(0,Math.min(100,percent))
  
  // Update slider visual
  sliderStriker.style.left=percent+"%"
  
  // Update striker position on board
  // Striker center moves from BASELINE_X_MIN to BASELINE_X_MAX (full red circle to red circle)
  const boardRange=BASELINE_X_MAX-BASELINE_X_MIN
  striker.x=BASELINE_X_MIN+(percent/100)*boardRange
}

function updateSliderPosition(){
  if(!striker)return
  // Striker center moves from BASELINE_X_MIN to BASELINE_X_MAX (full red circle to red circle)
  const boardRange=BASELINE_X_MAX-BASELINE_X_MIN
  const percent=((striker.x-BASELINE_X_MIN)/boardRange)*100
  if(sliderStriker)sliderStriker.style.left=Math.max(0,Math.min(100,percent))+"%"
}

// BOARD HANDLERS (Aiming)
function handleBoardStart(e){
  if(turnInProgress)return
  const pos=getCanvasPos(e)
  
  // Check if touching near striker (on the baseline)
  const dx=pos.x-striker.x
  const dy=pos.y-striker.y
  const dist=Math.sqrt(dx*dx+dy*dy)
  
  if(dist<striker.r*3){
    isAimingOnBoard=true
    // Striker stays on baseline - dragStartPos is current striker position
    dragStartPos={x:striker.x,y:striker.y}
    dragCurrentPos=pos
    e.preventDefault()
  }
}

function handleBoardMove(e){
  if(!isAimingOnBoard)return
  e.preventDefault()
  dragCurrentPos=getCanvasPos(e)
  
  // Calculate aim angle and power from DRAG DIRECTION
  // Striker stays on baseline - don't move it!
  const dx=dragCurrentPos.x-dragStartPos.x
  const dy=dragCurrentPos.y-dragStartPos.y
  
  aimAngle=Math.atan2(dy,dx)
  const pullDistance=Math.sqrt(dx*dx+dy*dy)
  aimPower=Math.min(pullDistance,250)  // Max pull distance increased to 250
  
  // KEEP STRIKER ON BASELINE - don't change striker.x/y during aiming
}

function handleBoardEnd(e){
  if(!isAimingOnBoard)return
  
  // Shoot if pulled back enough
  if(aimPower>20){
    const maxPower=35  // Much stronger shots
    const power=(aimPower/250)*maxPower  // Normalized to new max pull 250
    
    // Shoot in OPPOSITE direction of drag (pull back to shoot forward)
    striker.vx=Math.cos(aimAngle+Math.PI)*power
    striker.vy=Math.sin(aimAngle+Math.PI)*power
    
    // Reset turn state for this shot
    keepTurn=false
    coinsPocketedThisTurn=[]
    
    turnInProgress=true
  }
  
  cancelAiming()
}

function cancelAiming(){
  isAimingOnBoard=false
  dragStartPos=null
  dragCurrentPos=null
  aimPower=0
}

function resetControls(){
  aimAngle=0
  aimPower=0
  updateSliderPosition()
}

// ============================================
// GAME LOOP
// ============================================

function update(){
  // Update both strikers
  // If striker has velocity (moving), let it move freely
  // If striker is stopped and it's player's turn, keep on baseline for positioning
  if(striker1) {
    const isMoving = Math.abs(striker1.vx) > 0.1 || Math.abs(striker1.vy) > 0.1
    if(!isMoving && !turnInProgress && turn===1) {
      // Stopped, Player 1's turn, not shot yet - keep on baseline for positioning
      striker1.y = STRIKER_Y_BOTTOM
      striker1.vy = 0
      if(striker1.x < BASELINE_X_MIN) striker1.x = BASELINE_X_MIN
      if(striker1.x > BASELINE_X_MAX) striker1.x = BASELINE_X_MAX
    } else {
      // Moving or shot in progress - normal physics
      striker1.update()
    }
  }
  if(striker2) {
    const isMoving = Math.abs(striker2.vx) > 0.1 || Math.abs(striker2.vy) > 0.1
    if(!isMoving && !turnInProgress && turn===2) {
      // Stopped, Player 2's turn, not shot yet - keep on baseline for positioning
      striker2.y = STRIKER_Y_TOP
      striker2.vy = 0
      if(striker2.x < BASELINE_X_MIN) striker2.x = BASELINE_X_MIN
      if(striker2.x > BASELINE_X_MAX) striker2.x = BASELINE_X_MAX
    } else {
      // Moving or shot in progress - normal physics
      striker2.update()
    }
  }
  
  for(const c of coins)c.update()
  
  // Collisions with active striker only - ONLY when shot is in progress
  // During positioning (turnInProgress=false), striker doesn't collide with coins
  const activeS=turn===1?striker1:striker2
  if(activeS&&turnInProgress){
    for(const c of coins)checkCollision(activeS,c)
  }
  for(let i=0;i<coins.length;i++){
    for(let j=i+1;j<coins.length;j++){
      checkCollision(coins[i],coins[j])
    }
  }
  
  // Pocket detection for active striker
  if(activeS&&checkPocket(activeS))handlePocketing(activeS)
  for(const c of coins){
    if(checkPocket(c))handlePocketing(c)
  }
  
  // Check for turn end
  if(turnInProgress){
    let moving=false
    for(const c of coins)if(c.active&&c.isMoving())moving=true
    if(activeS&&activeS.isMoving())moving=true
    
    if(!moving){
      setTimeout(nextTurn,500)
      turnInProgress=false
    }
  }
}

function draw(){
  // Draw board background
  drawBoard()
  
  // Draw both strikers (inactive one slightly faded)
  if(striker1){
    if(turn===1) striker1.draw()
    else {
      ctx.globalAlpha=0.4  // Faded for inactive player
      striker1.draw()
      ctx.globalAlpha=1.0
    }
  }
  if(striker2){
    if(turn===2) striker2.draw()
    else {
      ctx.globalAlpha=0.4  // Faded for inactive player
      striker2.draw()
      ctx.globalAlpha=1.0
    }
  }
  
  // Draw coins
  for(const c of coins)c.draw()
  
  // Draw aim guide (Mobile game style)
  if(!turnInProgress&&striker&&striker.active){
    if(isAimingOnBoard&&aimPower>10){
      // When dragging to aim - show mobile-style visuals
      const powerRatio=Math.min(aimPower/250,1)
      
      // Shooting angle is OPPOSITE of drag direction
      const shootAngle=aimAngle+Math.PI
      
      // Draw dashed circle around striker (aiming guide)
      ctx.beginPath()
      ctx.arc(striker.x,striker.y,striker.r+25,0,Math.PI*2)
      ctx.strokeStyle="rgba(255,255,255,0.3)"
      ctx.lineWidth=2
      ctx.setLineDash([8,6])
      ctx.stroke()
      ctx.setLineDash([])
      
      // Calculate trajectory end point (in SHOOT direction, opposite of drag)
      const maxLineLen=200
      const lineLen=powerRatio*maxLineLen
      const endX=striker.x+Math.cos(shootAngle)*lineLen
      const endY=striker.y+Math.sin(shootAngle)*lineLen
      
      // Draw dotted trajectory line
      ctx.beginPath()
      ctx.moveTo(striker.x,striker.y)
      ctx.lineTo(endX,endY)
      ctx.setLineDash([6,6])
      ctx.lineWidth=3
      
      // Color based on power: yellow -> orange -> red
      if(powerRatio<0.4){
        ctx.strokeStyle="rgba(250,204,21,0.8)"  // Yellow
      }else if(powerRatio<0.7){
        ctx.strokeStyle="rgba(251,146,60,0.8)"  // Orange  
      }else{
        ctx.strokeStyle="rgba(239,68,68,0.8)"   // Red
      }
      ctx.stroke()
      ctx.setLineDash([])
      
      // Draw solid colored arrow (thicker, more visible)
      const arrowLen=25
      const arrowAngle=0.5
      
      ctx.beginPath()
      ctx.moveTo(striker.x,striker.y)
      ctx.lineTo(endX,endY)
      ctx.lineWidth=6
      // Gradient color based on power
      if(powerRatio<0.4){
        ctx.strokeStyle="#facc15"  // Yellow
      }else if(powerRatio<0.7){
        ctx.strokeStyle="#fb923c"  // Orange
      }else{
        ctx.strokeStyle="#ef4444"  // Red
      }
      ctx.stroke()
      
      // Arrow head (pointing in shoot direction)
      ctx.beginPath()
      ctx.moveTo(endX,endY)
      ctx.lineTo(
        endX-Math.cos(shootAngle-arrowAngle)*arrowLen,
        endY-Math.sin(shootAngle-arrowAngle)*arrowLen
      )
      ctx.moveTo(endX,endY)
      ctx.lineTo(
        endX-Math.cos(shootAngle+arrowAngle)*arrowLen,
        endY-Math.sin(shootAngle+arrowAngle)*arrowLen
      )
      ctx.lineWidth=5
      ctx.stroke()
      
      // Draw pull line (from striker to finger)
      if(dragCurrentPos){
        ctx.beginPath()
        ctx.moveTo(striker.x,striker.y)
        ctx.lineTo(dragCurrentPos.x,dragCurrentPos.y)
        ctx.strokeStyle="rgba(255,255,255,0.3)"
        ctx.lineWidth=2
        ctx.setLineDash([4,4])
        ctx.stroke()
        ctx.setLineDash([])
      }
      
      // Power percentage display
      ctx.font="bold 16px Poppins,sans-serif"
      ctx.textAlign="center"
      ctx.fillStyle="white"
      ctx.fillText(Math.round(powerRatio*100)+"%",endX,endY-15)
      
    }else{
      // Not aiming - show simple direction hint toward center
      const cx=W/2
      const cy=H/2
      const angle=Math.atan2(cy-striker.y,cx-striker.x)
      const hintLen=40
      
      ctx.beginPath()
      ctx.moveTo(striker.x,striker.y)
      ctx.lineTo(striker.x+Math.cos(angle)*hintLen,striker.y+Math.sin(angle)*hintLen)
      ctx.strokeStyle="rgba(34,197,94,0.5)"
      ctx.lineWidth=3
      ctx.stroke()
      
      // Small arrow head
      ctx.beginPath()
      ctx.moveTo(striker.x+Math.cos(angle)*hintLen,striker.y+Math.sin(angle)*hintLen)
      ctx.lineTo(
        striker.x+Math.cos(angle)*hintLen-Math.cos(angle-0.4)*8,
        striker.y+Math.sin(angle)*hintLen-Math.sin(angle-0.4)*8
      )
      ctx.moveTo(striker.x+Math.cos(angle)*hintLen,striker.y+Math.sin(angle)*hintLen)
      ctx.lineTo(
        striker.x+Math.cos(angle)*hintLen-Math.cos(angle+0.4)*8,
        striker.y+Math.sin(angle)*hintLen-Math.sin(angle+0.4)*8
      )
      ctx.stroke()
    }
  }
}

function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

// ============================================
// SETUP & START
// ============================================

async function startGame(){
  // Load images first
  await loadAllImages()
  
  // Get settings
  const modeBtn=document.querySelector(".mode-btn.sel")
  mode=modeBtn?modeBtn.dataset.mode:"pass"
  p1Name=document.getElementById("p1name").value||"Player 1"
  p2Name=document.getElementById("p2name").value||"Player 2"
  
  // Update UI
  document.getElementById("n1").textContent=p1Name
  document.getElementById("n2").textContent=mode==="ai"?"Computer":p2Name
  document.getElementById("turnName").textContent=p1Name
  
  // Show game
  document.getElementById("setup").style.display="none"
  document.getElementById("game").style.display="flex"
  
  // Init game first (creates striker)
  resetGame()
  loop()
  
  // Then init controls (needs striker to exist)
  setTimeout(initControls,100)
}

function resetGame(){
  score1=0
  score2=0
  turn=1
  turnCount=1
  gameOver=false
  queenPocketed=false
  queenPocketedBy=null
  queenCovered=false
  turnInProgress=false
  firstCoinPocketed=false
  coinsPocketedThisTurn=[]
  keepTurn=false
  
  // Reset striker objects
  striker1=null
  striker2=null
  striker=null
  
  updateScore()
  document.getElementById("turnName").textContent=p1Name
  document.getElementById("turnNum").textContent="1"
  
  setupCoins()
  setupStriker()
  resetControls()
}

// Mode selection
document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("sel"))
    btn.classList.add("sel")
  })
})

// Initialize button controls when page loads
document.addEventListener("DOMContentLoaded",initControls)
</script>
