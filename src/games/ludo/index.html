function setupEventListeners() {
  // Player count buttons
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      requiredHouses = parseInt(btn.dataset.n);
      updateHouseSelector();
    });
  });
  
  // House selection
  document.querySelectorAll('.house-option').forEach(opt => {
    opt.addEventListener('click', () => {
      if (opt.classList.contains('disabled')) return;
      const house = opt.dataset.house;
      if (opt.classList.contains('selected')) {
        if (selectedHouses.length > 2) {
          opt.classList.remove('selected');
          selectedHouses = selectedHouses.filter(h => h !== house);
        }
      } else {
        if (selectedHouses.length < requiredHouses) {
          opt.classList.add('selected');
          selectedHouses.push(house);
        }
      }
      updateHouseSelector();
    });
  });
  
  // Start game
  document.getElementById('startGameBtn').addEventListener('click', startGame);
  
  // Dice roll buttons
  ['red','green','yellow','blue'].forEach(color => {

    if (btn) btn.addEventListener('click', () => rollDice(color));
    if (cube) cube.addEventListener('click', () => rollDice(color));
  });

function updateHouseSelector() {
  document.querySelectorAll('.house-option').forEach(opt => {
    const house = opt.dataset.house;
    const isSelected = opt.classList.contains('selected');
    opt.classList.toggle('disabled', !isSelected && selectedHouses.length >= requiredHouses);
  });
}

function createBoard() {
  board.innerHTML = '';
  
  // Create 15x15 grid
  for (let r = 0; r < 15; r++) {
    for (let c = 0; c < 15; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      
      // Home areas
      const homeArea = getHomeArea(r, c);
      if (homeArea) {
        cell.classList.add('home-' + homeArea);
        if (isHomeCell(r, c, homeArea)) {
          cell.classList.add('home-cell');
        }
      }
      // Center area
      else if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
        if (r === 7 && c === 7) {
          cell.classList.add('center-area');
          cell.innerHTML = '<div class="win-triangle"><svg viewBox="0 0 100 100"><polygon points="50,15 85,80 15,80" fill="#fee2e2"/><polygon points="50,15 85,80 50,50" fill="#dcfce7"/><polygon points="85,80 15,80 50,50" fill="#fef9c3"/><polygon points="15,80 50,15 50,50" fill="#dbeafe"/></svg></div>';
        }
      }
      // Path cells
      else {
        const pathColor = getPathColor(r, c);
        if (pathColor) cell.classList.add('path-' + pathColor);
        
        // Safe cells
        if (isSafeCell(r, c)) {
          cell.classList.add('safe');
          const safeColor = getSafeColor(r, c);
          if (safeColor) cell.classList.add('safe-' + safeColor);
        }
        
        // Direction arrows
        addArrow(cell, r, c);
      }
      
      board.appendChild(cell);
    }
  }
  
  // Add player labels
  addPlayerLabels();
}

function getHomeArea(r, c) {
  if (r < 6 && c < 6) return 'red';
  if (r < 6 && c > 8) return 'green';
  if (r > 8 && c > 8) return 'yellow';
  if (r > 8 && c < 6) return 'blue';
  return null;
}

function isHomeCell(r, c, area) {
  const homes = HOMES[area];
  return homes.some(h => h.r === r && h.c === c);
}

function getPathColor(r, c) {
  if (PATHS.red.some(p => p.r === r && p.c === c)) return 'red';
  if (PATHS.green.some(p => p.r === r && p.c === c)) return 'green';
  if (PATHS.yellow.some(p => p.r === r && p.c === c)) return 'yellow';
  if (PATHS.blue.some(p => p.r === r && p.c === c)) return 'blue';
  return null;
}

function isSafeCell(r, c) {
  return SAFE_CELLS.some(s => s.r === r && s.c === c);
}

function getSafeColor(r, c) {
  // Map safe cells to their closest home color
  if (r === 6 && c === 1) return 'red';
  if (r === 1 && c === 8) return 'green';
  if (r === 8 && c === 13) return 'yellow';
  if (r === 13 && c === 6) return 'blue';
  if (r === 8 && c === 2) return 'blue';
  if (r === 2 && c === 6) return 'red';
  if (r === 6 && c === 12) return 'green';
  if (r === 12 && c === 8) return 'yellow';
  return null;
}

function addArrow(cell, r, c) {
  // Add direction indicators for paths
  const arrows = [
    {r:6,c:1,dir:'e',col:'red'},{r:1,c:8,dir:'s',col:'green'},
    {r:13,c:6,dir:'n',col:'blue'},{r:8,c:13,dir:'w',col:'yellow'}
  ];
  const arrow = arrows.find(a => a.r === r && a.c === c);
  if (arrow) {
    cell.classList.add('arrow', 'arrow-' + arrow.dir, 'arrow-' + arrow.col);
  }
}

function addPlayerLabels() {
  const labels = [
    {sel:'.home-red',txt:'Red',cls:'label-red'},
    {sel:'.home-green',txt:'Green',cls:'label-green'},
    {sel:'.home-yellow',txt:'Yellow',cls:'label-yellow'},
    {sel:'.home-blue',txt:'Blue',cls:'label-blue'}
  ];
  
  labels.forEach(({sel,txt,cls}) => {
    const home = board.querySelector(sel);
    if (home) {
      const label = document.createElement('div');
      label.className = 'player-label ' + cls;
      label.textContent = txt;
      home.appendChild(label);
    }
  });
}

function startGame() {
  if (selectedHouses.length !== requiredHouses) {
    alert('Please select exactly ' + requiredHouses + ' players');
    return;
  }
  
  // Set game mode class on wrapper
  const wrapper = document.getElementById('boardWrapper');
  wrapper.className = 'board-wrapper mode-' + requiredHouses + 'p';
  
  // Initialize game state
  gameState.playerCount = requiredHouses;
  gameState.activePlayers = [...selectedHouses];
  gameState.currentPlayer = 0;
  gameState.finished.clear();
  gameState.phase = 'roll';
  
  // Initialize tokens
  gameState.tokens = {};
  gameState.activePlayers.forEach(p => {
    gameState.tokens[p] = [-1, -1, -1, -1]; // -1 = home, 0+ = path position
  });
  
  // Hide setup, show game
  setupModal.style.display = 'none';
  gameWrapper.style.display = 'flex';
  
  // Update UI
  updateDiceVisibility();
  updateTurnIndicator();
  renderTokens();
}

function showSetup() {
  setupModal.style.display = 'flex';
  gameWrapper.style.display = 'none';
}

// Confirmation dialog functions
function confirmBack() {
  document.getElementById('confirmDialog').classList.add('active');
}

function updateDiceVisibility() {
  ['red','green','yellow','blue'].forEach(color => {
    const dice = document.getElementById(color + 'Dice');
    const isActive = gameState.activePlayers.includes(color);
    dice.classList.toggle('active-player', isActive);
    
    const btn = document.getElementById(color + 'Roll');
    const isCurrent = gameState.activePlayers[gameState.currentPlayer] === color;
    const canRoll = gameState.phase === 'roll' && isCurrent && !gameState.finished.has(color);
    
    btn.disabled = !canRoll;
    btn.classList.toggle('active', canRoll);
  });
}

function updateTurnIndicator() {
  const player = gameState.activePlayers[gameState.currentPlayer];
  turnIndicator.textContent = player.charAt(0).toUpperCase() + player.slice(1) + "'s Turn";
  turnIndicator.style.color = COLORS[player];
}

function rollDice(color) {
  const currentColor = gameState.activePlayers[gameState.currentPlayer];
  if (color !== currentColor || gameState.phase !== 'roll') return;
  
  const cube = document.getElementById(color + 'Cube');
  const btn = document.getElementById(color + 'Roll');
  
  // Animate
  cube.classList.add('rolling');
  btn.disabled = true;
  
  // Random rolls during animation
  let rolls = 0;
  const interval = setInterval(() => {
    const randomVal = Math.floor(Math.random() * 6) + 1;
    cube.style.transform = DICE_FACES[randomVal];
    if (++rolls >= 8) {
      clearInterval(interval);
      finalizeRoll();
    }
  }, 80);
  
  function finalizeRoll() {
    cube.classList.remove('rolling');
    gameState.diceValue = Math.floor(Math.random() * 6) + 1;
    cube.style.transform = DICE_FACES[gameState.diceValue];
    
    gameState.phase = 'move';
    checkValidMoves();
  }
}

function checkValidMoves() {
  const player = gameState.activePlayers[gameState.currentPlayer];
  const tokens = gameState.tokens[player];
  const dice = gameState.diceValue;
  
  // Find movable tokens
  let movable = [];
  
  tokens.forEach((pos, idx) => {
    if (pos === -1) {
      // Token at home - can move if dice is 6
      if (dice === 6) movable.push(idx);
    } else if (pos >= 0) {
      // Token on path - can move if not at end
      const path = PATHS[player];
      if (pos + dice < path.length) movable.push(idx);
    }
  });
  
  if (movable.length === 0) {
    // No valid moves - next player
    setTimeout(nextPlayer, 1000);
  } else {
    // Highlight movable tokens
    highlightMovableTokens(player, movable);
  }
}

function highlightMovableTokens(player, indices) {
  const color = player;
  indices.forEach(idx => {
    const pos = gameState.tokens[player][idx];
    const cell = getTokenCell(player, pos, idx);
    if (cell) {
      const token = cell.querySelector('.token');
      if (token) token.classList.add('selected');
    }
  });
}

function getTokenCell(player, pos, tokenIdx) {
  if (pos === -1) {
    // At home
    const home = HOMES[player][tokenIdx];
    return document.querySelector(`.cell[data-r="${home.r}"][data-c="${home.c}"]`);
  } else {
    // On path
    const path = PATHS[player];
    const cell = path[pos];
    return document.querySelector(`.cell[data-r="${cell.r}"][data-c="${cell.c}"]`);
  }
}

function renderTokens() {
  // Clear existing tokens
  document.querySelectorAll('.token').forEach(t => t.remove());
  
  // Render all tokens
  gameState.activePlayers.forEach(player => {
    gameState.tokens[player].forEach((pos, idx) => {
      const cell = getTokenCell(player, pos, idx);
      if (cell) {
        const token = document.createElement('div');
        token.className = 'token token-' + player;
        token.dataset.player = player;
        token.dataset.idx = idx;
        token.onclick = () => tokenClicked(player, idx);
        cell.appendChild(token);
      }
    });
  });
}

function tokenClicked(player, idx) {
  if (player !== gameState.activePlayers[gameState.currentPlayer]) return;
  if (gameState.phase !== 'move') return;
  
  const pos = gameState.tokens[player][idx];
  const dice = gameState.diceValue;
  
  // Validate move
  if (pos === -1 && dice !== 6) return;
  if (pos >= 0) {
    const path = PATHS[player];
    if (pos + dice >= path.length) return;
  }
  
  // Execute move
  moveToken(player, idx, dice);
}

function moveToken(player, idx, steps) {
  let pos = gameState.tokens[player][idx];
  
  if (pos === -1 && steps === 6) {
    // Move from home to start
    gameState.tokens[player][idx] = 0;
  } else {
    // Move on path
    gameState.tokens[player][idx] += steps;
    const newPos = gameState.tokens[player][idx];
    const path = PATHS[player];
    
    // Check for kills
    if (newPos < path.length - 1) { // Not in home stretch
      checkKill(player, newPos);
    }
    
    // Check if reached end
    if (newPos === path.length - 1) {
      checkWin(player);
    }
  }
  
  // Clear selections
  document.querySelectorAll('.token.selected').forEach(t => t.classList.remove('selected'));
  
  // Re-render
  renderTokens();
  
  // Next player (or same player if rolled 6)
  if (steps === 6) {
    gameState.phase = 'roll';
    updateDiceVisibility();
  } else {
    setTimeout(nextPlayer, 500);
  }
}

function checkKill(player, pos) {
  const path = PATHS[player];
  const myPos = path[pos];
  
  // Check other players
  gameState.activePlayers.forEach(other => {
    if (other === player) return;
    
    gameState.tokens[other].forEach((otherPos, idx) => {
      if (otherPos < 0) return;
      
      const otherPath = PATHS[other];
      const otherCell = otherPath[otherPos];
      
      // Same position and not a safe cell
      if (otherCell.r === myPos.r && otherCell.c === myPos.c) {
        if (!isSafeCell(otherCell.r, otherCell.c)) {
          // Kill!
          gameState.tokens[other][idx] = -1;
        }
      }
    });
  });
}

function checkWin(player) {
  const tokens = gameState.tokens[player];
  const path = PATHS[player];
  const allFinished = tokens.every(pos => pos === path.length - 1);
  
  if (allFinished) {
    gameState.finished.add(player);
    alert(player.toUpperCase() + ' wins!');
  }
}

function nextPlayer() {
  gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.playerCount;
  gameState.phase = 'roll';
  gameState.diceValue = null;
  
  updateDiceVisibility();
  updateTurnIndicator();
}

// Start
window.onload = init;
</script>
