<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ludo - 1click Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --red: #ef4444; --red-dark: #b91c1c; --red-light: #fca5a5;
  --blue: #3b82f6; --blue-dark: #1d4ed8; --blue-light: #93c5fd;
  --green: #22c55e; --green-dark: #15803d; --green-light: #86efac;
  --yellow: #eab308; --yellow-dark: #a16207; --yellow-light: #fde047;
  --bg: #0f172a; --bg-card: #1e293b; --bg-light: #334155;
  --text: #f1f5f9; --text-muted: #94a3b8; --border: #475569;
  --shadow: rgba(0,0,0,0.5);
}

html, body { 
  height: 100%; 
  overflow: hidden; 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ═══════════════════════════════════════════════════════════════
   LAYOUT & RESPONSIVE SIZING
   ═══════════════════════════════════════════════════════════════ */

.game-container {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.5rem;
  position: relative;
}

/* Geometric sizing: board fits within viewport with padding */
.board-wrapper {
  position: relative;
  width: min(85vmin, 600px);
  height: min(85vmin, 600px);
  flex-shrink: 0;
}

@media (max-height: 700px) {
  .board-wrapper { width: min(75vmin, 520px); height: min(75vmin, 520px); }
}

@media (max-width: 400px) {
  .board-wrapper { width: min(90vmin, 360px); height: min(90vmin, 360px); }
}

/* ═══════════════════════════════════════════════════════════════
   LUDO BOARD - GEOMETRIC CONSTRUCTION
   ═══════════════════════════════════════════════════════════════ */

.ludo-board {
  width: 100%;
  height: 100%;
  position: relative;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 40px var(--shadow);
  overflow: hidden;
}

/* Home Bases (Corners) - 6x6 grid each */
.home-base {
  position: absolute;
  width: 40%;  /* 6/15 of board */
  height: 40%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8%;
}

.home-base.red { 
  top: 0; left: 0; 
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  border-radius: 12px 0 0 0;
}
.home-base.blue { 
  top: 0; right: 0; 
  background: linear-gradient(225deg, var(--blue), var(--blue-dark));
  border-radius: 0 12px 0 0;
}
.home-base.green { 
  bottom: 0; right: 0; 
  background: linear-gradient(315deg, var(--green), var(--green-dark));
  border-radius: 0 0 12px 0;
}
.home-base.yellow { 
  bottom: 0; left: 0; 
  background: linear-gradient(45deg, var(--yellow), var(--yellow-dark));
  border-radius: 0 0 0 12px;
}

/* White inner area for tokens */
.home-inner {
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.95);
  border-radius: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12%;
  padding: 12%;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.15);
}

/* ═══════════════════════════════════════════════════════════════
   PATH & HOME COLUMNS
   ═══════════════════════════════════════════════════════════════ */

/* Main path grid areas */
.path-grid {
  position: absolute;
  display: grid;
  gap: 1px;
  background: rgba(0,0,0,0.1);
}

/* Top vertical path (Blue home column going down) */
.path-top {
  top: 0; left: 40%; 
  width: 20%; height: 40%;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

/* Bottom vertical path (Yellow home column going up) */
.path-bottom {
  bottom: 0; left: 40%;
  width: 20%; height: 40%;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

/* Left horizontal path (Red home column going right) */
.path-left {
  left: 0; top: 40%;
  width: 40%; height: 20%;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(3, 1fr);
}

/* Right horizontal path (Green home column going left) */
.path-right {
  right: 0; top: 40%;
  width: 40%; height: 20%;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(3, 1fr);
}

.path-cell {
  background: #fff;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Home column colors - gradient from center outward */
.path-top .path-cell:nth-child(13),
.path-top .path-cell:nth-child(14),
.path-top .path-cell:nth-child(15) { 
  background: linear-gradient(to bottom, var(--blue-light), var(--blue)); 
}

.path-bottom .path-cell:nth-child(1),
.path-bottom .path-cell:nth-child(2),
.path-bottom .path-cell:nth-child(3) { 
  background: linear-gradient(to top, var(--yellow-light), var(--yellow)); 
}

.path-left .path-cell:nth-child(4),
.path-left .path-cell:nth-child(5),
.path-left .path-cell:nth-child(6) { 
  background: linear-gradient(to right, var(--red-light), var(--red)); 
}

.path-right .path-cell:nth-child(1),
.path-right .path-cell:nth-child(2),
.path-right .path-cell:nth-child(3) { 
  background: linear-gradient(to left, var(--green-light), var(--green)); 
}

/* Safe zones marked with stars */
.path-cell.safe::before {
  content: '★';
  font-size: clamp(8px, 1.5vmin, 14px);
  color: #fbbf24;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════════════════════
   CENTER DESIGN - Unique Diamond Pattern
   ═══════════════════════════════════════════════════════════════ */

.center-area {
  position: absolute;
  top: 40%; left: 40%;
  width: 20%; height: 20%;
  z-index: 5;
}

.center-diamond {
  width: 100%;
  height: 100%;
  position: relative;
  transform: rotate(45deg);
  background: #fff;
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  overflow: hidden;
}

.center-triangle {
  position: absolute;
  width: 50%;
  height: 50%;
}

.center-triangle.red {
  top: 0; left: 0;
  background: linear-gradient(135deg, var(--red), var(--red-dark));
}

.center-triangle.blue {
  top: 0; right: 0;
  background: linear-gradient(225deg, var(--blue), var(--blue-dark));
}

.center-triangle.green {
  bottom: 0; right: 0;
  background: linear-gradient(315deg, var(--green), var(--green-dark));
}

.center-triangle.yellow {
  bottom: 0; left: 0;
  background: linear-gradient(45deg, var(--yellow), var(--yellow-dark));
}

.center-icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-45deg);
  font-size: clamp(14px, 3vmin, 24px);
  z-index: 10;
}

/* ═══════════════════════════════════════════════════════════════
   TOKENS - Geometric Pawn Design with Responsive Sizing
   ═══════════════════════════════════════════════════════════════ */

.token-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Geometric pawn using CSS */
.ludo-token {
  width: clamp(28px, 5.5vmin, 44px);
  height: clamp(36px, 7vmin, 56px);
  position: relative;
  cursor: pointer;
  transition: transform 0.2s, filter 0.2s;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
}

.ludo-token:hover { transform: scale(1.15); }

.ludo-token.movable {
  animation: token-pulse 0.8s ease-in-out infinite;
  cursor: pointer;
}

@keyframes token-pulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4)); }
  50% { transform: scale(1.12); filter: drop-shadow(0 0 15px currentColor); }
}

.ludo-token.selected {
  transform: scale(1.25);
  z-index: 100;
  filter: drop-shadow(0 0 12px #fff), drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

/* Pawn head (circle) */
.token-head {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 45%;
  height: 35%;
  border-radius: 50%;
  background: inherit;
  box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
}

/* Pawn body (tapered) */
.token-body {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 75%;
  background: inherit;
  clip-path: polygon(20% 100%, 50% 0%, 80% 100%);
  border-radius: 0 0 30% 30%;
}

/* Inner highlight */
.token-body::after {
  content: '';
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 30%;
  height: 40%;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
}

/* Number badge */
.token-number {
  position: absolute;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(10px, 2vmin, 14px);
  font-weight: 800;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  z-index: 10;
}

/* Token colors */
.token-red { color: var(--red); --token-color: var(--red); }
.token-red .token-head, .token-red .token-body { background: linear-gradient(135deg, var(--red), var(--red-dark)); }

.token-blue { color: var(--blue); --token-color: var(--blue); }
.token-blue .token-head, .token-blue .token-body { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); }

.token-green { color: var(--green); --token-color: var(--green); }
.token-green .token-head, .token-green .token-body { background: linear-gradient(135deg, var(--green), var(--green-dark)); }

.token-yellow { color: var(--yellow); --token-color: var(--yellow); }
.token-yellow .token-head, .token-yellow .token-body { background: linear-gradient(135deg, var(--yellow), var(--yellow-dark)); }
.token-yellow .token-number { color: #000; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }

/* ═══════════════════════════════════════════════════════════════
   PLAYER PROFILE CARDS
   ═══════════════════════════════════════════════════════════════ */

.player-card {
  position: absolute;
  background: var(--bg-card);
  border-radius: 12px;
  padding: clamp(6px, 1.2vmin, 12px);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: clamp(6px, 1vmin, 10px);
  min-width: clamp(100px, 18vmin, 150px);
  box-shadow: 0 4px 12px var(--shadow);
  transition: all 0.3s;
}

.player-card.active {
  border-color: var(--token-color);
  box-shadow: 0 0 20px var(--token-color), 0 4px 12px var(--shadow);
  animation: card-glow 2s ease-in-out infinite;
}

@keyframes card-glow {
  0%, 100% { box-shadow: 0 0 15px var(--token-color), 0 4px 12px var(--shadow); }
  50% { box-shadow: 0 0 25px var(--token-color), 0 4px 12px var(--shadow); }
}

.player-card.eliminated {
  opacity: 0.5;
  filter: grayscale(0.8);
}

.player-card.eliminated .card-avatar::after {
  content: '🚫';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(16px, 3vmin, 24px);
}

/* Card positions around board */
.card-red { top: -60px; left: 0; --token-color: var(--red); }
.card-blue { top: -60px; right: 0; --token-color: var(--blue); }
.card-green { bottom: -60px; right: 0; --token-color: var(--green); }
.card-yellow { bottom: -60px; left: 0; --token-color: var(--yellow); }

@media (max-width: 500px) {
  .card-red, .card-blue { top: -50px; }
  .card-green, .card-yellow { bottom: -50px; }
}

.card-avatar {
  width: clamp(32px, 6vmin, 48px);
  height: clamp(32px, 6vmin, 48px);
  border-radius: 50%;
  background: linear-gradient(135deg, var(--token-color), var(--token-color));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(16px, 3vmin, 24px);
  position: relative;
  flex-shrink: 0;
}

.card-info { flex: 1; min-width: 0; }

.card-name {
  font-size: clamp(11px, 2vmin, 14px);
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-type {
  font-size: clamp(9px, 1.5vmin, 11px);
  color: var(--text-muted);
}

.card-tokens {
  display: flex;
  gap: 2px;
  margin-top: 4px;
}

.token-dot {
  width: clamp(6px, 1.2vmin, 10px);
  height: clamp(6px, 1.2vmin, 10px);
  border-radius: 50%;
  background: var(--token-color);
  opacity: 0.3;
  transition: opacity 0.2s;
}

.token-dot.active { opacity: 1; box-shadow: 0 0 4px var(--token-color); }

/* ═══════════════════════════════════════════════════════════════
   ELIMINATION COUNTDOWN
   ═══════════════════════════════════════════════════════════════ */

.countdown-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.countdown-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.countdown-icon {
  font-size: clamp(40px, 8vmin, 64px);
  margin-bottom: 8px;
  animation: shake 1s ease-in-out infinite;
}

@keyframes shake {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(10deg); }
}

.countdown-text {
  font-size: clamp(12px, 2.5vmin, 16px);
  color: var(--text-muted);
  margin-bottom: 12px;
}

.countdown-timer {
  font-size: clamp(36px, 7vmin, 56px);
  font-weight: 800;
  color: #ef4444;
  font-variant-numeric: tabular-nums;
}

.countdown-bar {
  width: 60%;
  height: 6px;
  background: var(--bg-light);
  border-radius: 3px;
  margin-top: 16px;
  overflow: hidden;
}

.countdown-fill {
  height: 100%;
  background: linear-gradient(90deg, #ef4444, #f97316);
  border-radius: 3px;
  transition: width 1s linear;
}

/* ═══════════════════════════════════════════════════════════════
   DICE & CONTROLS
   ═══════════════════════════════════════════════════════════════ */

.controls-area {
  margin-top: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 400px;
}

.dice-container {
  display: flex;
  align-items: center;
  gap: 16px;
}

.dice {
  width: clamp(60px, 12vmin, 80px);
  height: clamp(60px, 12vmin, 80px);
  background: linear-gradient(135deg, #fff, #e2e8f0);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(32px, 6vmin, 48px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.8);
  cursor: pointer;
  transition: transform 0.2s;
  user-select: none;
}

.dice:hover:not(.rolling):not(.disabled) { transform: scale(1.1) rotate(-5deg); }

.dice.rolling { animation: dice-roll 0.5s ease-in-out; }

@keyframes dice-roll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(-20deg) scale(1.15); }
  75% { transform: rotate(20deg) scale(1.15); }
  100% { transform: rotate(0deg) scale(1); }
}

.dice.disabled { opacity: 0.5; cursor: not-allowed; }

.roll-btn {
  padding: clamp(12px, 2.5vmin, 16px) clamp(24px, 5vmin, 32px);
  background: linear-gradient(135deg, #f97316, #eab308);
  border: none;
  border-radius: 12px;
  color: #000;
  font-size: clamp(14px, 2.5vmin, 18px);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(249,115,22,0.4);
}

.roll-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(249,115,22,0.5); }

.roll-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.turn-indicator {
  text-align: center;
}

.turn-text {
  font-size: clamp(14px, 2.5vmin, 18px);
  font-weight: 600;
  color: var(--text);
}

.turn-sub {
  font-size: clamp(11px, 2vmin, 14px);
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════
   GAME LOG
   ═══════════════════════════════════════════════════════════════ */

.game-log {
  width: 100%;
  max-height: 100px;
  background: var(--bg-card);
  border-radius: 10px;
  padding: 10px;
  border: 1px solid var(--border);
  overflow-y: auto;
}

.log-entry {
  font-size: clamp(11px, 2vmin, 13px);
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
}

.log-entry:last-child { border-bottom: none; }

.log-entry span.player { font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════
   SETUP SCREEN
   ═══════════════════════════════════════════════════════════════ */

.setup-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
  overflow-y: auto;
}

.setup-screen.hidden { display: none; }

.setup-title {
  text-align: center;
  margin-bottom: 24px;
}

.setup-title h1 {
  font-size: clamp(28px, 6vmin, 40px);
  background: linear-gradient(135deg, #f97316, #eab308);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.setup-card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  max-width: 400px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.setup-card h3 {
  color: var(--text-muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}

.player-config {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  border: 2px solid var(--border);
  transition: all 0.2s;
}

.player-config.active { border-color: var(--token-color); }
.player-config.inactive { opacity: 0.4; }

.config-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}

.config-name {
  flex: 1;
  font-weight: 600;
  font-size: 14px;
}

.config-type {
  display: flex;
  gap: 4px;
}

.type-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.type-btn.active {
  background: var(--bg-light);
  color: var(--text);
  border-color: var(--text);
}

.player-count {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.count-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.count-btn.active {
  background: linear-gradient(135deg, #f97316, #eab308);
  color: #000;
  border-color: transparent;
}

.start-btn {
  width: 100%;
  max-width: 400px;
  padding: 16px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,197,94,0.4); }

/* ═══════════════════════════════════════════════════════════════
   WIN MODAL
   ═══════════════════════════════════════════════════════════════ */

.win-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.win-modal.active { display: flex; }

.win-content {
  background: var(--bg-card);
  border-radius: 24px;
  padding: 40px;
  text-align: center;
  border: 2px solid var(--border);
  max-width: 320px;
}

.win-emoji {
  font-size: clamp(60px, 12vmin, 80px);
  margin-bottom: 16px;
}

.win-title {
  font-size: clamp(24px, 5vmin, 32px);
  font-weight: 800;
  margin-bottom: 8px;
}

.win-subtitle {
  color: var(--text-muted);
  margin-bottom: 24px;
}

.win-buttons {
  display: flex;
  gap: 12px;
}

.win-btn {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.win-btn.primary { background: linear-gradient(135deg, #f97316, #eab308); color: #000; }
.win-btn.secondary { background: var(--bg-light); color: var(--text); }

/* ═══════════════════════════════════════════════════════════════

<script>
// ═══════════════════════════════════════════════════════════════
// GAME CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════════════

const PLAYERS = ['red', 'blue', 'green', 'yellow'];
const COLORS = {
  red: { main: '#ef4444', dark: '#b91c1c', light: '#fca5a5' },
  blue: { main: '#3b82f6', dark: '#1d4ed8', light: '#93c5fd' },
  green: { main: '#22c55e', dark: '#15803d', light: '#86efac' },
  yellow: { main: '#eab308', dark: '#a16207', light: '#fde047' }
};

// Ludo path - 52 squares + 5 home squares per player = 57 steps total
// Position 0 = home (yard), 1-52 = path, 53-57 = home column, 58 = finished
const PATH_LENGTH = 52;
const HOME_LENGTH = 5;

// Entry positions for each player on the global path (0-51)
const ENTRY_POSITIONS = { red: 0, blue: 13, green: 26, yellow: 39 };

// Safe squares (every 8th square + entry squares) - 0-indexed
const SAFE_SQUARES = new Set([0, 8, 13, 21, 26, 34, 39, 47]);

// Path cell positions for rendering (percentage-based coordinates)
// This maps global path positions (0-51) to board coordinates
function getPathCoordinates(globalPos) {
  // Board is 0-100% coordinate system
  // Home bases are 0-40% in each corner
  // Center area is 40-60%
  
  // Top row (going right): positions 0-5
  if (globalPos >= 0 && globalPos <= 5) {
    const idx = globalPos;
    return { x: 40 + (idx + 1) * (20/6), y: 46.67 }; // Middle of path area
  }
  
  // Right side (going down): positions 6-11
  if (globalPos >= 6 && globalPos <= 11) {
    const idx = globalPos - 6;
    return { x: 53.33, y: 40 + (idx + 1) * (20/6) };
  }
  
  // Bottom row (going left): positions 12-17
  if (globalPos >= 12 && globalPos <= 17) {
    const idx = globalPos - 12;
    return { x: 60 - (idx + 1) * (20/6), y: 53.33 };
  }
  
  // Left side (going up): positions 18-23
  if (globalPos >= 18 && globalPos <= 23) {
    const idx = globalPos - 18;
    return { x: 46.67, y: 60 - (idx + 1) * (20/6) };
  }
  
  // Continue pattern for full 52 positions
  // Section 1 (Red start area to Blue): positions 0-12
  // Section 2 (Blue to Green): positions 13-25
  // Section 3 (Green to Yellow): positions 26-38
  // Section 4 (Yellow to Red): positions 39-51
  
  // Simplified for demo - full implementation would map all 52
  return { x: 50, y: 50 };
}

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════

let gameState = {
  playerCount: 3,
  playerTypes: { red: 'human', blue: 'ai', green: 'ai', yellow: 'ai' },
  activePlayers: [],
  tokens: {}, // { red: [0,0,0,0], ... } - position of each token
  currentPlayer: 0,
  diceValue: null,
  phase: 'roll', // 'roll', 'move', 'animating'
  rollCount: 0,
  eliminated: new Set(),
  countdown: null,
  winner: null
};

let countdownInterval = null;

// ═══════════════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════════════

function initSetup() {
  const container = document.getElementById('playerConfigs');
  
  function renderConfigs() {
    container.innerHTML = '';
    PLAYERS.forEach((player, idx) => {
      const isActive = idx < gameState.playerCount;
      const config = document.createElement('div');
      config.className = `player-config ${isActive ? 'active' : 'inactive'}`;
      config.style.setProperty('--token-color', COLORS[player].main);
      
      config.innerHTML = `
        <div class="config-dot" style="background: ${COLORS[player].main}"></div>
        <div class="config-name" style="color: ${COLORS[player].main}; text-transform: capitalize">${player}</div>
        <div class="config-type">
          <button class="type-btn ${isActive && gameState.playerTypes[player] === 'human' ? 'active' : ''}" 
                  data-player="${player}" data-type="human" ${!isActive ? 'disabled' : ''}>👤 Human</button>
          <button class="type-btn ${isActive && gameState.playerTypes[player] === 'ai' ? 'active' : ''}" 
                  data-player="${player}" data-type="ai" ${!isActive ? 'disabled' : ''}>🤖 AI</button>
        </div>
      `;
      container.appendChild(config);
    });
    
    // Add click handlers
    container.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        gameState.playerTypes[btn.dataset.player] = btn.dataset.type;
        renderConfigs();
      });
    });
  }
  
  // Player count buttons
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      gameState.playerCount = parseInt(btn.dataset.count);
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderConfigs();
    });
  });
  
  renderConfigs();
  
  document.getElementById('startBtn').addEventListener('click', startGame);
}

// ═══════════════════════════════════════════════════════════════
// GAME INITIALIZATION
// ═══════════════════════════════════════════════════════════════

function startGame() {
  // Initialize game state
  gameState.activePlayers = PLAYERS.slice(0, gameState.playerCount);
  gameState.tokens = {};
  gameState.activePlayers.forEach(p => {
    gameState.tokens[p] = [0, 0, 0, 0]; // All tokens start at home (0)
  });
  gameState.currentPlayer = 0;
  gameState.diceValue = null;
  gameState.phase = 'roll';
  gameState.rollCount = 0;
  gameState.eliminated.clear();
  gameState.winner = null;
  
  // Clear any existing countdown
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
  
  // Build path cells
  buildPathCells();
  
  // Update player cards
  updatePlayerCards();
  
  // Show game screen
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').style.display = 'flex';
  
  // Initial render
  renderTokens();
  updateUI();
  
  addLog('🎮 Game started! Good luck!');
  
  // If first player is AI, trigger their turn
  if (isCurrentPlayerAI()) {
    setTimeout(aiTurn, 1000);
  }
}

function buildPathCells() {
  // Build top path (3 columns x 6 rows) - Blue home column
  const topPath = document.getElementById('path-top');
  topPath.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const cell = document.createElement('div');
    cell.className = 'path-cell';
    cell.id = `cell-top-${i}`;
    // Safe squares
    if ([3, 9].includes(i)) cell.classList.add('safe');
    topPath.appendChild(cell);
  }
  
  // Build bottom path (3 columns x 6 rows) - Yellow home column
  const bottomPath = document.getElementById('path-bottom');
  bottomPath.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const cell = document.createElement('div');
    cell.className = 'path-cell';
    cell.id = `cell-bottom-${17-i}`; // Reverse order
    if ([3, 9].includes(i)) cell.classList.add('safe');
    bottomPath.appendChild(cell);
  }
  
  // Build left path (6 columns x 3 rows) - Red home column
  const leftPath = document.getElementById('path-left');
  leftPath.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const cell = document.createElement('div');
    cell.className = 'path-cell';
    cell.id = `cell-left-${i}`;
    if ([3, 9].includes(i)) cell.classList.add('safe');
    leftPath.appendChild(cell);
  }
  
  // Build right path (6 columns x 3 rows) - Green home column
  const rightPath = document.getElementById('path-right');
  rightPath.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const cell = document.createElement('div');
    cell.className = 'path-cell';
    cell.id = `cell-right-${17-i}`; // Reverse order
    if ([3, 9].includes(i)) cell.classList.add('safe');
    rightPath.appendChild(cell);
  }
}

// ═══════════════════════════════════════════════════════════════
// TOKEN RENDERING - Geometric Positioning
// ═══════════════════════════════════════════════════════════════

function renderTokens() {
  // Clear existing tokens
  document.querySelectorAll('.ludo-token').forEach(t => t.remove());
  
  // Track positions for stacking
  const positionCounts = {};
  
  gameState.activePlayers.forEach(player => {
    if (gameState.eliminated.has(player)) return;
    
    gameState.tokens[player].forEach((pos, idx) => {
      const token = createToken(player, idx);
      
      if (pos === 0) {
        // In home base
        const slot = document.querySelector(`[data-home="${player}"][data-idx="${idx}"]`);
        if (slot) slot.appendChild(token);
      } else if (pos >= 58) {
        // Finished - don't render
      } else if (pos >= 53) {
        // Home column (53-57)
        const homePos = pos - 53;
        const coords = getHomeColumnCoords(player, homePos);
        placeTokenOnBoard(token, coords, positionCounts);
      } else {
        // On path (1-52)
        const entry = ENTRY_POSITIONS[player];
        const globalPos = (entry + pos - 1) % 52;
        const coords = getPathCoords(globalPos);
        placeTokenOnBoard(token, coords, positionCounts);
      }
    });
  });
}

function createToken(player, idx) {
  const token = document.createElement('div');
  token.className = `ludo-token token-${player}`;
  token.dataset.player = player;
  token.dataset.idx = idx;
  token.innerHTML = `
    <div class="token-head"></div>
    <div class="token-body"></div>
    <div class="token-number">${idx + 1}</div>
  `;
  
  // Check if movable
  if (canMoveToken(player, idx)) {
    token.classList.add('movable');
  }
  
  token.addEventListener('click', () => handleTokenClick(player, idx));
  return token;
}

function placeTokenOnBoard(token, coords, positionCounts) {
  const key = `${coords.x.toFixed(1)},${coords.y.toFixed(1)}`;
  const stackIdx = positionCounts[key] || 0;
  positionCounts[key] = stackIdx + 1;
  
  // Offset for stacking
  const offsetX = (stackIdx % 2 === 0 ? -1 : 1) * 2;
  const offsetY = (stackIdx < 2 ? -1 : 1) * 2;
  
  token.style.position = 'absolute';
  token.style.left = `calc(${coords.x}% + ${offsetX}px)`;
  token.style.top = `calc(${coords.y}% + ${offsetY}px)`;
  token.style.transform = 'translate(-50%, -50%)';
  token.style.zIndex = 10 + stackIdx;
  
  document.getElementById('ludoBoard').appendChild(token);
}

function getPathCoords(globalPos) {
  // Map global position (0-51) to board coordinates
  // Board layout:
  // - Home bases: 0-40% (corners)
  // - Path areas: around the center
  // - Center: 40-60%
  
  // Top section (Blue's right side going down then across): positions 0-12
  if (globalPos <= 12) {
    // Top path area: from right of red to top of blue
    if (globalPos <= 5) {
      // Top horizontal, going right
      return { x: 46.67 + (globalPos * 3.33), y: 40 + 10 };
    } else {
      // Right side going down
      return { x: 53.33, y: 40 + ((globalPos - 5) * 3.33) };
    }
  }
  
  // Right section (Green area): positions 13-25
  if (globalPos <= 25) {
    const pos = globalPos - 13;
    if (pos <= 5) {
      return { x: 53.33 + (pos * 3.33), y: 53.33 };
    } else {
      return { x: 53.33 + 20, y: 53.33 + ((pos - 6) * 3.33) };
    }
  }
  
  // Bottom section (Yellow area): positions 26-38
  if (globalPos <= 38) {
    const pos = globalPos - 26;
    if (pos <= 5) {
      return { x: 60 + 10 - (pos * 3.33), y: 53.33 + 10 };
    } else {
      return { x: 53.33 - 10, y: 53.33 + 20 - ((pos - 6) * 3.33) };
    }
  }
  
  // Left section (Red area): positions 39-51
  const pos = globalPos - 39;
  if (pos <= 5) {
    return { x: 40 + 10 - (pos * 3.33), y: 53.33 - 10 };
  } else {
    return { x: 40, y: 53.33 - ((pos - 6) * 3.33) };
  }
}

function getHomeColumnCoords(player, homePos) {
  // Home positions 0-4 within home column
  const step = (homePos + 1) * 3.33;
  switch (player) {
    case 'red': return { x: 40 + step, y: 50 };
    case 'blue': return { x: 50, y: 40 + step };
    case 'green': return { x: 60 - step, y: 50 };
    case 'yellow': return { x: 50, y: 60 - step };
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════════

function currentPlayer() {
  return gameState.activePlayers[gameState.currentPlayer];
}

function isCurrentPlayerAI() {
  return gameState.playerTypes[currentPlayer()] === 'ai';
}

function canMoveToken(player, tokenIdx) {
  if (player !== currentPlayer()) return false;
  if (gameState.phase !== 'move') return false;
  if (gameState.eliminated.has(player)) return false;
  
  const pos = gameState.tokens[player][tokenIdx];
  const dice = gameState.diceValue;
  
  if (pos === 0) {
    // Can only leave home with a 6
    return dice === 6;
  } else if (pos >= 58) {
    // Already finished
    return false;
  } else {
    // Can move if won't overshoot
    return pos + dice <= 58;
  }
}

function rollDice() {
  if (gameState.phase !== 'roll') return;
  if (isCurrentPlayerAI()) return;
  
  performRoll();
}

function performRoll() {
  gameState.phase = 'animating';
  
  const dice = document.getElementById('dice');
  dice.classList.add('rolling');
  
  // Animation
  let rolls = 0;
  const interval = setInterval(() => {
    dice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random() * 6)];
    rolls++;
    if (rolls >= 8) {
      clearInterval(interval);
      dice.classList.remove('rolling');
      
      // Final value
      gameState.diceValue = Math.floor(Math.random() * 6) + 1;
      dice.textContent = ['','⚀','⚁','⚂','⚃','⚄','⚅'][gameState.diceValue];
      
      afterRoll();
    }
  }, 80);
}

function afterRoll() {
  const player = currentPlayer();
  const dice = gameState.diceValue;
  
  addLog(`<span class="player" style="color: ${COLORS[player].main}">${player.charAt(0).toUpperCase() + player.slice(1)}</span> rolled <b>${dice}</b>`);
  
  // Check if any moves are possible
  const movableTokens = gameState.tokens[player]
    .map((pos, idx) => ({ pos, idx }))
    .filter(({ pos, idx }) => canMoveToken(player, idx));
  
  if (movableTokens.length === 0) {
    addLog('No valid moves!');
    setTimeout(nextTurn, 1500);
    return;
  }
  
  gameState.phase = 'move';
  updateUI();
  renderTokens();
  
  // Auto-move if only one option and it's AI
  if (movableTokens.length === 1 && isCurrentPlayerAI()) {
    setTimeout(() => moveToken(player, movableTokens[0].idx), 800);
  }
}

function handleTokenClick(player, tokenIdx) {
  if (!canMoveToken(player, tokenIdx)) return;
  moveToken(player, tokenIdx);
}

function moveToken(player, tokenIdx) {
  const oldPos = gameState.tokens[player][tokenIdx];
  let newPos;
  
  if (oldPos === 0) {
    // Leaving home
    newPos = 1;
    addLog(`${player.charAt(0).toUpperCase() + player.slice(1)} token ${tokenIdx + 1} enters the game!`);
  } else {
    newPos = oldPos + gameState.diceValue;
    if (newPos > 58) newPos = 58; // Cap at finish
  }
  
  gameState.tokens[player][tokenIdx] = newPos;
  
  // Check for captures
  if (newPos >= 1 && newPos <= 52) {
    checkCapture(player, tokenIdx, newPos);
  }
  
  // Check win
  if (newPos === 58) {
    const finishedCount = gameState.tokens[player].filter(p => p === 58).length;
    addLog(`${player.charAt(0).toUpperCase() + player.slice(1)} token ${tokenIdx + 1} reached home! (${finishedCount}/4)`);
    
    if (finishedCount === 4) {
      endGame(player);
      return;
    }
  }
  
  renderTokens();
  
  // Extra turn for rolling 6
  if (gameState.diceValue === 6) {
    addLog('🎲 Rolled a 6! Extra turn!');
    gameState.phase = 'roll';
    updateUI();
    if (isCurrentPlayerAI()) setTimeout(aiTurn, 800);
  } else {
    setTimeout(nextTurn, 600);
  }
}

function checkCapture(player, tokenIdx, pos) {
  const entry = ENTRY_POSITIONS[player];
  const globalPos = (entry + pos - 1) % 52;
  
  // Can't capture on safe squares
  if (SAFE_SQUARES.has(globalPos)) return;
  
  // Check all opponent tokens
  gameState.activePlayers.forEach(opponent => {
    if (opponent === player || gameState.eliminated.has(opponent)) return;
    
    gameState.tokens[opponent].forEach((oppPos, oppIdx) => {
      if (oppPos >= 1 && oppPos <= 52) {
        const oppEntry = ENTRY_POSITIONS[opponent];
        const oppGlobalPos = (oppEntry + oppPos - 1) % 52;
        if (oppGlobalPos === globalPos) {
          // Capture!
          gameState.tokens[opponent][oppIdx] = 0;
          addLog(`💥 <span class="player" style="color: ${COLORS[player].main}">${player.charAt(0).toUpperCase() + player.slice(1)}</span> captured ${opponent}'s token!`);
        }
      }
    });
  });
}

function nextTurn() {
  if (gameState.winner) return;
  
  gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.activePlayers.length;
  gameState.diceValue = null;
  gameState.phase = 'roll';
  
  // Skip eliminated players
  if (gameState.eliminated.has(currentPlayer())) {
    nextTurn();
    return;
  }
  
  updateUI();
  renderTokens();
  
  if (isCurrentPlayerAI()) {
    setTimeout(aiTurn, 1000);
  }
}

function aiTurn() {
  if (gameState.phase !== 'roll') return;
  performRoll();
}

// ═══════════════════════════════════════════════════════════════
// ELIMINATION COUNTDOWN
// ═══════════════════════════════════════════════════════════════

function startEliminationCountdown(player) {
  if (gameState.eliminated.has(player)) return;
  
  const overlay = document.getElementById('countdownOverlay');
  const timer = document.getElementById('countdownTimer');
  const fill = document.getElementById('countdownFill');
  
  let seconds = 30;
  overlay.classList.add('active');
  timer.textContent = seconds;
  fill.style.width = '100%';
  
  addLog(`⚠️ ${player.charAt(0).toUpperCase() + player.slice(1)} inactive! Elimination in 30s...`);
  
  countdownInterval = setInterval(() => {
    seconds--;
    timer.textContent = seconds;
    fill.style.width = (seconds / 30 * 100) + '%';
    
    if (seconds <= 0) {
      clearInterval(countdownInterval);
      eliminatePlayer(player);
      overlay.classList.remove('active');
    }
  }, 1000);
}

function eliminatePlayer(player) {
  gameState.eliminated.add(player);
  
  // Remove all tokens
  gameState.tokens[player] = [58, 58, 58, 58];
  
  // Update UI
  const card = document.getElementById(`card-${player}`);
  if (card) {
    card.classList.add('eliminated');
    card.querySelector('.card-avatar').innerHTML = '🚫';
    card.querySelector('.card-type').textContent = 'Eliminated';
  }
  
  addLog(`❌ ${player.charAt(0).toUpperCase() + player.slice(1)} was eliminated!`);
  
  renderTokens();
  
  // Check if only one player remains
  const remaining = gameState.activePlayers.filter(p => !gameState.eliminated.has(p));
  if (remaining.length === 1) {
    endGame(remaining[0]);
  } else if (currentPlayer() === player) {
    nextTurn();
  }
}

// Simulate disconnection for testing (press 'D' key)
document.addEventListener('keydown', (e) => {
  if (e.key === 'd' || e.key === 'D') {
    const current = currentPlayer();
    if (!gameState.eliminated.has(current)) {
      startEliminationCountdown(current);
    }
  }
});

// ═══════════════════════════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════════════════════════

function updateUI() {
  const player = currentPlayer();
  const color = COLORS[player];
  
  // Update turn indicator
  const turnText = document.getElementById('turnText');
  const turnSub = document.getElementById('turnSub');
  turnText.textContent = player.charAt(0).toUpperCase() + player.slice(1) + "'s Turn";
  turnText.style.color = color.main;
  
  if (gameState.phase === 'roll') {
    turnSub.textContent = isCurrentPlayerAI() ? '🤖 AI thinking...' : 'Roll the dice!';
  } else if (gameState.phase === 'move') {
    turnSub.textContent = 'Select a token to move';
  } else {
    turnSub.textContent = '...';
  }
  
  // Update player cards
  gameState.activePlayers.forEach(p => {
    const card = document.getElementById(`card-${p}`);
    if (card) {
      card.classList.toggle('active', p === player && !gameState.eliminated.has(p));
      
      // Update token dots
      const dots = card.querySelectorAll('.token-dot');
      gameState.tokens[p].forEach((pos, i) => {
        dots[i].classList.toggle('active', pos < 58);
      });
    }
  });
  
  // Update dice and button
  const dice = document.getElementById('dice');
  const rollBtn = document.getElementById('rollBtn');
  
  if (gameState.diceValue) {
    dice.textContent = ['','⚀','⚁','⚂','⚃','⚄','⚅'][gameState.diceValue];
  } else {
    dice.textContent = '🎲';
  }
  
  rollBtn.disabled = gameState.phase !== 'roll' || isCurrentPlayerAI();
}

function updatePlayerCards() {
  // Update player card info
  gameState.activePlayers.forEach(p => {
    const card = document.getElementById(`card-${p}`);
    if (card) {
      const type = gameState.playerTypes[p];
      card.querySelector('.card-type').textContent = type === 'ai' ? '🤖 AI' : '👤 Human';
      card.style.display = 'flex';
    }
  });
  
  // Hide inactive player cards
  PLAYERS.slice(gameState.playerCount).forEach(p => {
    const card = document.getElementById(`card-${p}`);
    if (card) card.style.display = 'none';
  });
}

function addLog(message) {
  const log = document.getElementById('gameLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = message;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  
  // Keep only last 20 entries
  while (log.children.length > 20) {
    log.removeChild(log.firstChild);
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME END
// ═══════════════════════════════════════════════════════════════

function endGame(winner) {
  gameState.winner = winner;
  
  const modal = document.getElementById('winModal');
  const title = document.getElementById('winTitle');
  const subtitle = document.getElementById('winSubtitle');
  const emoji = document.getElementById('winEmoji');
  
  const color = COLORS[winner];
  title.textContent = winner.charAt(0).toUpperCase() + winner.slice(1) + ' Wins!';
  title.style.color = color.main;
  title.style.textShadow = `0 0 20px ${color.main}`;
  
  emoji.textContent = ['🏆','🎉','👑','⭐'][Math.floor(Math.random() * 4)];
  subtitle.textContent = gameState.playerTypes[winner] === 'ai' 
    ? 'The AI wins this round!' 
    : 'Congratulations! You won!';
  
  modal.classList.add('active');
  
  // Clear countdown if active
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

// ═══════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════

document.getElementById('rollBtn').addEventListener('click', rollDice);
document.getElementById('dice').addEventListener('click', rollDice);

document.getElementById('playAgainBtn').addEventListener('click', () => {
  document.getElementById('winModal').classList.remove('active');
  startGame();
});

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('winModal').classList.remove('active');
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('setupScreen').classList.remove('hidden');
  
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
});

// Initialize
initSetup();
</script>
