<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku - 1click Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --primary: #4fbdba;
            --accent: #f59e0b;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --border: #2d3748;
            --cell-bg: #0f3460;
            --cell-selected: #e94560;
            --cell-highlight: rgba(79, 189, 186, 0.2);
            --error: #e74c3c;
            --success: #2ecc71;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .game-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-card);
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
            font-size: 1rem;
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        /* Setup Screen */
        .setup-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            gap: 1.5rem;
        }
        
        .setup-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        
        .setup-section {
            background: var(--bg-card);
            padding: 1.2rem;
            border-radius: 12px;
        }
        
        .setup-section h3 {
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .option-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .option-btn {
            flex: 1;
            min-width: 70px;
            padding: 0.8rem;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .option-btn:hover, .option-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .start-btn {
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Game Screen */
        .game-screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            background: var(--bg-card);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .timer { color: var(--accent); }
        .size { color: var(--primary); }
        
        /* Difficulty */
        .difficulty-bar {
            display: flex;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.5rem;
            background: var(--bg-card);
            margin-bottom: 0.5rem;
        }
        
        .diff-btn {
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        
        .diff-btn:hover, .diff-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Game Board */
        .board-wrapper {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
        }
        
        .sudoku-board {
            display: grid;
            gap: 1px;
            background: #2c3e50;
            padding: 2px;
            border-radius: 4px;
        }
        
        .sudoku-board.size-6 {
            grid-template-columns: repeat(6, 1fr);
        }
        
        .sudoku-board.size-9 {
            grid-template-columns: repeat(9, 1fr);
        }
        
        .sudoku-board.size-12 {
            grid-template-columns: repeat(12, 1fr);
        }
        
        .sudoku-board.size-16 {
            grid-template-columns: repeat(16, 1fr);
        }
        
        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            min-width: 28px;
            min-height: 28px;
        }
        
        /* Smaller font for larger boards */
        .sudoku-board.size-12 .cell {
            font-size: 0.9rem;
            min-width: 22px;
            min-height: 22px;
        }
        
        .sudoku-board.size-16 .cell {
            font-size: 0.75rem;
            min-width: 18px;
            min-height: 18px;
        }
        
        .cell:hover:not(.fixed) {
            background: rgba(79, 189, 186, 0.3);
        }
        
        .cell.selected {
            background: var(--cell-selected) !important;
            color: white;
        }
        
        .cell.highlight {
            background: var(--cell-highlight);
        }
        
        .cell.fixed {
            color: var(--text);
            font-weight: 700;
        }
        
        .cell.user-filled {
            color: var(--primary);
        }
        
        .cell.error {
            color: var(--error);
            background: rgba(231, 76, 60, 0.2);
        }
        
        /* Box borders - size 6 (2x3 blocks) */
        .sudoku-board.size-6 .cell:nth-child(3n):not(:nth-child(6n)) { border-right: 2px solid #2c3e50; }
        .sudoku-board.size-6 .cell:nth-child(n+13):nth-child(-n+18) { border-bottom: 2px solid #2c3e50; }
        
        /* Box borders - size 9 (3x3 blocks) */
        .sudoku-board.size-9 .cell:nth-child(3n):not(:nth-child(9n)) { border-right: 2px solid #2c3e50; }
        .sudoku-board.size-9 .cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-board.size-9 .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #2c3e50; }
        
        /* Box borders - size 12 (3x4 blocks) */
        .sudoku-board.size-12 .cell:nth-child(4n):not(:nth-child(12n)) { border-right: 2px solid #2c3e50; }
        .sudoku-board.size-12 .cell:nth-child(n+25):nth-child(-n+36),
        .sudoku-board.size-12 .cell:nth-child(n+61):nth-child(-n+72),
        .sudoku-board.size-12 .cell:nth-child(n+97):nth-child(-n+108) { border-bottom: 2px solid #2c3e50; }
        
        /* Box borders - size 16 (4x4 blocks) */
        .sudoku-board.size-16 .cell:nth-child(4n):not(:nth-child(16n)) { border-right: 2px solid #2c3e50; }
        .sudoku-board.size-16 .cell:nth-child(n+33):nth-child(-n+48),
        .sudoku-board.size-16 .cell:nth-child(n+81):nth-child(-n+96),
        .sudoku-board.size-16 .cell:nth-child(n+129):nth-child(-n+144) { border-bottom: 2px solid #2c3e50; }
        
        /* Number Pad */
        .numpad {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .num-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-card);
            color: var(--text);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .num-btn:hover { background: var(--primary); }
        .num-btn:active { transform: scale(0.95); }
        .num-btn.clear { background: var(--error); }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 1rem 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-new {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
        }
        
        .btn-menu {
            background: var(--border);
            color: var(--text);
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal.hidden { display: none !important; }
        
        .modal-content {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            max-width: 300px;
        }
        
        .modal-content h2 {
            color: var(--success);
            margin-bottom: 0.5rem;
        }
        
        .modal-content p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        
        /* Loading */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .loading.hidden { display: none !important; }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading p {
            margin-top: 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1 class="title">Sudoku</h1>
            <div style="width: 40px;"></div>
        </header>

        <!-- Setup Screen -->
        <div class="setup-screen" id="setup-screen">
            <h2 class="setup-title">🎯 New Game</h2>
            
            <div class="setup-section">
                <h3>Board Size</h3>
                <div class="option-row">
                    <button class="option-btn active" data-size="6">6×6</button>
                    <button class="option-btn" data-size="9">9×9</button>
                    <button class="option-btn" data-size="12">12×12</button>
                    <button class="option-btn" data-size="16">16×16</button>
                </div>
            </div>
            
            <div class="setup-section">
                <h3>Difficulty</h3>
                <div class="option-row">
                    <button class="option-btn active" data-diff="easy">Easy</button>
                    <button class="option-btn" data-diff="medium">Medium</button>
                    <button class="option-btn" data-diff="hard">Hard</button>
                </div>
            </div>
            
            <button class="start-btn" id="start-btn">Start Game</button>
        </div>

        <!-- Game Screen -->
        <div class="game-screen" id="game-screen">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Size</div>
                    <div class="stat-value size" id="size-display">9×9</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value timer" id="timer">00:00</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level-display">Medium</div>
                </div>
            </div>

            <div class="difficulty-bar">
                <button class="diff-btn" data-diff="easy">Easy</button>
                <button class="diff-btn active" data-diff="medium">Medium</button>
                <button class="diff-btn" data-diff="hard">Hard</button>
            </div>

            <div class="board-wrapper">
                <div class="sudoku-board" id="board"></div>
            </div>

            <div class="numpad" id="numpad"></div>

            <div class="controls">
                <button class="btn btn-menu" id="menu-btn">Menu</button>
                <button class="btn btn-new" id="new-game-btn">New Game</button>
            </div>
        </div>

        <!-- Win Modal -->
        <div id="win-modal" class="modal hidden">
            <div class="modal-content">
                <h2>🎉 Solved!</h2>
                <p>Time: <span id="win-time">00:00</span></p>
                <button class="btn btn-new" id="play-again-btn">Play Again</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Generating puzzle...</p>
        </div>
    </div>

    <script>
class SudokuGame {
    constructor() {
        this.size = 9;
        this.difficulty = 'medium';
        this.board = [];
        this.solution = [];
        this.fixed = [];
        this.selected = null;
        this.timer = 0;
        this.timerInterval = null;
        
        this.init();
    }
    
    init() {
        this.setupEventListeners();
    }
    
    setupEventListeners() {
        // Size selection
        document.querySelectorAll('.option-btn[data-size]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.option-btn[data-size]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                this.size = parseInt(e.target.dataset.size);
            });
        });
        
        // Difficulty selection
        document.querySelectorAll('.option-btn[data-diff]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.option-btn[data-diff]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                this.difficulty = e.target.dataset.diff;
            });
        });
        
        // Start button
        document.getElementById('start-btn').addEventListener('click', () => {
            this.startGame();
        });
        
        // Menu button
        document.getElementById('menu-btn').addEventListener('click', () => {
            this.showMenu();
        });
        
        document.getElementById('new-game-btn').addEventListener('click', () => {
            this.showMenu();
        });
        
        document.getElementById('play-again-btn').addEventListener('click', () => {
            document.getElementById('win-modal').classList.add('hidden');
            this.showMenu();
        });
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('game-screen').style.display || 
                document.getElementById('game-screen').style.display === 'none') return;
            
            const maxNum = this.size;
            if (e.key >= '1' && e.key <= '9') {
                const num = parseInt(e.key);
                if (num <= maxNum) this.fillCell(num);
            } else if (e.key >= 'a' && e.key <= 'f' && maxNum >= 10) {
                // For 12x12 and 16x16 (A=10, B=11, etc.)
                const hexMap = {a:10, b:11, c:12, d:13, e:14, f:15};
                const num = hexMap[e.key];
                if (num <= maxNum) this.fillCell(num);
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                this.fillCell(0);
            } else if (e.key === 'ArrowUp') {
                this.moveSelection(-this.size);
            } else if (e.key === 'ArrowDown') {
                this.moveSelection(this.size);
            } else if (e.key === 'ArrowLeft') {
                this.moveSelection(-1);
            } else if (e.key === 'ArrowRight') {
                this.moveSelection(1);
            }
        });
    }
    
    showMenu() {
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
        clearInterval(this.timerInterval);
    }
    
    async startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('loading').classList.remove('hidden');
        
        // Update displays
        document.getElementById('size-display').textContent = `${this.size}×${this.size}`;
        document.getElementById('level-display').textContent = 
            this.difficulty.charAt(0).toUpperCase() + this.difficulty.slice(1);
        
        // Update difficulty buttons in game
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.diff === this.difficulty);
        });
        
        // Generate puzzle
        await this.generatePuzzle();
        
        // Create board
        this.createBoard();
        this.createNumpad();
        
        // Start timer
        this.timer = 0;
        clearInterval(this.timerInterval);
        this.timerInterval = setInterval(() => {
            this.timer++;
            this.updateTimer();
        }, 1000);
        
        document.getElementById('loading').classList.add('hidden');
    }
    
    async generatePuzzle() {
        // Generate full board
        this.solution = this.generateFullBoard();
        
        // Create puzzle by removing numbers
        this.board = this.createPuzzle(this.solution, this.difficulty);
        
        // Mark fixed cells
        this.fixed = this.board.map(v => v !== 0);
    }
    
    generateFullBoard() {
        const size = this.size;
        const board = Array(size).fill().map(() => Array(size).fill(0));
        const numbers = Array.from({length: size}, (_, i) => i + 1);
        
        // Block dimensions for different sizes
        const blockDims = {
            6: [2, 3],   // 2 rows x 3 cols = 6
            9: [3, 3],   // 3x3 = 9
            12: [3, 4],  // 3x4 = 12
            16: [4, 4]   // 4x4 = 16
        };
        const [blockRows, blockCols] = blockDims[size] || [Math.sqrt(size), Math.sqrt(size)];
        
        const isValid = (board, row, col, num) => {
            // Check row
            for (let c = 0; c < size; c++) {
                if (board[row][c] === num) return false;
            }
            // Check column
            for (let r = 0; r < size; r++) {
                if (board[r][col] === num) return false;
            }
            // Check block
            const startRow = Math.floor(row / blockRows) * blockRows;
            const startCol = Math.floor(col / blockCols) * blockCols;
            for (let r = startRow; r < startRow + blockRows; r++) {
                for (let c = startCol; c < startCol + blockCols; c++) {
                    if (r < size && c < size && board[r][c] === num) return false;
                }
            }
            return true;
        };
        
        const fill = (r, c) => {
            if (r === size) return true;
            const [nr, nc] = c + 1 < size ? [r, c + 1] : [r + 1, 0];
            
            const shuffled = [...numbers].sort(() => Math.random() - 0.5);
            for (const num of shuffled) {
                if (isValid(board, r, c, num)) {
                    board[r][c] = num;
                    if (fill(nr, nc)) return true;
                    board[r][c] = 0;
                }
            }
            return false;
        };
        
        fill(0, 0);
        return board.flat();
    }
    
    createPuzzle(solution, difficulty) {
        const size = this.size;
        const puzzle = [...solution];
        
        // Removal percentages based on difficulty
        const removalRates = { easy: 0.40, medium: 0.55, hard: 0.70 };
        const targetRemovals = Math.floor(size * size * removalRates[difficulty]);
        
        let attempts = 0;
        let removed = 0;
        const maxAttempts = targetRemovals * 3;
        
        while (removed < targetRemovals && attempts < maxAttempts) {
            const idx = Math.floor(Math.random() * size * size);
            
            if (puzzle[idx] !== 0) {
                const backup = puzzle[idx];
                puzzle[idx] = 0;
                
                // Check if puzzle still has unique solution
                const solutions = this.countSolutions([...puzzle]);
                
                if (solutions === 1) {
                    removed++;
                } else {
                    puzzle[idx] = backup;
                }
            }
            attempts++;
        }
        
        return puzzle;
    }
    
    countSolutions(board) {
        const size = this.size;
        const blockDims = {6: [2, 3], 9: [3, 3], 12: [3, 4], 16: [4, 4]};
        const [blockRows, blockCols] = blockDims[size] || [Math.sqrt(size), Math.sqrt(size)];
        let count = 0;
        
        const isValid = (board, row, col, num) => {
            for (let c = 0; c < size; c++) {
                if (board[row * size + c] === num) return false;
            }
            for (let r = 0; r < size; r++) {
                if (board[r * size + col] === num) return false;
            }
            const startRow = Math.floor(row / blockRows) * blockRows;
            const startCol = Math.floor(col / blockCols) * blockCols;
            for (let r = startRow; r < startRow + blockRows; r++) {
                for (let c = startCol; c < startCol + blockCols; c++) {
                    if (r < size && c < size && board[r * size + c] === num) return false;
                }
            }
            return true;
        };
        
        const solve = () => {
            if (count >= 2) return;
            
            for (let i = 0; i < size * size; i++) {
                const r = Math.floor(i / size);
                const c = i % size;
                
                if (board[i] === 0) {
                    for (let num = 1; num <= size; num++) {
                        if (isValid(board, r, c, num)) {
                            board[i] = num;
                            solve();
                            board[i] = 0;
                        }
                    }
                    return;
                }
            }
            count++;
        };
        
        solve();
        return count;
    }
    
    createBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        board.className = `sudoku-board size-${this.size}`;
        
        for (let i = 0; i < this.size * this.size; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            cell.addEventListener('click', () => this.selectCell(i));
            board.appendChild(cell);
        }
        
        this.render();
    }
    
    createNumpad() {
        const numpad = document.getElementById('numpad');
        numpad.innerHTML = '';
        
        // Number buttons
        for (let i = 1; i <= this.size; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            // For 10+, use letters A-F for 10-15
            btn.textContent = i > 9 ? String.fromCharCode(55 + i) : i;
            btn.addEventListener('click', () => this.fillCell(i));
            numpad.appendChild(btn);
        }
        
        // Clear button
        const clearBtn = document.createElement('button');
        clearBtn.className = 'num-btn clear';
        clearBtn.textContent = '✕';
        clearBtn.addEventListener('click', () => this.fillCell(0));
        numpad.appendChild(clearBtn);
    }
    
    selectCell(idx) {
        this.selected = idx;
        this.render();
    }
    
    moveSelection(delta) {
        if (this.selected === null) {
            this.selected = 0;
        } else {
            this.selected = Math.max(0, Math.min(this.size * this.size - 1, this.selected + delta));
        }
        this.render();
    }
    
    fillCell(num) {
        if (this.selected === null || this.fixed[this.selected]) return;
        
        this.board[this.selected] = num;
        this.render();
        
        if (this.checkWin()) {
            this.win();
        }
    }
    
    checkWin() {
        for (let i = 0; i < this.size * this.size; i++) {
            if (this.board[i] !== this.solution[i]) return false;
        }
        return true;
    }
    
    win() {
        clearInterval(this.timerInterval);
        document.getElementById('win-time').textContent = this.formatTime(this.timer);
        document.getElementById('win-modal').classList.remove('hidden');
    }
    
    render() {
        const cells = document.querySelectorAll('.cell');
        
        cells.forEach((cell, i) => {
            const val = this.board[i];
            const sol = this.solution[i];
            
            // Display value
            if (val === 0) {
                cell.textContent = '';
            } else if (val > 9) {
                cell.textContent = String.fromCharCode(55 + val);
            } else {
                cell.textContent = val;
            }
            
            // Reset classes
            cell.className = 'cell';
            
            if (this.fixed[i]) {
                cell.classList.add('fixed');
            } else if (val !== 0) {
                cell.classList.add('user-filled');
                if (val !== sol) {
                    cell.classList.add('error');
                }
            }
            
            if (i === this.selected) {
                cell.classList.add('selected');
            }
            
            // Highlight same row/col/block
            if (this.selected !== null) {
                const sr = Math.floor(this.selected / this.size);
                const sc = this.selected % this.size;
                const r = Math.floor(i / this.size);
                const c = i % this.size;
                
                const blockDims = {6: [2, 3], 9: [3, 3], 12: [3, 4], 16: [4, 4]};
                const [blockRows, blockCols] = blockDims[this.size] || [Math.sqrt(this.size), Math.sqrt(this.size)];
                const sBoxR = Math.floor(sr / blockRows);
                const sBoxC = Math.floor(sc / blockCols);
                const boxR = Math.floor(r / blockRows);
                const boxC = Math.floor(c / blockCols);
                
                if ((sr === r || sc === c || (sBoxR === boxR && sBoxC === boxC)) && i !== this.selected) {
                    cell.classList.add('highlight');
                }
            }
        });
    }
    
    updateTimer() {
        document.getElementById('timer').textContent = this.formatTime(this.timer);
    }
    
    formatTime(s) {
        return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }
}

new SudokuGame();
    </script>
