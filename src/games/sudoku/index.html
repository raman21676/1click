<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku - 1click Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --primary: #4fbdba;
            --accent: #f59e0b;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --border: #2d3748;
            --cell-bg: #0f3460;
            --cell-selected: #e94560;
            --cell-highlight: rgba(79, 189, 186, 0.2);
            --error: #e74c3c;
            --success: #2ecc71;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .game-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-card);
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
            font-size: 1rem;
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 1rem;
            background: var(--bg-card);
            margin-bottom: 0.5rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .timer { color: var(--accent); }
        .hints { color: #9b59b6; }
        
        /* Difficulty */
        .difficulty-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            margin-bottom: 1rem;
        }
        
        .diff-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .diff-btn:hover, .diff-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Game Board */
        .board-wrapper {
            padding: 0 1rem;
            margin-bottom: 1rem;
        }
        
        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            background: #2c3e50;
            padding: 2px;
            border-radius: 4px;
        }
        
        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        
        .cell:hover:not(.fixed) {
            background: rgba(79, 189, 186, 0.3);
        }
        
        .cell.selected {
            background: var(--cell-selected) !important;
            color: white;
        }
        
        .cell.highlight {
            background: var(--cell-highlight);
        }
        
        .cell.fixed {
            color: var(--text);
            font-weight: 700;
        }
        
        .cell.user-filled {
            color: var(--primary);
        }
        
        .cell.error {
            color: var(--error);
            background: rgba(231, 76, 60, 0.2);
        }
        
        /* Box borders */
        .cell:nth-child(3n):not(:nth-child(9n)) { border-right: 2px solid #2c3e50; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #2c3e50; }
        
        /* Number Pad */
        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            padding: 0 1rem;
            margin-bottom: 1rem;
        }
        
        .num-btn {
            aspect-ratio: 1;
            border: none;
            background: var(--bg-card);
            color: var(--text);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .num-btn:hover { background: var(--primary); }
        .num-btn:active { transform: scale(0.95); }
        .num-btn.clear { background: var(--error); }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-hint {
            background: #9b59b6;
            color: white;
        }
        
        .btn-new {
            background: var(--primary);
            color: white;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal.hidden { display: none !important; }
        
        .modal-content {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            max-width: 300px;
        }
        
        .modal-content h2 {
            color: var(--success);
            margin-bottom: 0.5rem;
        }
        
        .modal-content p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1 class="title">Sudoku</h1>
            <div style="width: 40px;"></div>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value timer" id="timer">00:00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Hints</div>
                <div class="stat-value hints" id="hints-count">3</div>
            </div>
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level-display">Medium</div>
            </div>
        </div>

        <div class="difficulty-bar">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn active" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
            <button class="diff-btn" data-diff="expert">Expert</button>
        </div>

        <div class="board-wrapper">
            <div class="sudoku-board" id="board"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn clear" data-num="0">✕</button>
        </div>

        <div class="controls">
            <button class="btn btn-hint" id="hint-btn">💡 Hint</button>
            <button class="btn btn-new" id="new-game-btn">New Game</button>
        </div>
    </div>

    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 Solved!</h2>
            <p>Time: <span id="win-time">00:00</span></p>
            <button class="btn btn-new" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script>
const Storage = {
    get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
};

class Sudoku {
    constructor() {
        this.board = Array(81).fill(0);
        this.solution = Array(81).fill(0);
        this.fixed = Array(81).fill(false);
        this.selected = null;
        this.hints = 3;
        this.timer = 0;
        this.timerInterval = null;
        this.difficulty = 'medium';
        this.diffSettings = { easy: 35, medium: 45, hard: 55, expert: 60 };
        
        this.init();
    }
    
    init() {
        this.createBoard();
        this.attachEvents();
        this.newGame();
    }
    
    createBoard() {
        const b = document.getElementById('board');
        b.innerHTML = '';
        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = i;
            cell.addEventListener('click', () => this.selectCell(i));
            b.appendChild(cell);
        }
    }
    
    attachEvents() {
        // Difficulty
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                this.difficulty = e.target.dataset.diff;
                document.getElementById('level-display').textContent = 
                    this.difficulty.charAt(0).toUpperCase() + this.difficulty.slice(1);
                this.newGame();
            });
        });
        
        // Numpad
        document.querySelectorAll('.num-btn').forEach(btn => {
            btn.addEventListener('click', () => this.fillCell(parseInt(btn.dataset.num)));
        });
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '9') this.fillCell(parseInt(e.key));
            else if (e.key === 'Backspace' || e.key === 'Delete') this.fillCell(0);
            else if (e.key === 'ArrowUp') this.moveSel(-9);
            else if (e.key === 'ArrowDown') this.moveSel(9);
            else if (e.key === 'ArrowLeft') this.moveSel(-1);
            else if (e.key === 'ArrowRight') this.moveSel(1);
        });
        
        // Buttons
        document.getElementById('hint-btn').addEventListener('click', () => this.useHint());
        document.getElementById('new-game-btn').addEventListener('click', () => this.newGame());
        document.getElementById('play-again-btn').addEventListener('click', () => {
            document.getElementById('win-modal').classList.add('hidden');
            this.newGame();
        });
    }
    
    moveSel(delta) {
        if (this.selected === null) this.selected = 0;
        else this.selected = Math.max(0, Math.min(80, this.selected + delta));
        this.render();
    }
    
    generate() {
        // Empty board
        const grid = Array(9).fill().map(() => Array(9).fill(0));
        
        // Fill diagonal boxes
        for (let box = 0; box < 3; box++) {
            const nums = [1,2,3,4,5,6,7,8,9];
            this.shuffle(nums);
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    grid[box*3+i][box*3+j] = nums[i*3+j];
                }
            }
        }
        
        // Solve
        this.solve(grid);
        
        // Copy to solution
        this.solution = grid.flat();
        
        // Create puzzle by removing cells
        this.board = [...this.solution];
        let toRemove = this.diffSettings[this.difficulty];
        while (toRemove > 0) {
            const idx = Math.floor(Math.random() * 81);
            if (this.board[idx] !== 0) {
                this.board[idx] = 0;
                toRemove--;
            }
        }
        
        // Mark fixed cells
        this.fixed = this.board.map(v => v !== 0);
    }
    
    shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    
    solve(grid) {
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (grid[r][c] === 0) {
                    for (let num = 1; num <= 9; num++) {
                        if (this.isValid(grid, r, c, num)) {
                            grid[r][c] = num;
                            if (this.solve(grid)) return true;
                            grid[r][c] = 0;
                        }
                    }
                    return false;
                }
            }
        }
        return true;
    }
    
    isValid(grid, r, c, num) {
        for (let x = 0; x < 9; x++) if (grid[r][x] === num) return false;
        for (let x = 0; x < 9; x++) if (grid[x][c] === num) return false;
        const br = r - r % 3, bc = c - c % 3;
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (grid[br+i][bc+j] === num) return false;
            }
        }
        return true;
    }
    
    newGame() {
        this.hints = 3;
        this.timer = 0;
        this.selected = null;
        clearInterval(this.timerInterval);
        this.timerInterval = setInterval(() => { this.timer++; this.updateTimer(); }, 1000);
        this.generate();
        this.render();
        this.updateHints();
    }
    
    selectCell(idx) {
        this.selected = idx;
        this.render();
    }
    
    fillCell(num) {
        if (this.selected === null || this.fixed[this.selected]) return;
        this.board[this.selected] = num;
        this.render();
        if (this.checkWin()) this.win();
    }
    
    useHint() {
        if (this.hints <= 0 || this.selected === null || this.fixed[this.selected]) return;
        if (this.board[this.selected] === this.solution[this.selected]) return;
        this.hints--;
        this.updateHints();
        this.board[this.selected] = this.solution[this.selected];
        this.render();
        if (this.checkWin()) this.win();
    }
    
    render() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            const val = this.board[i];
            cell.textContent = val || '';
            cell.className = 'cell';
            
            if (this.fixed[i]) cell.classList.add('fixed');
            else if (val !== 0) {
                cell.classList.add('user-filled');
                if (val !== this.solution[i]) cell.classList.add('error');
            }
            
            if (i === this.selected) cell.classList.add('selected');
            
            // Highlight same row/col/box
            if (this.selected !== null) {
                const sr = Math.floor(this.selected / 9);
                const sc = this.selected % 9;
                const r = Math.floor(i / 9);
                const c = i % 9;
                const sBox = Math.floor(sr/3)*3 + Math.floor(sc/3);
                const box = Math.floor(r/3)*3 + Math.floor(c/3);
                
                if ((sr === r || sc === c || sBox === box) && i !== this.selected) {
                    cell.classList.add('highlight');
                }
            }
        });
    }
    
    checkWin() {
        return this.board.every((v, i) => v === this.solution[i]);
    }
    
    win() {
        clearInterval(this.timerInterval);
        document.getElementById('win-time').textContent = this.formatTime(this.timer);
        document.getElementById('win-modal').classList.remove('hidden');
    }
    
    updateTimer() {
        document.getElementById('timer').textContent = this.formatTime(this.timer);
    }
    
    updateHints() {
        document.getElementById('hints-count').textContent = this.hints;
    }
    
    formatTime(s) {
        return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }
}

new Sudoku();
    </script>
</body>
</html>
