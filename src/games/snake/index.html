<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - 1click Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-primary: #10b981;
            --color-primary-dark: #059669;
            --color-primary-light: #34d399;
            --color-accent: #f59e0b;
            --color-danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
        }
        
        .game-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(16, 185, 129, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .back-btn {
            color: #34d399;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-btn:hover { color: #10b981; }
        
        .game-header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .high-score {
            font-size: 0.9rem;
            color: #fbbf24;
            font-weight: 600;
        }
        
        /* Main */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            gap: 1rem;
        }
        
        /* Info */
        .game-info {
            display: flex;
            gap: 2rem;
        }
        
        .score-box, .speed-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 0.75rem;
            min-width: 80px;
        }
        
        .score-box .label, .speed-box .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .score-box .value, .speed-box .value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .score-box .value { color: #10b981; }
        .speed-box .value { color: #f59e0b; }
        
        /* Canvas */
        .canvas-wrapper {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        
        #game-canvas {
            display: block;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 3px solid #334155;
            border-radius: 1rem;
        }
        
        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            backdrop-filter: blur(5px);
        }
        
        .overlay.hidden { display: none; }
        
        .overlay-content {
            text-align: center;
            padding: 2rem;
        }
        
        .overlay-content h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .overlay-content p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        
        /* Buttons */
        .control-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #475569;
            background: transparent;
            color: #f1f5f9;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .control-btn:hover { background: rgba(255, 255, 255, 0.1); }
        
        .control-btn.primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
        }
        
        .control-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        /* Desktop Controls */
        .desktop-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        
        .controls-hint {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        
        .game-buttons {
            display: flex;
            gap: 1rem;
        }
        
        /* Mobile Controls */
        .mobile-controls {
            display: none;
        }
        
        .d-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .d-middle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .d-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #334155;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            border-radius: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .d-btn:active {
            background: linear-gradient(145deg, #334155 0%, #1e293b 100%);
            transform: scale(0.95);
        }
        
        .d-btn.pause {
            background: linear-gradient(145deg, #f59e0b 0%, #d97706 100%);
            border-color: #f59e0b;
            font-size: 1.2rem;
        }
        
        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .shake { animation: shake 0.5s ease-in-out; }
        
        /* Responsive */
        @media (max-width: 480px) {
            .game-header {
                padding: 0.75rem 1rem;
            }
            .game-header h1 {
                font-size: 1.25rem;
            }
            .canvas-wrapper {
                width: 100%;
                max-width: 350px;
            }
            #game-canvas {
                width: 100%;
                height: auto;
            }
            .desktop-controls {
                display: none;
            }
            .mobile-controls {
                display: flex;
                justify-content: center;
                padding: 0.5rem;
            }
            .d-btn {
                width: 55px;
                height: 55px;
            }
            .game-info {
                gap: 1rem;
            }
            .score-box, .speed-box {
                padding: 0.5rem 1rem;
                min-width: 70px;
            }
        }
        
        @media (max-width: 360px) {
            .canvas-wrapper {
                max-width: 300px;
            }
            .d-btn {
                width: 50px;
                height: 50px;
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1>🐍 Snake</h1>
            <div class="header-stats">
                <span class="high-score">Best: <span id="high-score-display">0</span></span>
            </div>
        </header>

        <main class="game-main">
            <div class="game-info">
                <div class="score-box">
                    <span class="label">Score</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="speed-box">
                    <span class="label">Speed</span>
                    <span id="speed" class="value">1x</span>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="400" height="400"></canvas>
                <div id="game-overlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="overlay-title">Snake Game</h2>
                        <p id="overlay-message">Use arrow keys or swipe to play</p>
                        <button id="start-btn" class="control-btn primary">Start Game</button>
                    </div>
                </div>
                <div id="pause-overlay" class="overlay hidden">
                    <div class="overlay-content">
                        <h2>Paused</h2>
                        <p>Press Space or tap to resume</p>
                    </div>
                </div>
            </div>

            <div class="mobile-controls">
                <div class="d-pad">
                    <button id="btn-up" class="d-btn">↑</button>
                    <div class="d-middle">
                        <button id="btn-left" class="d-btn">←</button>
                        <button id="btn-pause" class="d-btn pause">⏸</button>
                        <button id="btn-right" class="d-btn">→</button>
                    </div>
                    <button id="btn-down" class="d-btn">↓</button>
                </div>
            </div>

            <div class="desktop-controls">
                <div class="controls-hint">
                    <span>⌨️ Arrow keys to move</span>
                    <span>␣ Space to pause</span>
                </div>
                <div class="game-buttons">
                    <button id="pause-btn" class="control-btn">Pause</button>
                    <button id="reset-btn" class="control-btn primary">New Game</button>
                </div>
            </div>
        </main>
    </div>

    <script>
// Simple LocalStorage wrapper
const Storage = {
    get: (key) => {
        try {
            const item = localStorage.getItem(key);
            return item ? JSON.parse(item) : null;
        } catch (e) {
            return null;
        }
    },
    set: (key, value) => {
        try {
            localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
            console.error('Storage error:', e);
        }
    }
};

// Snake Game
class SnakeGame {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.gridSize = 20;
        this.tileCount = 20;
        
        this.setupCanvas();
        
        this.snake = [{ x: 10, y: 10 }];
        this.food = this.generateFood();
        this.dx = 0;
        this.dy = 0;
        this.score = 0;
        this.highScore = 0;
        this.speed = 1;
        this.baseSpeed = 100;
        this.currentSpeed = this.baseSpeed;
        
        this.gameLoop = null;
        this.isPlaying = false;
        this.isPaused = false;
        
        this.touchStartX = 0;
        this.touchStartY = 0;
        
        this.colors = {
            snakeHead: '#10b981',
            snakeBody: '#34d399',
            food: '#ef4444',
            grid: 'rgba(51, 65, 85, 0.3)'
        };
        
        this.init();
    }
    
    setupCanvas() {
        const isMobile = window.innerWidth <= 480;
        if (isMobile) {
            const maxWidth = Math.min(window.innerWidth - 32, 350);
            this.canvas.width = maxWidth;
            this.canvas.height = maxWidth;
            this.gridSize = maxWidth / this.tileCount;
        }
    }
    
    init() {
        this.loadHighScore();
        this.updateHighScoreDisplay();
        this.attachEventListeners();
        this.draw();
    }
    
    attachEventListeners() {
        document.addEventListener('keydown', (e) => this.handleKeydown(e));
        
        this.canvas.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: false });
        this.canvas.addEventListener('touchend', (e) => this.handleTouchEnd(e), { passive: false });
        this.canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        
        document.getElementById('start-btn').addEventListener('click', () => this.startGame());
        document.getElementById('reset-btn').addEventListener('click', () => this.resetGame());
        document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
        
        document.getElementById('btn-up').addEventListener('click', () => this.setDirection(0, -1));
        document.getElementById('btn-down').addEventListener('click', () => this.setDirection(0, 1));
        document.getElementById('btn-left').addEventListener('click', () => this.setDirection(-1, 0));
        document.getElementById('btn-right').addEventListener('click', () => this.setDirection(1, 0));
        document.getElementById('btn-pause').addEventListener('click', () => this.togglePause());
        
        window.addEventListener('resize', () => {
            this.setupCanvas();
            if (!this.isPlaying) this.draw();
        });
    }
    
    handleKeydown(e) {
        if ([32, 37, 38, 39, 40].includes(e.keyCode)) {
            e.preventDefault();
        }
        
        if (!this.isPlaying) {
            if (e.keyCode === 32 || e.keyCode === 13) {
                this.startGame();
            }
            return;
        }
        
        if (e.keyCode === 32) {
            this.togglePause();
            return;
        }
        
        if (this.isPaused) return;
        
        switch(e.keyCode) {
            case 37: if (this.dx !== 1) this.setDirection(-1, 0); break;
            case 38: if (this.dy !== 1) this.setDirection(0, -1); break;
            case 39: if (this.dx !== -1) this.setDirection(1, 0); break;
            case 40: if (this.dy !== -1) this.setDirection(0, 1); break;
        }
    }
    
    handleTouchStart(e) {
        e.preventDefault();
        this.touchStartX = e.touches[0].clientX;
        this.touchStartY = e.touches[0].clientY;
    }
    
    handleTouchEnd(e) {
        e.preventDefault();
        if (!this.isPlaying || this.isPaused) return;
        
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        
        const dx = touchEndX - this.touchStartX;
        const dy = touchEndY - this.touchStartY;
        
        const minSwipe = 30;
        
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
            if (dx > 0 && this.dx !== -1) this.setDirection(1, 0);
            else if (dx < 0 && this.dx !== 1) this.setDirection(-1, 0);
        } else if (Math.abs(dy) > minSwipe) {
            if (dy > 0 && this.dy !== -1) this.setDirection(0, 1);
            else if (dy < 0 && this.dy !== 1) this.setDirection(0, -1);
        }
    }
    
    setDirection(dx, dy) {
        if (this.snake.length > 1) {
            if (dx !== 0 && dx === -this.dx) return;
            if (dy !== 0 && dy === -this.dy) return;
        }
        this.dx = dx;
        this.dy = dy;
    }
    
    startGame() {
        this.isPlaying = true;
        this.isPaused = false;
        this.hideOverlay();
        this.gameLoop = setInterval(() => this.update(), this.currentSpeed);
    }
    
    resetGame() {
        this.stopGame();
        this.snake = [{ x: 10, y: 10 }];
        this.food = this.generateFood();
        this.dx = 0;
        this.dy = 0;
        this.score = 0;
        this.speed = 1;
        this.currentSpeed = this.baseSpeed;
        this.updateScoreDisplay();
        this.updateSpeedDisplay();
        this.showStartOverlay();
        this.draw();
    }
    
    stopGame() {
        this.isPlaying = false;
        this.isPaused = false;
        if (this.gameLoop) {
            clearInterval(this.gameLoop);
            this.gameLoop = null;
        }
    }
    
    togglePause() {
        if (!this.isPlaying) return;
        
        this.isPaused = !this.isPaused;
        
        if (this.isPaused) {
            clearInterval(this.gameLoop);
            this.showPauseOverlay();
        } else {
            this.hidePauseOverlay();
            this.gameLoop = setInterval(() => this.update(), this.currentSpeed);
        }
    }
    
    update() {
        const head = { x: this.snake[0].x + this.dx, y: this.snake[0].y + this.dy };
        
        if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
            this.gameOver();
            return;
        }
        
        if (this.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
            this.gameOver();
            return;
        }
        
        this.snake.unshift(head);
        
        if (head.x === this.food.x && head.y === this.food.y) {
            this.score += 10;
            this.updateScoreDisplay();
            this.increaseSpeed();
            this.food = this.generateFood();
            
            if (this.score > this.highScore) {
                this.highScore = this.score;
                this.saveHighScore();
                this.updateHighScoreDisplay();
            }
        } else {
            this.snake.pop();
        }
        
        this.draw();
    }
    
    generateFood() {
        let food;
        do {
            food = {
                x: Math.floor(Math.random() * this.tileCount),
                y: Math.floor(Math.random() * this.tileCount)
            };
        } while (this.snake.some(segment => segment.x === food.x && segment.y === food.y));
        return food;
    }
    
    increaseSpeed() {
        const newSpeed = Math.floor(this.score / 50) + 1;
        if (newSpeed > this.speed) {
            this.speed = newSpeed;
            this.currentSpeed = Math.max(50, this.baseSpeed - (this.speed - 1) * 10);
            this.updateSpeedDisplay();
            
            clearInterval(this.gameLoop);
            this.gameLoop = setInterval(() => this.update(), this.currentSpeed);
        }
    }
    
    draw() {
        this.ctx.fillStyle = '#0f172a';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.drawGrid();
        this.drawFood();
        this.drawSnake();
    }
    
    drawGrid() {
        this.ctx.strokeStyle = this.colors.grid;
        this.ctx.lineWidth = 1;
        
        for (let i = 0; i <= this.tileCount; i++) {
            const pos = i * this.gridSize;
            this.ctx.beginPath();
            this.ctx.moveTo(pos, 0);
            this.ctx.lineTo(pos, this.canvas.height);
            this.ctx.stroke();
            
            this.ctx.beginPath();
            this.ctx.moveTo(0, pos);
            this.ctx.lineTo(this.canvas.width, pos);
            this.ctx.stroke();
        }
    }
    
    drawFood() {
        const x = this.food.x * this.gridSize;
        const y = this.food.y * this.gridSize;
        const size = this.gridSize - 2;
        
        this.ctx.shadowColor = this.colors.food;
        this.ctx.shadowBlur = 15;
        
        this.ctx.fillStyle = this.colors.food;
        this.ctx.beginPath();
        this.ctx.roundRect(x + 1, y + 1, size, size, 4);
        this.ctx.fill();
        
        this.ctx.shadowBlur = 0;
    }
    
    drawSnake() {
        this.snake.forEach((segment, index) => {
            const x = segment.x * this.gridSize;
            const y = segment.y * this.gridSize;
            const size = this.gridSize - 2;
            
            if (index === 0) {
                this.ctx.fillStyle = this.colors.snakeHead;
                this.ctx.shadowColor = this.colors.snakeHead;
                this.ctx.shadowBlur = 10;
            } else {
                this.ctx.fillStyle = this.colors.snakeBody;
                this.ctx.shadowBlur = 0;
            }
            
            this.ctx.beginPath();
            this.ctx.roundRect(x + 1, y + 1, size, size, 4);
            this.ctx.fill();
            
            if (index === 0) {
                this.drawEyes(x, y, size);
            }
        });
        
        this.ctx.shadowBlur = 0;
    }
    
    drawEyes(x, y, size) {
        this.ctx.fillStyle = '#fff';
        const eyeSize = size / 5;
        const eyeOffset = size / 4;
        
        let eye1X = x + eyeOffset;
        let eye1Y = y + eyeOffset;
        let eye2X = x + size - eyeOffset - eyeSize;
        let eye2Y = y + eyeOffset;
        
        if (this.dx === 1) { eye1X += 2; eye2X += 2; }
        else if (this.dx === -1) { eye1X -= 2; eye2X -= 2; }
        else if (this.dy === -1) { eye1Y -= 2; eye2Y -= 2; }
        else if (this.dy === 1) { eye1Y += 2; eye2Y += 2; }
        
        this.ctx.fillRect(eye1X, eye1Y, eyeSize, eyeSize);
        this.ctx.fillRect(eye2X, eye2Y, eyeSize, eyeSize);
    }
    
    gameOver() {
        this.stopGame();
        this.canvas.classList.add('shake');
        setTimeout(() => this.canvas.classList.remove('shake'), 500);
        
        const isNewHighScore = this.score > 0 && this.score >= this.highScore;
        const title = isNewHighScore ? '🎉 New High Score!' : 'Game Over!';
        const message = `Score: ${this.score}${isNewHighScore ? ' (Best: ' + this.highScore + ')' : ''}`;
        
        this.showGameOverOverlay(title, message);
    }
    
    showStartOverlay() {
        document.getElementById('game-overlay').classList.remove('hidden');
        document.getElementById('overlay-title').textContent = '🐍 Snake Game';
        document.getElementById('overlay-message').textContent = 'Use arrow keys or swipe to play';
        document.getElementById('start-btn').textContent = 'Start Game';
    }
    
    showGameOverOverlay(title, message) {
        document.getElementById('game-overlay').classList.remove('hidden');
        document.getElementById('overlay-title').textContent = title;
        document.getElementById('overlay-message').textContent = message;
        document.getElementById('start-btn').textContent = 'Play Again';
    }
    
    hideOverlay() {
        document.getElementById('game-overlay').classList.add('hidden');
    }
    
    showPauseOverlay() {
        document.getElementById('pause-overlay').classList.remove('hidden');
    }
    
    hidePauseOverlay() {
        document.getElementById('pause-overlay').classList.add('hidden');
    }
    
    updateScoreDisplay() {
        document.getElementById('score').textContent = this.score;
    }
    
    updateSpeedDisplay() {
        document.getElementById('speed').textContent = this.speed + 'x';
    }
    
    updateHighScoreDisplay() {
        document.getElementById('high-score-display').textContent = this.highScore;
    }
    
    loadHighScore() {
        const saved = Storage.get('snake_highscore');
        if (saved) {
            this.highScore = saved;
        }
    }
    
    saveHighScore() {
        Storage.set('snake_highscore', this.highScore);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new SnakeGame();
});
    </script>
</body>
</html>
