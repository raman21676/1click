<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - 1click Games</title>
    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1>🐍 Snake</h1>
            <div class="header-stats">
                <span class="high-score">Best: <span id="high-score-display">0</span></span>
            </div>
        </header>

        <main class="game-main">
            <div class="game-info">
                <div class="score-box">
                    <span class="label">Score</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="speed-box">
                    <span class="label">Speed</span>
                    <span id="speed" class="value">1x</span>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="400" height="400"></canvas>
                <div id="game-overlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="overlay-title">Snake Game</h2>
                        <p id="overlay-message">Use arrow keys or swipe to play</p>
                        <button id="start-btn" class="control-btn primary">Start Game</button>
                    </div>
                </div>
                <div id="pause-overlay" class="overlay hidden">
                    <div class="overlay-content">
                        <h2>Paused</h2>
                        <p>Press Space or tap to resume</p>
                    </div>
                </div>
            </div>

            <div class="mobile-controls">
                <div class="d-pad">
                    <button id="btn-up" class="d-btn">↑</button>
                    <div class="d-middle">
                        <button id="btn-left" class="d-btn">←</button>
                        <button id="btn-pause" class="d-btn pause">⏸</button>
                        <button id="btn-right" class="d-btn">→</button>
                    </div>
                    <button id="btn-down" class="d-btn">↓</button>
                </div>
            </div>

            <div class="desktop-controls">
                <div class="controls-hint">
                    <span>⌨️ Arrow keys to move</span>
                    <span>␣ Space to pause</span>
                </div>
                <div class="game-buttons">
                    <button id="pause-btn" class="control-btn">Pause</button>
                    <button id="reset-btn" class="control-btn primary">New Game</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../assets/js/storage.js"></script>
    <script src="game.js"></script>
</body>
</html>
