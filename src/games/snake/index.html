<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - 1click Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
        }
        
        .game-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .back-btn {
            color: #34d399;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .game-header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .high-score {
            font-size: 0.9rem;
            color: #fbbf24;
            font-weight: 600;
        }
        
        /* Main */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            gap: 1rem;
        }
        
        /* Info */
        .game-info {
            display: flex;
            gap: 2rem;
        }
        
        .info-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 0.75rem;
            min-width: 80px;
        }
        
        .info-box .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        
        .info-box .value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .score-value { color: #10b981; }
        .speed-value { color: #f59e0b; }
        
        /* Canvas */
        .canvas-wrapper {
            position: relative;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        
        #game-canvas {
            display: block;
            background: #0f172a;
            border: 3px solid #334155;
            border-radius: 1rem;
        }
        
        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
        }
        
        .overlay.hidden { display: none !important; }
        
        .overlay-content {
            text-align: center;
            padding: 2rem;
        }
        
        .overlay-content h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #10b981;
        }
        
        .overlay-content p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        
        /* Buttons */
        .control-btn {
            padding: 0.75rem 1.5rem;
            border: 1px solid #475569;
            background: transparent;
            color: #f1f5f9;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            margin: 0 0.5rem;
        }
        
        .control-btn:hover { background: rgba(255, 255, 255, 0.1); }
        
        .control-btn.primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
        }
        
        /* Controls */
        .desktop-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        
        .controls-hint {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        
        .mobile-controls {
            display: none;
        }
        
        .d-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .d-middle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .d-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #334155;
            background: #1e293b;
            color: #f1f5f9;
            border-radius: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
        }
        
        .d-btn:active { background: #334155; }
        .d-btn.pause { background: #f59e0b; border-color: #f59e0b; }
        
        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .shake { animation: shake 0.5s ease-in-out; }
        
        /* Responsive */
        @media (max-width: 480px) {
            .canvas-wrapper { width: 100%; max-width: 350px; }
            #game-canvas { width: 100%; height: auto; }
            .desktop-controls { display: none; }
            .mobile-controls { display: flex; justify-content: center; }
            .d-btn { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1>🐍 Snake</h1>
            <div class="high-score">Best: <span id="high-score-display">0</span></div>
        </header>

        <main class="game-main">
            <div class="game-info">
                <div class="info-box">
                    <span class="label">Score</span>
                    <span id="score" class="value score-value">0</span>
                </div>
                <div class="info-box">
                    <span class="label">Speed</span>
                    <span id="speed" class="value speed-value">1x</span>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="400" height="400"></canvas>
                
                <div id="start-overlay" class="overlay">
                    <div class="overlay-content">
                        <h2>🐍 Snake</h2>
                        <p>Use arrow keys or swipe to move</p>
                        <button id="start-btn" class="control-btn primary">Start Game</button>
                    </div>
                </div>
                
                <div id="game-over-overlay" class="overlay hidden">
                    <div class="overlay-content">
                        <h2 id="go-title">Game Over!</h2>
                        <p id="go-score">Score: 0</p>
                        <button id="restart-btn" class="control-btn primary">Play Again</button>
                    </div>
                </div>
                
                <div id="pause-overlay" class="overlay hidden">
                    <div class="overlay-content">
                        <h2>Paused</h2>
                        <p>Press Space to resume</p>
                        <button id="resume-btn" class="control-btn primary">Resume</button>
                    </div>
                </div>
            </div>

            <div class="mobile-controls">
                <div class="d-pad">
                    <button id="btn-up" class="d-btn">↑</button>
                    <div class="d-middle">
                        <button id="btn-left" class="d-btn">←</button>
                        <button id="btn-pause" class="d-btn pause">⏸</button>
                        <button id="btn-right" class="d-btn">→</button>
                    </div>
                    <button id="btn-down" class="d-btn">↓</button>
                </div>
            </div>

            <div class="desktop-controls">
                <div class="controls-hint">
                    <span>⌨️ Arrow keys to move</span>
                    <span>␣ Space to pause</span>
                </div>
                <div>
                    <button id="pause-btn" class="control-btn">Pause</button>
                    <button id="new-game-btn" class="control-btn">New Game</button>
                </div>
            </div>
        </main>
    </div>

    <script>
// Storage
const Storage = {
    get: (key) => {
        try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
    },
    set: (key, value) => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
    }
};

// Game
class SnakeGame {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.gridSize = 20;
        this.tileCount = 20;
        
        this.setupCanvas();
        this.resetGameState();
        this.loadHighScore();
        this.attachEvents();
        this.draw();
    }
    
    setupCanvas() {
        if (window.innerWidth <= 480) {
            const size = Math.min(window.innerWidth - 32, 350);
            this.canvas.width = size;
            this.canvas.height = size;
            this.gridSize = size / this.tileCount;
        }
    }
    
    resetGameState() {
        this.snake = [{ x: 10, y: 10 }];
        this.food = this.randomFood();
        this.dx = 0;
        this.dy = 0;
        this.nextDx = 0;
        this.nextDy = 0;
        this.score = 0;
        this.speed = 1;
        this.gameSpeed = 150;
        this.isRunning = false;
        this.isPaused = false;
        this.loopId = null;
        
        this.updateScore();
        this.updateSpeed();
    }
    
    randomFood() {
        let food;
        do {
            food = {
                x: Math.floor(Math.random() * this.tileCount),
                y: Math.floor(Math.random() * this.tileCount)
            };
        } while (this.snake.some(s => s.x === food.x && s.y === food.y));
        return food;
    }
    
    attachEvents() {
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if ([32, 37, 38, 39, 40].includes(e.keyCode)) e.preventDefault();
            
            if (!this.isRunning) {
                if (e.keyCode === 32 || e.keyCode === 13) this.start();
                return;
            }
            
            if (e.keyCode === 32) {
                this.togglePause();
                return;
            }
            
            if (this.isPaused) return;
            
            switch(e.keyCode) {
                case 37: this.setDirection(-1, 0); break;
                case 38: this.setDirection(0, -1); break;
                case 39: this.setDirection(1, 0); break;
                case 40: this.setDirection(0, 1); break;
            }
        });
        
        // Touch
        let touchStartX = 0, touchStartY = 0;
        this.canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        this.canvas.addEventListener('touchend', (e) => {
            if (!this.isRunning || this.isPaused) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
                this.setDirection(dx > 0 ? 1 : -1, 0);
            } else if (Math.abs(dy) > 30) {
                this.setDirection(0, dy > 0 ? 1 : -1);
            }
        }, { passive: true });
        
        // Buttons
        document.getElementById('start-btn').addEventListener('click', () => this.start());
        document.getElementById('restart-btn').addEventListener('click', () => this.start());
        document.getElementById('resume-btn').addEventListener('click', () => this.togglePause());
        document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
        document.getElementById('new-game-btn').addEventListener('click', () => this.stop());
        
        // D-pad
        document.getElementById('btn-up').addEventListener('click', () => this.setDirection(0, -1));
        document.getElementById('btn-down').addEventListener('click', () => this.setDirection(0, 1));
        document.getElementById('btn-left').addEventListener('click', () => this.setDirection(-1, 0));
        document.getElementById('btn-right').addEventListener('click', () => this.setDirection(1, 0));
        document.getElementById('btn-pause').addEventListener('click', () => this.togglePause());
        
        window.addEventListener('resize', () => {
            this.setupCanvas();
            if (!this.isRunning) this.draw();
        });
    }
    
    setDirection(dx, dy) {
        // Prevent reversing
        if (this.snake.length > 1) {
            if (dx !== 0 && dx === -this.dx) return;
            if (dy !== 0 && dy === -this.dy) return;
        }
        this.nextDx = dx;
        this.nextDy = dy;
    }
    
    start() {
        this.resetGameState();
        this.isRunning = true;
        this.isPaused = false;
        this.hideOverlays();
        this.loopId = setInterval(() => this.update(), this.gameSpeed);
    }
    
    stop() {
        this.isRunning = false;
        this.isPaused = false;
        if (this.loopId) {
            clearInterval(this.loopId);
            this.loopId = null;
        }
        this.resetGameState();
        this.hideOverlays();
        document.getElementById('start-overlay').classList.remove('hidden');
        this.draw();
    }
    
    togglePause() {
        if (!this.isRunning) return;
        
        this.isPaused = !this.isPaused;
        
        if (this.isPaused) {
            clearInterval(this.loopId);
            document.getElementById('pause-overlay').classList.remove('hidden');
        } else {
            document.getElementById('pause-overlay').classList.add('hidden');
            this.loopId = setInterval(() => this.update(), this.gameSpeed);
        }
    }
    
    hideOverlays() {
        document.getElementById('start-overlay').classList.add('hidden');
        document.getElementById('game-over-overlay').classList.add('hidden');
        document.getElementById('pause-overlay').classList.add('hidden');
    }
    
    update() {
        // Apply next direction
        if (this.nextDx !== 0 || this.nextDy !== 0) {
            this.dx = this.nextDx;
            this.dy = this.nextDy;
        }
        
        // Don't move if no direction set
        if (this.dx === 0 && this.dy === 0) return;
        
        const head = { 
            x: this.snake[0].x + this.dx, 
            y: this.snake[0].y + this.dy 
        };
        
        // Wall collision
        if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
            this.gameOver();
            return;
        }
        
        // Self collision
        if (this.snake.some(s => s.x === head.x && s.y === head.y)) {
            this.gameOver();
            return;
        }
        
        this.snake.unshift(head);
        
        // Eat food
        if (head.x === this.food.x && head.y === this.food.y) {
            this.score += 10;
            this.updateScore();
            this.increaseSpeed();
            this.food = this.randomFood();
            
            if (this.score > this.highScore) {
                this.highScore = this.score;
                Storage.set('snake_highscore', this.highScore);
                document.getElementById('high-score-display').textContent = this.highScore;
            }
        } else {
            this.snake.pop();
        }
        
        this.draw();
    }
    
    increaseSpeed() {
        const newSpeed = Math.floor(this.score / 50) + 1;
        if (newSpeed > this.speed) {
            this.speed = newSpeed;
            this.gameSpeed = Math.max(60, 150 - (this.speed - 1) * 15);
            this.updateSpeed();
            clearInterval(this.loopId);
            this.loopId = setInterval(() => this.update(), this.gameSpeed);
        }
    }
    
    gameOver() {
        this.isRunning = false;
        clearInterval(this.loopId);
        
        this.canvas.classList.add('shake');
        setTimeout(() => this.canvas.classList.remove('shake'), 500);
        
        document.getElementById('go-title').textContent = 
            this.score >= this.highScore && this.score > 0 ? '🎉 New High Score!' : 'Game Over!';
        document.getElementById('go-score').textContent = `Score: ${this.score}`;
        document.getElementById('game-over-overlay').classList.remove('hidden');
    }
    
    draw() {
        // Clear
        this.ctx.fillStyle = '#0f172a';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Grid
        this.ctx.strokeStyle = 'rgba(51, 65, 85, 0.3)';
        this.ctx.lineWidth = 1;
        for (let i = 0; i <= this.tileCount; i++) {
            const pos = i * this.gridSize;
            this.ctx.beginPath();
            this.ctx.moveTo(pos, 0);
            this.ctx.lineTo(pos, this.canvas.height);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(0, pos);
            this.ctx.lineTo(this.canvas.width, pos);
            this.ctx.stroke();
        }
        
        // Food
        const fx = this.food.x * this.gridSize;
        const fy = this.food.y * this.gridSize;
        const fs = this.gridSize - 2;
        this.ctx.fillStyle = '#ef4444';
        this.ctx.shadowColor = '#ef4444';
        this.ctx.shadowBlur = 10;
        this.ctx.beginPath();
        this.ctx.roundRect(fx + 1, fy + 1, fs, fs, 4);
        this.ctx.fill();
        this.ctx.shadowBlur = 0;
        
        // Snake
        this.snake.forEach((s, i) => {
            const sx = s.x * this.gridSize;
            const sy = s.y * this.gridSize;
            const ss = this.gridSize - 2;
            
            this.ctx.fillStyle = i === 0 ? '#10b981' : '#34d399';
            if (i === 0) {
                this.ctx.shadowColor = '#10b981';
                this.ctx.shadowBlur = 8;
            }
            
            this.ctx.beginPath();
            this.ctx.roundRect(sx + 1, sy + 1, ss, ss, 4);
            this.ctx.fill();
            this.ctx.shadowBlur = 0;
            
            // Eyes on head
            if (i === 0) {
                this.ctx.fillStyle = '#fff';
                const es = ss / 5;
                const eo = ss / 4;
                let e1x = sx + eo, e1y = sy + eo;
                let e2x = sx + ss - eo - es, e2y = sy + eo;
                
                if (this.dx === 1) { e1x += 2; e2x += 2; }
                else if (this.dx === -1) { e1x -= 2; e2x -= 2; }
                else if (this.dy === -1) { e1y -= 2; e2y -= 2; }
                else if (this.dy === 1) { e1y += 2; e2y += 2; }
                
                this.ctx.fillRect(e1x, e1y, es, es);
                this.ctx.fillRect(e2x, e2y, es, es);
            }
        });
    }
    
    updateScore() {
        document.getElementById('score').textContent = this.score;
    }
    
    updateSpeed() {
        document.getElementById('speed').textContent = this.speed + 'x';
    }
    
    loadHighScore() {
        const saved = Storage.get('snake_highscore');
        if (saved) {
            this.highScore = saved;
            document.getElementById('high-score-display').textContent = saved;
        }
    }
}

// Start
document.addEventListener('DOMContentLoaded', () => {
    new SnakeGame();
});
    </script>
</body>
</html>
