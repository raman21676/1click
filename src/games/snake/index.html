<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - 1click Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --primary: #4fbdba;
            --snake: #4ade80;
            --snake-head: #22c55e;
            --food: #f472b6;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --border: #2d3748;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-card);
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
            font-size: 1rem;
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            background: var(--bg-card);
            margin-bottom: 0.5rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        /* Difficulty Selector */
        .difficulty-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: var(--bg-card);
            margin-bottom: 0.5rem;
        }
        
        .diff-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .diff-btn:hover, .diff-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Game Area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }
        
        #game-canvas {
            background: #0f1419;
            border: 3px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(79, 189, 186, 0.2);
        }
        
        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        
        .d-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            user-select: none;
        }
        
        .d-btn:hover { background: var(--border); }
        .d-btn:active { transform: scale(0.95); background: var(--primary); }
        
        .d-btn.up { grid-column: 2; grid-row: 1; }
        .d-btn.left { grid-column: 1; grid-row: 2; }
        .d-btn.right { grid-column: 3; grid-row: 2; }
        .d-btn.down { grid-column: 2; grid-row: 3; }
        
        .action-btns {
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-start {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
        }
        
        .btn-pause {
            background: var(--border);
            color: var(--text);
        }
        
        /* Overlays */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.95);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            z-index: 10;
            min-width: 250px;
        }
        
        .overlay h2 {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        
        .overlay p {
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .overlay .score {
            font-size: 2rem;
            color: var(--snake);
            font-weight: 700;
        }
        
        .hidden { display: none !important; }
        
        /* Pixel retro effect */
        .retro-text {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="header">
            <a href="../../../index.html" class="back-btn">← Back</a>
            <h1 class="title">Snake</h1>
            <div style="width: 50px;"></div>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">High Score</div>
                <div class="stat-value" id="high-score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <div class="difficulty-bar">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
        </div>

        <div class="game-area">
            <canvas id="game-canvas" width="400" height="400"></canvas>
            
            <div id="start-overlay" class="overlay">
                <h2 class="retro-text">SNAKE</h2>
                <p>Use arrow keys or D-pad</p>
                <button class="btn btn-start" id="start-btn">START GAME</button>
            </div>
            
            <div id="game-over-overlay" class="overlay hidden">
                <h2 class="retro-text">GAME OVER</h2>
                <p>Final Score</p>
                <p class="score" id="final-score">0</p>
                <button class="btn btn-start" id="restart-btn">PLAY AGAIN</button>
            </div>
            
            <div id="pause-overlay" class="overlay hidden">
                <h2 class="retro-text">PAUSED</h2>
                <button class="btn btn-start" id="resume-btn">RESUME</button>
            </div>
        </div>

        <div class="controls">
            <div class="d-pad">
                <button class="d-btn up" data-dir="up">▲</button>
                <button class="d-btn left" data-dir="left">◀</button>
                <button class="d-btn right" data-dir="right">▶</button>
                <button class="d-btn down" data-dir="down">▼</button>
            </div>
            
            <div class="action-btns">
                <button class="btn btn-pause" id="pause-btn">Pause</button>
            </div>
        </div>
    </div>

    <script>
const Storage = {
    get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
};

class SnakeGame {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        // Grid settings - 20x20 grid, each cell is 20px
        this.gridSize = 20;
        this.tileCount = 20;
        
        // Game state
        this.snake = [{x: 10, y: 10}];
        this.food = {x: 15, y: 15};
        this.dx = 0;
        this.dy = 0;
        this.score = 0;
        this.level = 1;
        this.gameRunning = false;
        this.gamePaused = false;
        this.gameLoop = null;
        
        // Speed settings - significant differences between levels
        this.baseSpeeds = {
            easy: 280,    // Very slow for beginners
            medium: 150,  // Moderate speed
            hard: 80      // Fast for challenge
        };
        this.difficulty = 'easy';
        this.currentSpeed = this.baseSpeeds.easy;
        
        // Colors
        this.colors = {
            bg: '#0f1419',
            snake: '#4ade80',
            snakeHead: '#22c55e',
            food: '#f472b6',
            grid: '#1a2332'
        };
        
        this.init();
    }
    
    init() {
        this.loadHighScore();
        this.attachEvents();
        this.draw();
    }
    
    loadHighScore() {
        const hs = Storage.get('snake-high-score') || 0;
        document.getElementById('high-score').textContent = hs;
    }
    
    attachEvents() {
        // Difficulty buttons
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                this.difficulty = e.target.dataset.diff;
                this.currentSpeed = this.baseSpeeds[this.difficulty];
            });
        });
        
        // D-pad controls
        document.querySelectorAll('.d-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const dir = e.target.dataset.dir;
                this.handleDirection(dir);
            });
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!this.gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    this.handleDirection('up'); break;
                case 'ArrowDown': case 's': case 'S':
                    this.handleDirection('down'); break;
                case 'ArrowLeft': case 'a': case 'A':
                    this.handleDirection('left'); break;
                case 'ArrowRight': case 'd': case 'D':
                    this.handleDirection('right'); break;
                case ' ':
                case 'p':
                case 'P':
                    this.togglePause(); break;
            }
        });
        
        // Action buttons
        document.getElementById('start-btn').addEventListener('click', () => this.start());
        document.getElementById('restart-btn').addEventListener('click', () => this.start());
        document.getElementById('resume-btn').addEventListener('click', () => this.togglePause());
        document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
        
        // Swipe controls
        let touchStartX = 0, touchStartY = 0;
        this.canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});
        
        this.canvas.addEventListener('touchend', (e) => {
            if (!this.gameRunning || this.gamePaused) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                this.handleDirection(dx > 0 ? 'right' : 'left');
            } else {
                this.handleDirection(dy > 0 ? 'down' : 'up');
            }
        }, {passive: false});
    }
    
    handleDirection(dir) {
        if (!this.gameRunning || this.gamePaused) return;
        
        switch(dir) {
            case 'up':
                if (this.dy !== 1) { this.dx = 0; this.dy = -1; }
                break;
            case 'down':
                if (this.dy !== -1) { this.dx = 0; this.dy = 1; }
                break;
            case 'left':
                if (this.dx !== 1) { this.dx = -1; this.dy = 0; }
                break;
            case 'right':
                if (this.dx !== -1) { this.dx = 1; this.dy = 0; }
                break;
        }
    }
    
    start() {
        this.snake = [{x: 10, y: 10}];
        this.food = this.randomFood();
        this.dx = 1;
        this.dy = 0;
        this.score = 0;
        this.level = 1;
        this.currentSpeed = this.baseSpeeds[this.difficulty];
        this.gameRunning = true;
        this.gamePaused = false;
        
        this.updateUI();
        
        document.getElementById('start-overlay').classList.add('hidden');
        document.getElementById('game-over-overlay').classList.add('hidden');
        document.getElementById('pause-overlay').classList.add('hidden');
        
        if (this.gameLoop) clearInterval(this.gameLoop);
        this.gameLoop = setInterval(() => this.update(), this.currentSpeed);
    }
    
    togglePause() {
        if (!this.gameRunning) return;
        
        this.gamePaused = !this.gamePaused;
        
        if (this.gamePaused) {
            clearInterval(this.gameLoop);
            document.getElementById('pause-overlay').classList.remove('hidden');
        } else {
            document.getElementById('pause-overlay').classList.add('hidden');
            this.gameLoop = setInterval(() => this.update(), this.currentSpeed);
        }
    }
    
    update() {
        // Move snake
        const head = {x: this.snake[0].x + this.dx, y: this.snake[0].y + this.dy};
        
        // Wall collision
        if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
            this.gameOver();
            return;
        }
        
        // Self collision
        for (let segment of this.snake) {
            if (head.x === segment.x && head.y === segment.y) {
                this.gameOver();
                return;
            }
        }
        
        this.snake.unshift(head);
        
        // Check food
        if (head.x === this.food.x && head.y === this.food.y) {
            this.score += 10;
            this.food = this.randomFood();
            
            // Level up every 50 points
            const newLevel = Math.floor(this.score / 50) + 1;
            if (newLevel > this.level) {
                this.level = newLevel;
                this.increaseSpeed();
            }
            
            this.updateUI();
        } else {
            this.snake.pop();
        }
        
        this.draw();
    }
    
    increaseSpeed() {
        // Speed up by 5% each level, with minimum speed limits
        const minSpeeds = { easy: 180, medium: 70, hard: 40 };
        this.currentSpeed = Math.max(
            minSpeeds[this.difficulty],
            Math.floor(this.currentSpeed * 0.95)
        );
        
        clearInterval(this.gameLoop);
        this.gameLoop = setInterval(() => this.update(), this.currentSpeed);
    }
    
    randomFood() {
        let food;
        do {
            food = {
                x: Math.floor(Math.random() * this.tileCount),
                y: Math.floor(Math.random() * this.tileCount)
            };
        } while (this.snake.some(s => s.x === food.x && s.y === food.y));
        return food;
    }
    
    draw() {
        // Clear canvas
        this.ctx.fillStyle = this.colors.bg;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Draw subtle grid
        this.ctx.strokeStyle = this.colors.grid;
        this.ctx.lineWidth = 1;
        for (let i = 0; i <= this.tileCount; i++) {
            const pos = i * this.gridSize;
            this.ctx.beginPath();
            this.ctx.moveTo(pos, 0);
            this.ctx.lineTo(pos, this.canvas.height);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(0, pos);
            this.ctx.lineTo(this.canvas.width, pos);
            this.ctx.stroke();
        }
        
        // Draw food - pixel style with glow
        this.ctx.fillStyle = this.colors.food;
        this.ctx.shadowColor = this.colors.food;
        this.ctx.shadowBlur = 10;
        const foodX = this.food.x * this.gridSize;
        const foodY = this.food.y * this.gridSize;
        // Draw food as 2x2 pixel block
        this.ctx.fillRect(foodX + 4, foodY + 4, 12, 12);
        this.ctx.shadowBlur = 0;
        
        // Draw snake - pixel style blocks
        this.snake.forEach((segment, index) => {
            const x = segment.x * this.gridSize;
            const y = segment.y * this.gridSize;
            
            if (index === 0) {
                // Head - brighter color with eyes
                this.ctx.fillStyle = this.colors.snakeHead;
                this.ctx.fillRect(x + 1, y + 1, 18, 18);
                
                // Eyes based on direction
                this.ctx.fillStyle = '#000';
                if (this.dx === 1) { // Right
                    this.ctx.fillRect(x + 12, y + 4, 3, 3);
                    this.ctx.fillRect(x + 12, y + 12, 3, 3);
                } else if (this.dx === -1) { // Left
                    this.ctx.fillRect(x + 4, y + 4, 3, 3);
                    this.ctx.fillRect(x + 4, y + 12, 3, 3);
                } else if (this.dy === -1) { // Up
                    this.ctx.fillRect(x + 4, y + 4, 3, 3);
                    this.ctx.fillRect(x + 12, y + 4, 3, 3);
                } else { // Down
                    this.ctx.fillRect(x + 4, y + 12, 3, 3);
                    this.ctx.fillRect(x + 12, y + 12, 3, 3);
                }
            } else {
                // Body - pixel blocks with slight variation
                this.ctx.fillStyle = this.colors.snake;
                this.ctx.fillRect(x + 2, y + 2, 16, 16);
                
                // Add pixel detail
                this.ctx.fillStyle = '#3eca6d';
                this.ctx.fillRect(x + 6, y + 6, 8, 8);
            }
        });
    }
    
    gameOver() {
        this.gameRunning = false;
        clearInterval(this.gameLoop);
        
        // Save high score
        const hs = Storage.get('snake-high-score') || 0;
        if (this.score > hs) {
            Storage.set('snake-high-score', this.score);
        }
        
        document.getElementById('final-score').textContent = this.score;
        document.getElementById('game-over-overlay').classList.remove('hidden');
        document.getElementById('high-score').textContent = Math.max(hs, this.score);
    }
    
    updateUI() {
        document.getElementById('score').textContent = this.score;
        document.getElementById('level').textContent = this.level;
    }
}

new SnakeGame();
    </script>
</body>
</html>
